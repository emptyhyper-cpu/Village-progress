function addPO(){
  if(!requireAdmin('สร้าง PO')) return;
  const code=$('npoCode').value.trim(), amt=$('npoAmt').value, name=$('npoName').value.trim();
  if(!code){ toast('ใส่เลขที่ PO ก่อนครับ'); return; }
  if((B.pos||[]).some(p=>p.code.trim()===code)){ toast('เลขที่ PO นี้มีอยู่แล้ว'); return; }
  B.pos = B.pos || [];
  B.pos.push({id:uid(), code, name, amount:+amt||0});
  bqPersist(); bqRender(); toast('สร้าง PO '+code+' แล้ว');
}
function editPO(id){
  if(!requireAdmin('แก้ PO')) return;
  const p=poById(id); if(!p) return;
  const code=prompt('เลขที่ PO', p.code); if(code===null) return;
  const amt=prompt('วงเงินตาม PO (บาท)', p.amount||0); if(amt===null) return;
  const name=prompt('รายละเอียด', p.name||''); if(name===null) return;
  p.code=code.trim(); p.amount=+amt||0; p.name=name.trim();
  bqPersist(); bqRender(); toast('บันทึกแล้ว');
}
function delPO(id){
  if(!requireAdmin('ลบ PO')) return;
  const p=poById(id); if(!p) return;
  const n=poJobs(id).length;
  if(!confirm('ลบ PO '+(p.code||'')+' ?'+(n?'\n\nโครงการ '+n+' รายการจะกลับไปเป็น "ยังไม่ผูก PO" (ข้อมูลงบไม่หาย)':''))) return;
  B.jobs.forEach(j=>{ if(j.poId===id) j.poId=''; });
  B.pos = B.pos.filter(x=>x.id!==id);
  bqPersist(); bqRender(); toast('ลบ PO แล้ว');
}
function setJobPO(jid, poId){
  if(!requireAdmin('ผูก PO')) return;
  const j=B.jobs.find(x=>x.id===jid); if(!j) return;
  j.poId = poId || '';
  bqPersist(); bqRender();
}

function exportJobBOQ(jid){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  const v = vendorById(job.vendorId);
  const aoa = [
    ['BOQ งาน', jobName(job)],
    ['Vendor', (v||{}).name||'-'],
    ['กรอบงบประมาณ (บาท)', jobBudget(job)||''],
    ['วันที่', todayISO()],
    [],
    ['ลำดับ','หมวด','รายการ','หน่วย','จำนวน','ราคา/หน่วย','รวม (บาท)']
  ];
  let n=0, total=0;
  ITEMS.forEach((it,idx)=>{
    const q = +(job.qty||{})['i'+idx]||0;
    if(!q) return;
    const p = jobPrice(job,idx), line = q*p; total+=line; n++;
    aoa.push([n, it.s, (it.on||it.n), it.u, q, p, line]);
  });
  aoa.push([]);
  aoa.push(['','','','','','รวมทั้งงาน', total]);
  const jbud = jobBudget(job);
  if(jbud) aoa.push(['','','','','', jbud-total>=0?'คงเหลือจากงบ':'เกินงบ', Math.abs(jbud-total)]);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:6},{wch:22},{wch:52},{wch:8},{wch:9},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'BOQ');
  XLSX.writeFile(wb, 'BOQ-'+jobName(job).replace(/\s+/g,'-')+'-'+todayISO()+'.xlsx');
  toast('Export BOQ แล้ว');
}

let importFor = null; // 'prices:<vid>' | 'job:<jid>'
$('boqXlsxIn').addEventListener('change', function(ev){
  const f = ev.target.files[0]; if(!f || !importFor) return;
  const rd = new FileReader();
  rd.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
      const nameIdx = {}; ITEMS.forEach((it,i)=> nameIdx[it.n.trim()] = i);
      let hit = 0;
      if(importFor.startsWith('prices:')){
        const v = vendorById(importFor.slice(7));
        // รับทั้งไฟล์ราคาจากแอปนี้ (คอลัมน์ รายการ/ราคา) และไฟล์มาตรฐาน (Description/Unit Price)
        const hi = aoa.findIndex(r=> r && (String(r[2]).trim()==='รายการ' || String(r[1]).trim().toLowerCase()==='description'));
        if(hi>=0){
          const isApp = String(aoa[hi][2]).trim()==='รายการ';
          for(let i=hi+1;i<aoa.length;i++){
            const r = aoa[i]; if(!r) continue;
            const nm = String(isApp? r[2] : r[1]).trim();
            const pr = +(isApp? r[4] : r[5]);
            if(nm && nameIdx[nm]!=null && !isNaN(pr)){ v.prices['i'+nameIdx[nm]] = pr; hit++; }
          }
        }
        bqPersist(); refreshAdminUI(); toast('อัปเดตราคา '+hit+' รายการ');
      } else if(importFor.startsWith('job:')){
        const job = B.jobs.find(j=>j.id===importFor.slice(4));
        const hi = aoa.findIndex(r=> r && String(r[2]).trim()==='รายการ' && String(r[4]).trim()==='จำนวน');
        if(hi>=0){
          for(let i=hi+1;i<aoa.length;i++){
            const r = aoa[i]; if(!r) continue;
            const nm = String(r[2]).trim(); const q = +r[4];
            if(nm && nameIdx[nm]!=null && q>0){ job.qty['i'+nameIdx[nm]] = q; hit++; }
          }
        }
        bqPersist(); bqRender(); toast('อัปเดตจำนวน '+hit+' รายการ');
      }
    }catch(err){ toast('อ่านไฟล์ไม่สำเร็จ'); }
    importFor = null; ev.target.value='';
  };
  rd.readAsArrayBuffer(f);
});

/* ================= Mode switch (Progress <-> BOQ) ================= */
function switchMode(m){
  const map = {dash:'modeDash', progress:'modeProgress', boq:'modeBoq', vendor:'modeVendor', unit:'modeUnit', plan:'modePlan'};
  const btn = {dash:'mbDash', progress:'mbProgress', boq:'mbBoq', vendor:'mbVendor', unit:'mbUnit', plan:'mbPlan'};
  Object.keys(map).forEach(k=>{
    $(map[k]).style.display = (k===m) ? '' : 'none';
    $(btn[k]).classList.toggle('on', k===m);
  });
  if(m==='progress'){ render(); }
  else {
    $('fabAdd').style.display='none';
    if(m==='boq') bqRender();
    else if(m==='vendor') renderVendorMode();
    else if(m==='unit') renderUnitMode();
    else if(m==='plan'){
      const cat = visibleVillages().map(v=>({
        name: v.name,
        contractor: v.contractor||'',
        houses: (v.houses||[]).map(h=>({addr:h.no, status:h.st||''}))
      }));
      try{ localStorage.setItem('plan-status-catalog', JSON.stringify(cat)); }catch(e){}
      const fr = $('planFrame');
      if(!fr.src) fr.src = 'plan-status.html';
      else { try{ fr.contentWindow.postMessage({type:'ftth-catalog', data:cat}, '*'); }catch(e){} }
    }
    else renderDash();
  }
  window.scrollTo(0,0);
}

async function renderAccounts(){
  const box = $('acctList'); if(!box) return;
  if(cloudOn && cloudUser){
    try{
      const { data, error } = await sb.rpc('admin_list_accounts');
      if(error) throw error;
      if(!data || !data.length){ box.innerHTML = 'ยังไม่มีบัญชี'; return; }
      // เก็บอีเมลไว้กับ vendor ในเครื่อง เพื่อให้ไฟล์ package มีข้อมูล login
      data.filter(a=>!a.is_admin).forEach(a=>{
        let lv = B.vendors.find(v=>v.cloudId===a.id || v.id===a.id);
        if(!lv){ lv={id:a.id, cloudId:a.id, name:a.name, prices:{}}; B.vendors.push(lv); }
        lv.name = a.name; lv.user = a.email;
      });
      bqPersist();
      box.style.color=''; box.innerHTML = data.map(a=>acctCard(a)).join('');
    }catch(e){
      box.innerHTML = `<div class="notice" style="text-align:left">⚠️ ยังใช้เมนูจัดการบัญชีไม่ได้ — ต้องรันไฟล์ <b>supabase-admin-users.sql</b> ใน Supabase ก่อน (ครั้งเดียว)<br><small>${esc(e.message||'')}</small></div>`;
    }
    return;
  }
  // โหมดในเครื่อง
  box.style.color='';
  box.innerHTML = B.vendors.length ? B.vendors.map(v=>`
    <div class="vcard">
      <div class="vcard-top"><h3>${esc(v.name)}</h3>
        <button class="btn btn-red btn-sm" onclick="delVendor('${v.id}')">ลบ</button></div>
      <div class="grid2" style="margin-top:8px">
        <div class="field" style="margin-bottom:0"><label>Username</label><input value="${esc(v.user||'')}" onchange="setVendorCred('${v.id}','user',this.value)"></div>
        <div class="field" style="margin-bottom:0"><label>Password</label><input value="${esc(v.pass||'')}" onchange="setVendorCred('${v.id}','pass',this.value)"></div>
      </div>
      <div class="data-row">
        <button class="btn btn-dark btn-sm" onclick="previewAs('${v.id}','${esc(v.name)}')">👁️ ดูแบบ ${esc(v.name)}</button>
        <button class="btn btn-ghost btn-sm" onclick="exportVendorPackage('${v.id}')">📦 Export ไฟล์ข้อมูล</button>
      </div>
    </div>`).join('') : 'ยังไม่มี Vendor';
}

  return `<div class="vcard">
    <div class="vcard-top">
      <div><h3>${esc(a.name)} ${a.is_admin?'<span style="font-size:11px;background:#EAF3DD;color:var(--forest);padding:2px 8px;border-radius:99px;font-weight:700">🔑 ADMIN</span>':'<span style="font-size:11px;background:#F0F4EE;color:var(--muted);padding:2px 8px;border-radius:99px;font-weight:700">👷 ผรม.</span>'}</h3>
        <div class="sub" style="font-size:12px;color:var(--muted)">${esc(a.email)}${isMe?' · (บัญชีของคุณ)':''}</div></div>
      ${isMe?'':`<button class="btn btn-red btn-sm" onclick="acctDelete('${a.id}','${esc(a.name)}')">ลบ</button>`}
    </div>
    <div class="grid2" style="margin-top:8px">
      <div class="field" style="margin-bottom:0"><label>ชื่อที่แสดง</label>
        <input value="${esc(a.name)}" onchange="acctSetName('${a.id}',this.value)"></div>
      <div class="field" style="margin-bottom:0"><label>อีเมล (ใช้ login)</label>
        <input value="${esc(a.email)}" onchange="acctSetEmail('${a.id}',this.value)"></div>
    </div>
    <div class="grid2" style="margin-top:8px">
      <div class="field" style="margin-bottom:0"><label>ตั้งรหัสผ่านใหม่</label>
        <input id="pw-${a.id}" type="text" placeholder="พิมพ์รหัสใหม่ (≥6 ตัว)"></div>
      <div class="field" style="margin-bottom:0"><label>&nbsp;</label>
        <button class="btn btn-dark btn-sm" style="width:100%" onclick="acctSetPassword('${a.id}')">💾 บันทึกรหัสใหม่</button></div>
    </div>
    ${a.is_admin?'':`<div class="data-row">
      <button class="btn btn-dark btn-sm" onclick="previewAsByName('${esc(a.name)}')">👁️ ดูแบบ ${esc(a.name)}</button>
      <button class="btn btn-ghost btn-sm" onclick="exportVendorPackageByName('${esc(a.name)}')">📦 Export ไฟล์ข้อมูล</button>
    </div>`}

async function acctSetPassword(id){
  if(!requireAdmin('เปลี่ยนรหัสผ่าน')) return;
  const el = $('pw-'+id); const pw = el ? el.value.trim() : '';
  if(pw.length < 6){ toast('รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'); return; }
  try{
    const { error } = await sb.rpc('admin_set_password', { target_id:id, new_password:pw });
    if(error) throw error;
    el.value=''; toast('เปลี่ยนรหัสผ่านแล้ว');
  }catch(e){ toast('เปลี่ยนรหัสไม่สำเร็จ: '+(e.message||'')); }
}
async function acctSetEmail(id, email){
  if(!requireAdmin('เปลี่ยนอีเมล')) return;
  email = email.trim(); if(!email){ toast('อีเมลว่างไม่ได้'); renderAccounts(); return; }
  try{
    const { error } = await sb.rpc('admin_set_email', { target_id:id, new_email:email });
    if(error) throw error;
    toast('เปลี่ยนอีเมลแล้ว'); renderAccounts();
  }catch(e){ toast('เปลี่ยนอีเมลไม่สำเร็จ: '+(e.message||'')); renderAccounts(); }
}
async function acctSetName(id, name){
  name = name.trim(); if(!name){ toast('ชื่อว่างไม่ได้'); renderAccounts(); return; }
  try{
    const { error } = await sb.from('vendors').update({ name }).eq('id', id);
    if(error) throw error;
    const lv = B.vendors.find(v=>v.cloudId===id || v.id===id);
    if(lv){ lv.name = name; bqPersist(); }
    toast('บันทึกชื่อแล้ว');
  }catch(e){ toast('บันทึกไม่สำเร็จ: '+(e.message||'')); }
}
async function acctDelete(id, name){
  if(!requireAdmin('ลบบัญชี')) return;
  if(!confirm('ลบบัญชี "'+name+'" ? ผู้ใช้นี้จะ login ไม่ได้อีก')) return;
  try{
    const { error } = await sb.rpc('admin_delete_account', { target_id:id });
    if(error) throw error;
    B.vendors = B.vendors.filter(v=>v.cloudId!==id && v.id!==id);
    bqPersist(); toast('ลบบัญชีแล้ว'); renderAccounts();
  }catch(e){ toast('ลบไม่สำเร็จ: '+(e.message||'')); }
}
function previewAsByName(nm){
  const v = B.vendors.find(x=>x.name.trim()===nm.trim());
  if(v) previewAs(v.id, v.name);
  else toast('ยังไม่มีข้อมูลของ '+nm+' ในเครื่อง — กด ⬇️ ดึงข้อมูลล่าสุดก่อน');
}
function exportVendorPackageByName(nm){
  const v = B.vendors.find(x=>x.name.trim()===nm.trim());
  if(v) exportVendorPackage(v.id); else toast('ยังไม่มีข้อมูลของ '+nm+' ในเครื่อง — กด ⬇️ ดึงข้อมูลล่าสุดก่อน');

const UNIT_HEADS  = ['บ้านเลขที่','สถานะ','Solution','Estimate','Lat','Long','ชื่อลูกค้า','เบอร์โทร','สนใจ/ไม่สนใจ','Detail'];

let uSel = null, uDragging = false;
function unitVillage(){ return state.villages.find(v=>v.id===ui.unitVil); }
function uRange(){
  if(!uSel) return null;
  return { r1:Math.min(uSel.ar,uSel.fr), r2:Math.max(uSel.ar,uSel.fr),
           c1:Math.min(uSel.ac,uSel.fc), c2:Math.max(uSel.ac,uSel.fc) };
}
function uPaint(){
  const g = document.getElementById('ugridBody'); if(!g) return;
  g.querySelectorAll('td.ucell').forEach(td=>td.classList.remove('sel','anchor'));
  const R = uRange(); if(!R) return;
  for(let r=R.r1;r<=R.r2;r++) for(let c=R.c1;c<=R.c2;c++){
    const td = g.querySelector('td.ucell[data-r="'+r+'"][data-c="'+c+'"]');
    if(td) td.classList.add('sel');
  }
  const a = g.querySelector('td.ucell[data-r="'+uSel.ar+'"][data-c="'+uSel.ac+'"]');
  if(a) a.classList.add('anchor');
  const n = (R.r2-R.r1+1)*(R.c2-R.c1+1);
  const lab = document.getElementById('uSelInfo');
  if(lab) lab.textContent = n>1 ? ('เลือก '+n+' ช่อง · Delete=ล้าง · Ctrl+C=คัดลอก') : '';
}
function uCellDown(ev, r, c){
  if(ev.shiftKey && uSel){ uSel.fr=r; uSel.fc=c; }
  else { uSel = {ar:r, ac:c, fr:r, fc:c}; uDragging = true; }
  uPaint();
}
function uCellEnter(r, c){ if(!uDragging || !uSel) return; uSel.fr=r; uSel.fc=c; uPaint(); }
document.addEventListener('mouseup', ()=>{ uDragging=false; });

function unitOptsHTML(vil){
  const q = (ui.unitQ||'').trim().toLowerCase();
  let list = vil;
  if(q) list = vil.filter(x=> x.name.toLowerCase().includes(q) || (x.contractor||'').toLowerCase().includes(q));
  if(!list.length) list = vil;
  return list.map(x=>`<option value="${x.id}" ${x.id===ui.unitVil?'selected':''}>${esc(x.name)} (${(x.houses||[]).length})</option>`).join('');
}
function unitFilterVillages(q){
  ui.unitQ = q;
  const vil = visibleVillages();
  const sel = $('unitSelect'); if(!sel) return;
  sel.innerHTML = unitOptsHTML(vil);
  const qq = (q||'').trim().toLowerCase();
  const matched = qq ? vil.filter(x=> x.name.toLowerCase().includes(qq) || (x.contractor||'').toLowerCase().includes(qq)) : vil;
  const lab = $('unitMatch');
  if(lab) lab.textContent = qq ? ('พบ '+matched.length+' หมู่บ้าน · Enter เพื่อเลือกอันแรก') : '';
  if(qq && matched.length && !matched.some(x=>x.id===ui.unitVil)){
    ui.unitVil = matched[0].id; uSel = null;
    sel.value = ui.unitVil;
    unitRefreshGrid();          // อัปเดตเฉพาะตาราง ไม่แตะช่องค้นหา -> ไม่เด้ง
  }
}
/* วาดใหม่เฉพาะตารางกริด (ไม่แตะ toolbar/ช่องค้นหา) */
function unitRefreshGrid(){
  const v = unitVillage(); if(!v) return;
  const body = $('ugridBody');
  if(body) body.innerHTML = (v.houses||[]).map((h,i)=>unitRow(v,h,i)).join('');
  const c = $('uCount');
  if(c) c.textContent = 'รวม '+(v.houses||[]).length+' หลัง · พร้อม ONU '+((v.houses||[]).filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length);
  uPaint();
}
function unitPickFirst(){
  const sel = $('unitSelect'); if(!sel || !sel.options.length) return;
  ui.unitVil = sel.options[0].value; uSel = null; renderUnitMode();
}

function renderUnitMode(){

  if(!ui.unitVil || !vil.some(v=>v.id===ui.unitVil)) ui.unitVil = vil[0] ? vil[0].id : null;

    const hs = v.houses || [];
    const doneN = hs.filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
    body = `
    <div class="unit-toolbar">
      <input id="unitSearch" placeholder="🔍 พิมพ์ชื่อหมู่บ้าน" value="${esc(ui.unitQ||'')}"
        oninput="unitFilterVillages(this.value)" onkeydown="if(event.key==='Enter')unitPickFirst()"
        style="font-family:'Sarabun',sans-serif;font-size:14px;padding:8px 11px;border:1.5px solid var(--line);border-radius:9px;background:#fff;width:190px">
      <select id="unitSelect" onchange="ui.unitVil=this.value;uSel=null;renderUnitMode()" style="font-family:'Sarabun',sans-serif;font-size:14px;padding:8px 11px;border:1.5px solid var(--line);border-radius:9px;background:#fff;min-width:230px;max-width:340px">${opts}</select>
      <span class="unit-count" id="unitMatch"></span>
      <button class="btn btn-green btn-sm" onclick="unitAddRows(1)">＋ เพิ่มหลัง</button>
      <button class="btn btn-dark btn-sm" onclick="unitAddRows(10)">＋ 10 แถว</button>
      <button class="btn btn-dark btn-sm" onclick="$('unitXlsx').click()" title="${isAdmin()?'นำเข้าข้อมูลรายหลัง':'นำเข้าได้เฉพาะหมู่บ้านของคุณ'}">📥 Import รายหลัง</button>
      <button class="btn btn-ghost btn-sm" onclick="openPlanWith('${v.id}')">📐 ลง PDF</button>
      <span class="unit-count" id="uCount">รวม ${hs.length} หลัง · พร้อม ONU ${doneN}</span>
      <span class="unit-count" id="uSelInfo" style="color:var(--green-dark)"></span>
    </div>
    <div class="notice" style="text-align:left">ใช้เหมือน Excel: ลากเลือกหลายช่อง · <b>Delete</b> ล้างช่องที่เลือก · <b>Ctrl+C</b> คัดลอก · <b>Ctrl+V</b> วางจาก Excel (ขยายแถวให้เอง) · ลูกศร/Tab/Enter เลื่อนช่อง</div>
    <div class="ugrid-wrap">
      <table class="ugrid">
        <thead><tr><th>#</th>${UNIT_HEADS.map(h=>`<th>${esc(h)}</th>`).join('')}<th></th></tr></thead>
        <tbody id="ugridBody">${hs.map((h,i)=>unitRow(v,h,i)).join('')}</tbody>
      </table>
    </div>
    ${hs.length===0?'<div class="panel" style="color:var(--muted);font-size:13px;margin-top:10px">ยังไม่มีข้อมูล — กด "＋ เพิ่มหลัง" หรือ "📥 Import Excel"</div>':''}`;
  }
  $('modeUnit').innerHTML = `<div class="section-label">📋 Unit · ตารางกรอกข้อมูลรายหลัง${cloudOn?' · บันทึกลง Database อัตโนมัติ':''}</div>` + body;
  uPaint();
}

function unitRow(v, h, i){
  const done = h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'');
  const cell = (c, inner, extraCls)=>
    `<td class="ucell ${extraCls||''}" data-r="${i}" data-c="${c}" onmousedown="uCellDown(event,${i},${c})" onmouseenter="uCellEnter(${i},${c})">${inner}</td>`;
  const inp = (c, val, w)=> cell(c, `<input value="${esc(val==null?'':val)}" ${w?`style="width:${w}px"`:''} onchange="unitSet(${i},'${UNIT_FIELDS[c]}',this.value)" onkeydown="uKeyNav(event,${i},${c})">`);
  const stOpts = UNIT_STATUSES.map(o=>`<option value="${esc(o)}" ${(h.st||'')===o?'selected':''}>${esc(o)||'—'}</option>`).join('');
  return `<tr>
    <td class="rownum">${i+1}</td>
    ${inp(0, h.no)}
    ${cell(1, `<select onchange="unitSet(${i},'st',this.value)">${stOpts}</select>`, done?'ustat-done':'')}
    ${inp(2, h.sol)}
    ${inp(3, h.est)}
    ${inp(4, h.lat, 74)}
    ${inp(5, h.lng, 74)}
    ${inp(6, h.name)}
    ${inp(7, h.phone)}
    ${inp(8, h.interest)}
    ${inp(9, h.detail)}
    <td class="del"><button onclick="unitDel(${i})" title="ลบแถวนี้">✕</button></td>
  </tr>`;
}

function unitRecount(v){
  v.homesDone = (v.houses||[]).filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
  const c = document.getElementById('uCount');
  if(c) c.textContent = 'รวม '+v.houses.length+' หลัง · พร้อม ONU '+v.homesDone;
}
function unitSave(v){ v._hDirty = true; persist(); if(cloudOn) cloudSaveHouses(v); }
function unitSet(i, key, val){
  const v = unitVillage(); if(!v || !v.houses || !v.houses[i]) return;
  v.houses[i][key] = val;
  unitRecount(v); unitSave(v);
  if(key==='st'){
    const td = document.querySelector('#ugridBody td.ucell[data-r="'+i+'"][data-c="1"]');
    if(td) td.classList.toggle('ustat-done', val==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(val||''));
  }
}
function unitAddRows(n){
  const v = unitVillage(); if(!v) return;
  v.houses = v.houses || [];
  for(let k=0;k<n;k++) v.houses.push({no:'',st:'',sol:'',est:'',lat:'',lng:'',name:'',phone:'',interest:'',detail:''});
  v._hDirty = true; persist(); renderUnitMode();
}
function unitDel(i){
  const v = unitVillage(); if(!v) return;
  v.houses.splice(i,1);
  unitRecount(v); unitSave(v); uSel=null; renderUnitMode();
}

function uKeyNav(ev, r, c){
  const k = ev.key;
  let nr=r, nc=c;
  if(k==='ArrowDown' || k==='Enter') nr=r+1;
  else if(k==='ArrowUp') nr=r-1;
  else if(k==='Tab'){ nc = ev.shiftKey ? c-1 : c+1; }
  else return;
  ev.preventDefault();
  const v = unitVillage(); if(!v) return;
  if(nc<0){ nc=UNIT_FIELDS.length-1; nr--; }
  if(nc>=UNIT_FIELDS.length){ nc=0; nr++; }
  if(nr<0) nr=0;
  if(nr>=v.houses.length){ if(k==='Enter'||k==='ArrowDown'||k==='Tab'){ unitAddRows(1); } else nr=v.houses.length-1; }
  uSel={ar:nr,ac:nc,fr:nr,fc:nc}; uPaint();
  const td = document.querySelector('#ugridBody td.ucell[data-r="'+nr+'"][data-c="'+nc+'"]');
  const fEl = td && td.querySelector('input,select'); if(fEl){ fEl.focus(); if(fEl.select) fEl.select(); }
}
function uClearSelected(){
  const v = unitVillage(); const R = uRange(); if(!v || !R) return 0;
  let n=0;
  for(let r=R.r1;r<=R.r2;r++){
    if(!v.houses[r]) continue;
    for(let c=R.c1;c<=R.c2;c++){ v.houses[r][UNIT_FIELDS[c]] = ''; n++; }
  }
  unitRecount(v); unitSave(v); renderUnitMode();
  return n;
}
function uCopySelected(){
  const v = unitVillage(); const R = uRange(); if(!v || !R) return '';
  const out=[];
  for(let r=R.r1;r<=R.r2;r++){
    const row=[];
    for(let c=R.c1;c<=R.c2;c++) row.push(v.houses[r] ? (v.houses[r][UNIT_FIELDS[c]]||'') : '');
    out.push(row.join(String.fromCharCode(9)));
  }
  return out.join(String.fromCharCode(10));
}
function normStatus(str){
  str = String(str||'').trim();
  if(!str) return '';
  const exact = UNIT_STATUSES.find(x=> x && x===str);
  if(exact) return exact;
  const loose = UNIT_STATUSES.find(x=> x && (x.indexOf(str)>=0 || str.indexOf(x)>=0));
  return loose || str;
}
function uPasteText(txt, r0, c0){
  const v = unitVillage(); if(!v || !txt) return 0;
  v.houses = v.houses || [];
  const NL = String.fromCharCode(10), TAB = String.fromCharCode(9);
  let rows = txt.split(NL).map(function(x){ return x.replace(String.fromCharCode(13),''); });
  while(rows.length && rows[rows.length-1].trim()==='') rows.pop();
  if(!rows.length) return 0;
  rows.forEach(function(line, ri){
    const cells = line.split(TAB);
    const R = r0 + ri;
    while(v.houses.length <= R) v.houses.push({no:'',st:'',sol:'',est:'',lat:'',lng:'',name:'',phone:'',interest:'',detail:''});
    cells.forEach(function(val, ci){
      const C = c0 + ci;
      if(C >= UNIT_FIELDS.length) return;
      const key = UNIT_FIELDS[C];
      val = String(val).trim();
      v.houses[R][key] = (key==='st') ? normStatus(val) : val;
    });
  });
  unitRecount(v); unitSave(v); renderUnitMode();
  return rows.length;
}
document.addEventListener('keydown', function(ev){
  const md = document.getElementById('modeUnit');
  if(!md || md.style.display==='none' || !uSel) return;
  const R = uRange(); if(!R) return;
  const multi = (R.r2-R.r1)>0 || (R.c2-R.c1)>0;
  const tag = (ev.target.tagName||'').toLowerCase();
  if(ev.key==='Delete' || ev.key==='Backspace'){
    if(multi || tag==='td' || tag==='select'){
      ev.preventDefault();
      const n = uClearSelected();
      toast('ล้าง '+n+' ช่องแล้ว');
    }
    return;
  }
  if((ev.ctrlKey||ev.metaKey) && (ev.key==='c'||ev.key==='C') && multi){
    const txt = uCopySelected();
    if(txt && navigator.clipboard) navigator.clipboard.writeText(txt);
    toast('คัดลอกแล้ว วางใน Excel ได้เลย');
    ev.preventDefault();
  }
});
document.addEventListener('paste', function(ev){
  const md = document.getElementById('modeUnit');
  if(!md || md.style.display==='none' || !uSel) return;
  const txt = (ev.clipboardData || window.clipboardData).getData('text');
  const TAB = String.fromCharCode(9), NL = String.fromCharCode(10);
  if(!txt || (txt.indexOf(TAB)<0 && txt.indexOf(NL)<0)) return;
  ev.preventDefault();
  const R = uRange();
  const n = uPasteText(txt, R.r1, R.c1);
  toast('วาง '+n+' แถวลงตารางแล้ว');
});

function unitImportExcel(ev){
  const f = ev.target.files[0]; if(!f) return;
  const v = unitVillage();
  const rd = new FileReader();
  rd.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sn = wb.SheetNames.find(x=>x==='Unit') || wb.SheetNames[0];
      const ua = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
      if(!ua.length){ toast('ไม่พบข้อมูลในไฟล์'); return; }
      const uh = (ua[0]||[]).map(x=>String(x).toLowerCase());
      const col = (...keys)=>{ for(const key of keys){ const i=uh.findIndex(h=>h.includes(key)); if(i>=0) return i; } return -1; };
      const cVil=col('โครงการ'), cNo=col('บ้านเลขที่','address'), cLat=col('lat'), cLng=col('lot','lng','long'),
            cSt=col('status','สถานะ'), cSol=col('solution'), cEst=col('estimate'), cDet=col('detail'),
            cName=col('name','ชื่อ'), cPhone=col('phone','เบอร์'), cInt=col('สนใจ','interest');
      const grouped = {};
      for(let r=1;r<ua.length;r++){
        const row = ua[r];
        const vname = cVil>=0 ? String(row[cVil]||'').trim() : (v? v.name : '');
        if(!vname) continue;
        (grouped[vname]=grouped[vname]||[]).push({
          no: cNo>=0?String(row[cNo]||'').trim():'', st: cSt>=0?normStatus(String(row[cSt]||'')):'',
          lat: cLat>=0?(row[cLat]||''):'', lng: cLng>=0?(row[cLng]||''):'',
          sol: cSol>=0?String(row[cSol]||''):'', est: cEst>=0?String(row[cEst]||''):'',
          detail: cDet>=0?String(row[cDet]||''):'', name: cName>=0?String(row[cName]||''):'',
          phone: cPhone>=0?String(row[cPhone]||''):'', interest: cInt>=0?String(row[cInt]||''):''
        });
      }
      let updated=0, created=0, skipped=0;
      const mine = new Set(visibleVillages().map(x=>x.name.trim()));
      Object.keys(grouped).forEach(vn=>{
        let tv = state.villages.find(x=>x.name.trim()===vn.trim());
        if(!isAdmin()){
          // ผรม.: อัปเดตได้เฉพาะหมู่บ้านของตัวเอง และสร้างหมู่บ้านใหม่ไม่ได้
          if(!tv || !mine.has(vn.trim())){ skipped++; return; }
          updated++;
        } else if(!tv){
          tv = {id:uid(), name:vn, contractor:'', vendorId:null, ports:'', homesDone:0, start:'', end:'', issue:'',
                tasks:TEMPLATE.map(t=>({id:uid(),name:t.name,w:t.w,p:0,note:''})), houses:[]};
          state.villages.push(tv);
          B.jobs.push({id:uid(), name:vn, villageId:tv.id, vendorId:'', budget:'', qty:{}, bqty:{}, prices:{}, date:todayISO()});
          created++;
        } else updated++;
        tv.houses = grouped[vn];
        tv._hDirty = true;
        tv.homesDone = grouped[vn].filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
        if(cloudOn) cloudSaveHouses(tv);
      });
      persist(); bqPersist();
      renderUnitMode();
      toast('นำเข้าสำเร็จ: อัปเดต '+updated+(isAdmin()? ' · ใหม่ '+created : '')+' โครงการ'
            + (skipped? ' · ข้าม '+skipped+' โครงการที่ไม่ใช่ของคุณ' : ''));
    }catch(err){ toast('อ่านไฟล์ไม่สำเร็จ'); }
  };
  rd.readAsArrayBuffer(f);
  ev.target.value = '';
}

let unitSaveTimer=null;
function cloudSaveHouses(v){
  if(!cloudOn || !cloudUser || !v.cloudId) return;
  clearTimeout(unitSaveTimer);
  const dot=document.getElementById('syncDot'); if(dot){dot.textContent='⏳';dot.title='กำลังบันทึก Unit...';}
  unitSaveTimer = setTimeout(async ()=>{
    try{
      await sb.from('houses').delete().eq('village_id', v.cloudId);
      const rows = (v.houses||[]).filter(h=>h.no||h.st||h.name).map(h=>({ village_id:v.cloudId, no:h.no||'', status:h.st||'', lat:(+h.lat||null), lng:(+h.lng||null), solution:h.sol||'', estimate:h.est||'', detail:h.detail||'', cust_name:h.name||'', cust_phone:h.phone||'', interest:h.interest||'' }));
      for(let i=0;i<rows.length;i+=500){ await sb.from('houses').insert(rows.slice(i,i+500)); }
      await sb.from('villages').update({ homes_done:+v.homesDone||0 }).eq('id', v.cloudId);
      delete v._hDirty;
      if(dot){dot.textContent='✅';dot.title='บันทึกแล้ว';setTimeout(()=>{if(dot){dot.textContent='☁️';dot.title='เชื่อม cloud';}},1500);}
    }catch(e){ if(dot){dot.textContent='⚠️';dot.title='บันทึกไม่สำเร็จ';} }
  }, 1000);
}

/* ===== ซ่อมข้อมูลที่คอลัมน์เลื่อนอัตโนมัติ (ช่องพอร์ตได้เลข PO มา) ===== */
function autoFixShifted(){
  const bad = (state.villages||[]).filter(v=>{
    const p = String(v.ports==null?'':v.ports).trim();
    return /^\d+$/.test(p) && +p >= 100000;
  });
  if(!bad.length) return 0;
  bad.forEach(v=>{
    const poNumber = String(v.ports).trim();
    v.ports = v.homesDone || '';
    v.homesDone = (v.houses||[]).filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
    let p = (B.pos||[]).find(x=>String(x.code).trim()===poNumber);
    if(!p){ B.pos = B.pos||[]; p = {id:uid(), code:poNumber, name:'', amount:0}; B.pos.push(p); }
    const jb = B.jobs.find(j=>j.villageId===v.id);
    if(jb && !jb.poId) jb.poId = p.id;
  });
  persist(); bqPersist();
  return bad.length;
}


/* ===== กราฟความเคลื่อนไหวรายเดือน ===== */
/* กราฟแยกตามสิทธิ์: admin ไม่กรอง = ภาพรวมทั้งหมด · กรอง Vendor หรือ login เป็นผรม. = ของรายนั้น */
function trendKey(){
  if(!canViewAll()) return session.vendorId || '_none';
  return ui.dashVendor ? ui.dashVendor : '_all';
}
function trendScopeName(){
  const k = trendKey();
  if(k === '_all') return 'ภาพรวมทั้งหมด';
  const v = vendorById(k);
  return v ? v.name : 'ของคุณ';
}
function trendList(){
  B.trends = B.trends || {};
  const k = trendKey();
  if(!B.trends[k]) B.trends[k] = [];
  return B.trends[k];
}
function trendRows(){ return trendList().slice(); }
function trendAutoNow(vil){
  return { total: vil.reduce((s,v)=>s+(+v.ports||0),0), done: vil.reduce((s,v)=>s+(+v.homesDone||0),0) };
}
function trendChartHTML(vil){
  const rows = trendRows();
  if(!rows.length){
    const now = trendAutoNow(vil);
    return `<div class="panel" style="color:var(--muted);font-size:13px">
      ยังไม่มีข้อมูลกราฟของ <b>${esc(trendScopeName())}</b> · ตอนนี้ ${now.done} จาก ${now.total} หลัง
      ${isAdmin()?`<div class="data-row"><button class="btn btn-green btn-sm" onclick="trendSyncNow()">＋ เริ่มบันทึกเดือนแรกจากข้อมูลจริง</button></div>`:''}
    </div>`;
  }
  const W = 900, H = 320, PL = 54, PR = 16, PT = 26, PB = 42;
  const maxV = Math.max.apply(null, rows.map(r=>+r.total||0).concat([1000]));
  const top = Math.ceil(maxV/1000)*1000 + 1000;
  const x = i => PL + (W-PL-PR) * (rows.length>1 ? i/(rows.length-1) : .5);
  const y = v => PT + (H-PT-PB) * (1 - (v/top));
  const lineT = rows.map((r,i)=>`${x(i)},${y(+r.total||0)}`).join(' ');
  const lineD = rows.map((r,i)=>`${x(i)},${y(+r.done||0)}`).join(' ');
  const grid = [0,1,2,3,4,5,6,7].map(k=>{
    const v = top*k/7;
    return `<line x1="${PL}" y1="${y(v)}" x2="${W-PR}" y2="${y(v)}" stroke="#E6EDE1" stroke-width="1"/>
            <text x="${PL-8}" y="${y(v)+4}" text-anchor="end" font-size="11" fill="#8A9690">${Math.round(v)}</text>`;
  }).join('');
  const last = rows[rows.length-1];
  const gap = (+last.total||0) - (+last.done||0);
  return `
  <div class="panel" style="overflow-x:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
      <div style="font-size:13px;color:var(--muted)">
        <span style="display:inline-block;width:12px;height:3px;background:#9AA5A0;vertical-align:middle"></span> บ้านทั้งหมด
        &nbsp;&nbsp;<span style="display:inline-block;width:12px;height:3px;background:var(--green);vertical-align:middle"></span> เดินสายแล้ว
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span class="unit-count">${esc(trendScopeName())}</span>
        <button class="btn btn-dark btn-sm" onclick="capTrendChart()">📸 Cap กราฟ</button>
        ${isAdmin()?`<button class="btn btn-green btn-sm" onclick="trendSyncNow()">🔄 อัปเดตเดือนล่าสุด</button>
        <button class="btn btn-ghost btn-sm" onclick="trendEdit()">✏️ แก้ตัวเลข</button>`:''}
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:640px;height:auto;display:block">
      ${grid}
      <polyline points="${lineT}" fill="none" stroke="#9AA5A0" stroke-width="2.5"/>
      <polyline points="${lineD}" fill="none" stroke="var(--green)" stroke-width="3.5"/>
      ${rows.map((r,i)=>`
        <circle cx="${x(i)}" cy="${y(+r.done||0)}" r="3.5" fill="var(--green)"/>
        <text x="${x(i)}" y="${y(+r.total||0)-9}" text-anchor="middle" font-size="10.5" fill="#5C6B60">${+r.total||0}</text>
        <text x="${x(i)}" y="${y(+r.done||0)+16}" text-anchor="middle" font-size="10.5" font-weight="700" fill="var(--forest)">${+r.done||0}</text>
        <text x="${x(i)}" y="${H-14}" text-anchor="middle" font-size="10.5" fill="#5C6B60">${esc(r.m)}</text>`).join('')}
    </svg>
    <div style="font-size:12.5px;color:var(--muted);margin-top:4px">
      เดือนล่าสุด <b style="color:var(--forest)">${esc(last.m)}</b> · เดินสายแล้ว <b style="color:var(--green-dark)">${+last.done||0}</b> จาก <b>${+last.total||0}</b> หลัง · คงเหลือ <b style="color:var(--amber-dk)">${gap}</b> หลัง
    </div>
  </div>`;
}
/* ===== 📸 Cap กราฟ → คลิปบอร์ด/ดาวน์โหลด ===== */
function capTrendChart(){
  const box = $('trendChartBox');
  const svg = box && box.querySelector('svg');
  if(!svg){ toast('ยังไม่มีกราฟให้บันทึก'); return; }
  const rows = trendRows();
  const last = rows.length ? rows[rows.length-1] : null;

  // แปลงตัวแปรสีให้เป็นสีจริง เพราะ SVG เดี่ยวๆ ไม่รู้จัก var()
  let sv = new XMLSerializer().serializeToString(svg);
  sv = sv.replace(/var\(--green\)/g,'#78BE20').replace(/var\(--forest\)/g,'#0F3D24')
         .replace(/var\(--amber-dk\)/g,'#B57A00').replace(/var\(--muted\)/g,'#5C6B60');
  if(!/font-family/.test(sv)) sv = sv.replace('<svg', '<svg font-family="Sarabun, Tahoma, sans-serif"');

  const vb = (svg.getAttribute('viewBox')||'0 0 900 320').split(/\s+/).map(Number);
  const W = vb[2]||900, H = vb[3]||320;
  const SC = 2;                                   // ความละเอียด 2 เท่า
  const titleH = 58, footH = 34;
  const cv = document.createElement('canvas');
  cv.width = W*SC; cv.height = (H+titleH+footH)*SC;
  const ctx = cv.getContext('2d');
  ctx.scale(SC, SC);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H+titleH+footH);

  const img = new Image();
  img.onload = function(){
    // หัวเรื่อง
    ctx.fillStyle = '#0F3D24';
    ctx.font = '700 22px Sarabun, Tahoma, sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('FTTH Progress · ' + trendScopeName(), 20, 26);
    ctx.fillStyle = '#78BE20'; ctx.fillRect(20, 44, W-40, 3);
    // กราฟ
    ctx.drawImage(img, 0, titleH, W, H);
    // ท้ายภาพ
    ctx.fillStyle = '#5C6B60';
    ctx.font = '500 14px Sarabun, Tahoma, sans-serif';
    const info = last ? ('ล่าสุด ' + last.m + ' · เดินสายแล้ว ' + (+last.done||0) + ' จาก ' + (+last.total||0) + ' หลัง · คงเหลือ ' + ((+last.total||0)-(+last.done||0)) + ' หลัง') : '';
    ctx.fillText(info, 20, H+titleH+16);
    ctx.textAlign = 'right';
    ctx.fillText('อัปเดต ' + new Date().toLocaleDateString('th-TH'), W-20, H+titleH+16);
    ctx.textAlign = 'left';

    cv.toBlob(function(blob){
      if(!blob){ toast('สร้างรูปไม่สำเร็จ'); return; }
      const fname = 'progress-' + trendScopeName().replace(/\s+/g,'-') + '-' + todayISO() + '.png';
      const dl = function(){
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = fname; a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
        toast('⬇️ บันทึกรูปกราฟแล้ว — ส่งเข้าไลน์ได้เลย');
      };
      try{
        if(navigator.clipboard && window.ClipboardItem){
          navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ])
            .then(()=>toast('📋 คัดลอกกราฟแล้ว — ไปที่ไลน์แล้วกด Ctrl+V'))
            .catch(dl);
        } else dl();
      }catch(e){ dl(); }
    }, 'image/png');
  };
  img.onerror = function(){ toast('สร้างรูปไม่สำเร็จ'); };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(sv)));
}

function trendSyncNow(){
  if(!isAdmin()){ toast('ผู้ดูแลเป็นผู้บันทึกข้อมูลกราฟ'); return; }
  const vil = dashScopeVillages();
  const now = trendAutoNow(vil);
  const rows = trendList();
  const m = prompt('อัปเดตเดือนไหน? (เช่น Jun-26)  — กราฟของ: '+trendScopeName(), rows.length? rows[rows.length-1].m : 'Jun-26');
  if(!m) return;
  const found = rows.find(r=>r.m===m.trim());
  if(found){ found.total = now.total; found.done = now.done; }
  else rows.push({m:m.trim(), total:now.total, done:now.done});
  bqPersist(); renderDash();
  toast('อัปเดต '+m+' ('+trendScopeName()+') → ทั้งหมด '+now.total+' · เดินสายแล้ว '+now.done);
}
/* หมู่บ้านตาม scope ของกราฟ (ใช้ตอน sync ให้ตรงกับที่กรองอยู่) */

  return vil;
}

    <div style="overflow-x:auto"><table class="sum">
      <tr><th>เดือน</th><th class="r">บ้านทั้งหมด</th><th class="r">เดินสายแล้ว</th><th></th></tr>
      ${rows.map((r,i)=>`<tr>
        <td><input value="${esc(r.m)}" onchange="trendSet(${i},'m',this.value)" style="width:90px;font-family:'Sarabun',sans-serif;font-size:13px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px"></td>
        <td class="r"><input type="number" value="${+r.total||0}" onchange="trendSet(${i},'total',this.value)" style="width:90px;text-align:right;font-family:'Sarabun',sans-serif;font-size:13px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px"></td>
        <td class="r"><input type="number" value="${+r.done||0}" onchange="trendSet(${i},'done',this.value)" style="width:90px;text-align:right;font-family:'Sarabun',sans-serif;font-size:13px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px"></td>
        <td class="r"><button class="btn btn-red btn-sm" onclick="trendDel(${i})">✕</button></td>
      </tr>`).join('')}
    </table></div>
    <div class="data-row"><button class="btn btn-green btn-sm" onclick="trendAdd()">＋ เพิ่มเดือน</button>
      <button class="btn btn-ghost btn-sm" onclick="trendEdit()">เสร็จสิ้น</button></div>
  </div>`;
}
function trendSet(i, key, val){
  const rows = trendList();
  if(!rows[i]) return;
  rows[i][key] = (key==='m') ? String(val) : (+val||0);
  bqPersist();
  const box = $('trendChartBox'); if(box) box.innerHTML = trendChartHTML(dashScopeVillages());
}
function trendAdd(){
  const rows = trendList();
  const now = trendAutoNow(dashScopeVillages());
  rows.push({m:'', total:now.total, done:now.done});
  bqPersist(); renderDash();
}
function trendDel(i){
  const rows = trendList();
  rows.splice(i,1); bqPersist(); renderDash();
}

function renderDash(){
  let vil = visibleVillages();
  let jobs = canViewAll() ? B.jobs : B.jobs.filter(j=>j.vendorId===session.vendorId);
  // ตัวกรองราย Vendor / PO
  let filterBar = '';
  if(canViewAll() && B.vendors.length){
    if(ui.dashVendor){
      const fv = B.vendors.find(x=>x.id===ui.dashVendor);
      if(fv){
        const nm = fv.name.trim();
        vil = vil.filter(v=> v.vendorId===fv.id || (v.contractor||'').trim()===nm);
        const ids = new Set(vil.map(v=>v.id));
        jobs = jobs.filter(j=> j.vendorId===fv.id || ids.has(j.villageId));
      } else ui.dashVendor = null;
    }
    filterBar = `<div class="unit-toolbar" style="margin-bottom:6px">
      <span class="unit-count" style="min-width:56px">Vendor:</span>
      <button class="tab ${!ui.dashVendor?'on':''}" onclick="ui.dashVendor=null;renderDash()">ทั้งหมด</button>
      ${B.vendors.map(x=>`<button class="tab ${ui.dashVendor===x.id?'on':''}" onclick="ui.dashVendor='${x.id}';renderDash()">${esc(x.name)}</button>`).join('')}
    </div>`;
  }
  // ตัวกรอง PO
  if(isAdmin() && (B.pos||[]).length){
    if(ui.dashPO){
      const jobIds = new Set(poJobs(ui.dashPO).map(j=>j.villageId));
      vil = vil.filter(v=> jobIds.has(v.id));
      jobs = jobs.filter(j=> j.poId===ui.dashPO);
    }
    filterBar += `<div class="unit-toolbar" style="margin-bottom:12px">
      <span class="unit-count" style="min-width:56px">📄 PO:</span>
      <button class="tab ${!ui.dashPO?'on':''}" onclick="ui.dashPO=null;renderDash()">ทั้งหมด</button>
      ${B.pos.map(p=>`<button class="tab ${ui.dashPO===p.id?'on':''}" onclick="ui.dashPO='${p.id}';renderDash()">${esc(p.code||p.name)}</button>`).join('')}
    </div>`;
  }
  const n = vil.length;
  const done = vil.filter(v=>overall(v)>=100).length;
  const doing = vil.filter(v=>{const p=overall(v);return p>0&&p<100;}).length;
  const avg = n ? Math.round(vil.reduce((s,v)=>s+overall(v),0)/n) : 0;
  const ports = vil.reduce((s,v)=>s+(+v.ports||0),0);
  const homes = vil.reduce((s,v)=>s+(+v.homesDone||0),0);
  const po = jobs.reduce((s,j)=>s+jobBudget(j),0);
  const built = jobs.reduce((s,j)=>s+jobCost(j),0);
  const overPo = po && built > po;

  let vendorTable = '';
  if(canViewAll() && B.vendors.length){
    vendorTable = `
    <div class="section-label">แยกราย Vendor</div>
    <div class="panel" style="overflow-x:auto">
      <table class="sum">
        <tr><th>Vendor</th><th class="r">จำนวนงาน</th><th class="r">งาน %</th><th class="r">เดินสาย (หลัง)</th><th class="r">เดินสายแล้ว (หลัง)</th><th class="r">ค่างานสร้าง</th><th class="r">งบ PO</th><th class="r">คงเหลือ</th></tr>
        ${B.vendors.map(vd=>{
          const vv = state.villages.filter(x=>x.vendorId===vd.id || (x.contractor||'').trim()===vd.name.trim());
          const jj = B.jobs.filter(j=>j.vendorId===vd.id);
          const a = vv.length ? Math.round(vv.reduce((s,x)=>s+overall(x),0)/vv.length) : 0;
          const h = vv.reduce((s,x)=>s+(+x.homesDone||0),0);
          const pt = vv.reduce((s,x)=>s+(+x.ports||0),0);
          const c = jj.reduce((s,j)=>s+jobCost(j),0);
          const b = jj.reduce((s,j)=>s+jobBudget(j),0);
          const d = b - c;
          const doneN = vv.filter(x=>overall(x)>=100).length;
          return `<tr style="cursor:pointer" onclick="ui.dashVendor='${vd.id}';renderDash()">
            <td>${esc(vd.name)}</td>
            <td class="r"><b>${vv.length}</b>${doneN?` <small style="color:var(--muted)">(เสร็จ ${doneN})</small>`:''}</td>
            <td class="r">${a}%</td><td class="r">${pt||'-'}</td><td class="r"><b>${h}</b></td>
            <td class="r">${fmt(c)}</td><td class="r">${fmt(b)}</td>
            <td class="r money ${d<0?'neg':'pos'}">${fmt(d)}</td></tr>`;
        }).join('')}
      </table>
    </div>`;
  }

  $('modeDash').innerHTML = `
  <div class="section-label">1 · ภาพรวมงานสรุป${isAdmin()&&ui.dashVendor?' · '+esc((B.vendors.find(x=>x.id===ui.dashVendor)||{}).name||''):''}</div>
  <div class="panel">
    <div style="display:flex;align-items:baseline;gap:10px">
      <b style="font-family:'Taviraj',serif;font-size:42px;color:var(--forest);line-height:1">${avg}%</b>
      <span style="font-size:13px;color:var(--muted)">ความคืบหน้าเฉลี่ย ${n} หมู่บ้าน</span>
    </div>
    <div class="bar" style="margin-top:10px"><i style="width:${avg}%"></i></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <span class="chip idle">ยังไม่เริ่ม ${n-doing-done}</span>
      <span class="chip doing">กำลังดำเนินการ ${doing}</span>
      <span class="chip done">ส่งมอบแล้ว ${done}</span>
    </div>
  </div>

  <div class="section-label">2 · ความเคลื่อนไหวรายเดือน (หลัง)</div>
  <div id="trendChartBox">${trendChartHTML(vil)}</div>
  ${isAdmin()?trendEditHTML():''}

  <div class="section-label">3 · เดินสายเข้าบ้านสำเร็จ</div>
  <div class="panel">
    <div style="display:flex;align-items:baseline;gap:10px">
      <b style="font-family:'Taviraj',serif;font-size:42px;color:var(--forest);line-height:1">${homes}</b>
      <span style="font-size:13px;color:var(--muted)">หลัง ${ports?'จากทั้งหมด '+ports+' หลัง ('+Math.round(homes/ports*100)+'%)':''}</span>
    </div>
    ${ports?`<div class="bar" style="margin-top:10px"><i style="width:${Math.min(100,Math.round(homes/ports*100))}%"></i></div>`:''}
    <div style="font-size:11.5px;color:var(--muted);margin-top:8px">กรอกจำนวนหลังที่สำเร็จได้ในหน้าหมู่บ้านแต่ละแห่ง (ช่อง "เดินสายเข้าบ้านสำเร็จ")</div>
  </div>

  <div class="section-label">4 · งบประมาณ · ข้อมูลภายใน</div>
  <div class="kpis">
    <div class="kpi"><span class="lbl">งบใน PO</span><b>${fmt(po)} ฿</b><small>${jobs.length} งาน BOQ</small></div>
    <div class="kpi"><span class="lbl">งบที่สร้างงานไปแล้ว</span><b style="color:${overPo?'var(--red)':'var(--forest)'}">${fmt(built)} ฿</b><small class="${overPo?'neg':'pos'}" style="font-weight:700">${po? (overPo?'เกิน PO '+fmt(built-po):'คงเหลือ '+fmt(po-built))+' ฿':''}</small></div>
  </div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted)"><span>เบิกใช้จาก PO</span><span>${po?Math.round(built/po*100)+'%':'-'}</span></div>
    <div class="budget-bar"><i class="${overPo?'over':''}" style="width:${po?Math.min(100,built/po*100):0}%"></i></div>
  </div>
  ${vendorTable}
  ${filterBar}
  <div class="section-label">รายหมู่บ้านทั้งหมด · แตะแถวเพื่อเปิด (${vil.length})</div>
  <div class="panel" style="overflow-x:auto">
    <table class="sum">
      <tr>
        <th>Vendor</th><th>PO</th><th>หมู่บ้าน</th>
        <th class="r">%</th><th class="r">ต้องเดินสาย</th><th class="r">เดินสายแล้ว</th><th class="r">คงเหลือ</th>
        <th class="r">งบโครงการ</th><th class="r">ใช้ไปแล้ว</th><th class="r">งบคงเหลือ</th>
      </tr>
      ${vil.map(v=>{
        const p = overall(v);
        const jj = villageJobs(v).filter(j=> canViewAll() || j.vendorId===session.vendorId);
        const b = jj.reduce((s,j)=>s+jobBudget(j),0);
        const c = jj.reduce((s,j)=>s+jobCost(j),0);
        const poNm = jj.length ? jobPOName(jj[0]) : '';
        const ports = +v.ports||0, done = +v.homesDone||0;
        const left = Math.max(0, ports - done), bLeft = b ? b-c : 0;
        return `<tr style="cursor:pointer" onclick="gotoVillage('${v.id}')">
          <td>${esc(v.contractor||'-')}</td>
          <td>${poNm?esc(poNm):'<span style="color:var(--muted)">-</span>'}</td>
          <td class="vname">${esc(v.name)}</td>
          <td class="r num">${p}%</td>
          <td class="r num">${ports||'-'}</td>
          <td class="r num" style="color:var(--green-dark)"><b>${done}</b></td>
          <td class="r num" style="color:${left>0?'var(--amber-dk)':'var(--muted)'}">${ports?left:'-'}</td>
          <td class="r num">${b?fmt(b):'-'}</td>
          <td class="r num">${c?fmt(c):'-'}</td>
          <td class="r num ${b&&bLeft<0?'neg':'pos'}">${b?fmt(bLeft):'-'}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="10" style="color:var(--muted)">ยังไม่มีหมู่บ้าน</td></tr>'}
      ${vil.length?`<tr style="border-top:2px solid var(--forest)">
        <td colspan="3"><b>รวม ${vil.length} โครงการ</b></td>
        <td class="r num"><b>${Math.round(vil.reduce((s,v)=>s+overall(v),0)/vil.length)}%</b></td>
        <td class="r num"><b>${vil.reduce((s,v)=>s+(+v.ports||0),0)}</b></td>
        <td class="r num" style="color:var(--green-dark)"><b>${vil.reduce((s,v)=>s+(+v.homesDone||0),0)}</b></td>
        <td class="r num"><b>${vil.reduce((s,v)=>s+Math.max(0,(+v.ports||0)-(+v.homesDone||0)),0)}</b></td>
        <td class="r num"><b>${fmt(vil.reduce((s,v)=>s+villageJobs(v).filter(j=>canViewAll()||j.vendorId===session.vendorId).reduce((a,j)=>a+jobBudget(j),0),0))}</b></td>
        <td class="r num"><b>${fmt(vil.reduce((s,v)=>s+villageJobs(v).filter(j=>canViewAll()||j.vendorId===session.vendorId).reduce((a,j)=>a+jobCost(j),0),0))}</b></td>
        <td class="r num"><b>${fmt(vil.reduce((s,v)=>{const jj=villageJobs(v).filter(j=>canViewAll()||j.vendorId===session.vendorId);return s+jj.reduce((a,j)=>a+jobBudget(j),0)-jj.reduce((a,j)=>a+jobCost(j),0);},0))}</b></td>
      </tr>`:''}
    </table>
  </div>`;
}

</script>
</body>
</html>
