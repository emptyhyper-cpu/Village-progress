<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Fibre · Village Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --amber-dk:#B57A00;
    --green:#78BE20; --green-dark:#5A9417; --forest:#0F3D24; --forest2:#14532D;
    --tint:#F0F7E8; --paper:#FFFFFF; --ink:#1B2A20; --muted:#5C6B60;
    --amber:#F5A623; --line:#DCE8D2; --red:#D64545;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Sarabun',system-ui,sans-serif; background:var(--tint); color:var(--ink);
    min-height:100vh; font-size:15px;
  }
  h1,h2,h3,.display{font-family:'Taviraj',serif;}

  /* ===== Header ===== */
  header{
    background:linear-gradient(135deg,var(--forest) 0%,var(--forest2) 70%);
    color:#fff; padding:18px 16px 20px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:10px;background:var(--green);
    display:flex;align-items:center;justify-content:center;
    font-family:'Taviraj',serif;font-weight:700;font-size:20px;color:var(--forest);
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .brand h1{font-size:20px;font-weight:600;line-height:1.15;}
  .brand small{display:block;font-family:'Sarabun',sans-serif;font-weight:400;font-size:12px;opacity:.75;letter-spacing:.4px;}
  .header-stats{display:flex;gap:8px;margin-top:14px;}
  .hstat{
    flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-radius:10px;padding:8px 10px;
  }
  .hstat b{font-size:20px;font-family:'Taviraj',serif;color:var(--green);display:block;line-height:1.1;}
  .hstat span{font-size:11px;opacity:.8;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 90px;}

  /* ===== Village cards ===== */
  .vcard{
    background:var(--paper);border-radius:var(--radius);padding:14px;margin-bottom:12px;
    border:1px solid var(--line);box-shadow:0 1px 3px rgba(15,61,36,.06);cursor:pointer;
    transition:box-shadow .15s;
  }
  .vcard:active{box-shadow:0 0 0 2px var(--green);}
  .vcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .vcard h3{font-size:17px;font-weight:600;}
  .vcard .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .chip{
    font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;
  }
  .chip.done{background:#E4F3D2;color:var(--green-dark);}
  .chip.doing{background:#FDF0D8;color:#A86E08;}
  .chip.idle{background:#EDEFEA;color:var(--muted);}
  .bar{height:9px;background:#E9EFE3;border-radius:99px;margin-top:12px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#9BD84A);transition:width .3s;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-top:12px;}
  .bar-row .bar{flex:1;margin-top:0;}
  .pct{font-family:'Taviraj',serif;font-weight:700;font-size:19px;color:var(--forest);min-width:52px;text-align:right;}

  /* ===== Buttons ===== */
  .btn{
    font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:10px;
    padding:10px 16px;cursor:pointer;transition:filter .12s;
  }
  .btn:active{filter:brightness(.92);}
  .btn-green{background:var(--green);color:var(--forest);}
  .btn-lime{background:#DCEFC4;color:var(--forest);border:1.5px solid var(--green);}
  .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 8px;}
  .btn-grid .btn{padding:12px 10px;font-size:13.5px;line-height:1.35;}
  @media(max-width:480px){ .btn-grid{grid-template-columns:1fr;} }
  .btn-dark{background:var(--forest);color:#fff;}
  .btn-ghost{background:transparent;color:var(--forest);border:1.5px solid var(--line);}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
  .btn-red{background:#FBEAEA;color:var(--red);}

  .fab{
    position:fixed;bottom:18px;right:16px;z-index:30;
    box-shadow:0 4px 14px rgba(15,61,36,.35);font-size:15px;padding:13px 20px;border-radius:99px;
  }

  /* ===== Detail view ===== */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--forest);padding:4px 8px;}
  .section-label{
    font-size:11.5px;font-weight:700;letter-spacing:1.2px;color:var(--green-dark);
    text-transform:uppercase;margin:18px 0 8px;
  }
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}

  .field{margin-bottom:10px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .field input,.field textarea,.field select{
    width:100%;font-family:'Sarabun',sans-serif;font-size:15px;padding:9px 11px;
    border:1.5px solid var(--line);border-radius:9px;background:#FBFDF8;color:var(--ink);
  }
  .field input:focus,.field textarea:focus{outline:2px solid var(--green);border-color:transparent;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* ===== Task rows ===== */
  .task{
    border-bottom:1px dashed var(--line);padding:12px 0;
  }
  .task:last-child{border-bottom:none;}
  .task-head{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .task-name{font-weight:600;font-size:14.5px;flex:1;}
  .task-name input{
    width:100%;border:none;background:transparent;font:inherit;color:inherit;padding:2px 0;
  }
  .task-name input:focus{outline:none;border-bottom:1.5px solid var(--green);}
  .task-pct{font-family:'Taviraj',serif;font-weight:700;font-size:16px;min-width:44px;text-align:right;}
  .task-pct.p100{color:var(--green-dark);}
  .task-pct.p0{color:#B7C2BA;}
  .task-pct.pmid{color:var(--amber);}
  .qchips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
  .q{
    border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:5px 0;width:46px;
    font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;
  }
  .q.on{background:var(--green);border-color:var(--green);color:var(--forest);}
  .task input[type=range]{width:100%;margin-top:8px;accent-color:var(--green);}
  .task-meta{display:flex;gap:8px;margin-top:8px;}
  .task-meta input{
    flex:1;font-family:'Sarabun',sans-serif;font-size:13px;padding:6px 9px;
    border:1.5px solid var(--line);border-radius:8px;background:#FBFDF8;
  }
  .task-meta .w{flex:0 0 84px;}
  .task-del{background:none;border:none;color:#C4CFC7;font-size:16px;cursor:pointer;padding:2px 6px;}
  .weight-warn{font-size:12.5px;color:var(--red);margin-top:8px;font-weight:600;}

  /* ===== LINE report card (signature) ===== */
  .report-wrap{margin-top:10px;}
  .report{
    background:linear-gradient(160deg,var(--forest) 0%,var(--forest2) 100%);
    color:#fff;border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;
  }
  .report::after{
    content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,rgba(120,190,32,.28),transparent 70%);
  }
  .report .r-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .report .r-dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
  .report .r-brand span{font-size:12px;letter-spacing:1.6px;font-weight:700;opacity:.85;}
  .report h3{font-size:21px;font-weight:600;margin-bottom:2px;}
  .report .r-sub{font-size:12.5px;opacity:.7;margin-bottom:12px;}
  .report .r-big{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .report .r-big b{font-family:'Taviraj',serif;font-size:44px;font-weight:700;color:var(--green);line-height:1;}
  .report .r-big span{font-size:13px;opacity:.75;}
  .report .bar{background:rgba(255,255,255,.15);margin:8px 0 14px;}
  .r-task{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0;}
  .r-task .ic{width:18px;text-align:center;}
  .r-task .nm{flex:1;opacity:.92;}
  .r-task .pv{font-weight:700;font-family:'Taviraj',serif;}
  .r-issue{
    margin-top:12px;background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.4);
    border-radius:10px;padding:8px 11px;font-size:13px;
  }
  .r-foot{margin-top:12px;font-size:11.5px;opacity:.6;display:flex;justify-content:space-between;}
  .report-actions{display:flex;gap:8px;margin-top:10px;}
  .report-actions .btn{flex:1;}

  /* ===== Gantt / ตารางแผนงาน ===== */
  .gantt{background:#fff;border-radius:12px;padding:14px 12px 12px;}
  .g-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;border-bottom:2px solid var(--forest);padding-bottom:8px;margin-bottom:12px;}
  .g-title{font-family:'Taviraj',serif;font-weight:600;font-size:16px;color:var(--forest);}
  .g-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .g-brand{font-size:10.5px;font-weight:700;letter-spacing:1.4px;color:var(--green-dark);border:1.5px solid var(--green);border-radius:99px;padding:3px 9px;white-space:nowrap;}
  .g-axis{position:relative;height:18px;margin-bottom:4px;}
  .g-tick{position:absolute;top:0;font-size:10.5px;color:var(--muted);transform:translateX(-50%);white-space:nowrap;}
  .g-body{position:relative;}
  .g-gridline{position:absolute;top:0;bottom:0;width:0;border-left:1px dashed #DCE8D2;}
  .g-row{position:relative;padding:4px 0 9px;}
  .g-label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px;display:flex;justify-content:space-between;gap:6px;}
  .g-label .g-dates{font-weight:500;color:var(--muted);font-size:11px;white-space:nowrap;}
  .g-track{height:20px;background:#F2F6EE;border-radius:6px;position:relative;}
  .g-bar{position:absolute;top:0;height:100%;background:#D8ECBC;border-radius:6px;overflow:hidden;min-width:8px;}
  .g-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-dark));}
  .g-bar.late i{background:linear-gradient(90deg,var(--amber),#D98C0A);}
  .g-today{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--red);z-index:2;}
  .g-legend{display:flex;gap:14px;margin-top:12px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
  .g-legend i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:4px;}
  .g-empty{text-align:center;color:var(--muted);font-size:13.5px;padding:20px 10px;}

  /* ===== Date steppers (ปรับวันแบบเร็ว) ===== */
  .dctl{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
  .dgroup{display:flex;align-items:center;gap:3px;background:#F6FAF1;border:1.5px solid var(--line);border-radius:9px;padding:3px 4px;}
  .dgroup label{font-size:11px;color:var(--muted);font-weight:700;padding:0 3px;}
  .dbtn{border:1px solid var(--line);background:#fff;border-radius:6px;min-width:27px;height:27px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;color:var(--forest);cursor:pointer;padding:0 3px;}
  .dbtn:active{background:var(--green);}
  .dval{font-size:12.5px;font-weight:700;color:var(--forest);min-width:54px;text-align:center;}
  .dend{font-size:11.5px;color:var(--muted);font-weight:600;}
  .chain-btn{border:1.5px dashed var(--line);background:#fff;border-radius:8px;padding:5px 9px;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;}
  .chain-btn:active{border-color:var(--green);color:var(--green-dark);}
  .shift-all{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);font-weight:600;}

  .vgroup{display:flex;justify-content:space-between;align-items:baseline;margin:18px 2px 8px;gap:8px;}
  .vgroup h2{font-size:15px;color:var(--forest);font-weight:600;}
  .vgroup span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
  .vgroup:first-child{margin-top:4px;}

  .toast{
    position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
    background:var(--forest);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;
    box-shadow:0 4px 14px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  }
  .toast.show{opacity:1;}

  .empty{
    text-align:center;padding:50px 20px;color:var(--muted);
  }
  .empty .display{font-size:19px;color:var(--forest);margin-bottom:6px;}

  /* modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(15,61,36,.45);display:none;
    align-items:flex-end;justify-content:center;z-index:50;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:#fff;border-radius:18px 18px 0 0;padding:18px 16px 24px;width:100%;max-width:760px;
    max-height:88vh;overflow:auto;
  }
  .modal h2{font-size:19px;margin-bottom:14px;color:var(--forest);}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .modal-actions .btn{flex:1;}

  .data-row{display:flex;gap:8px;margin-top:10px;}
  .data-row .btn{flex:1;}
  @media(min-width:600px){
    .modal-bg{align-items:center;}
    .modal{border-radius:18px;}
  }
  @media(prefers-reduced-motion:reduce){ *{transition:none!important;} }


  /* ===== Unit editor (Excel-like) ===== */
  .ugrid-wrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:12px;}
  table.ugrid{border-collapse:collapse;width:100%;font-size:12.5px;min-width:900px;}
  table.ugrid th{background:var(--forest);color:#fff;padding:7px 6px;text-align:left;position:sticky;top:0;white-space:nowrap;font-weight:600;font-size:11.5px;}
  table.ugrid td{border:1px solid var(--line);padding:0;}
  table.ugrid td input,table.ugrid td select{width:100%;border:none;background:transparent;font-family:'Sarabun',sans-serif;font-size:12.5px;padding:6px 6px;color:var(--ink);}
  table.ugrid td input:focus,table.ugrid td select:focus{outline:2px solid var(--green);background:#F7FBF1;}
  table.ugrid tr:nth-child(even) td{background:#FAFCF7;}
  table.ugrid td.rownum{background:#EEF4E6;text-align:center;color:var(--muted);font-weight:600;width:36px;padding:6px 4px;}
  table.ugrid td.del{width:34px;text-align:center;}
  table.ugrid td.del button{border:none;background:none;color:#C4CFC7;cursor:pointer;font-size:14px;padding:4px;}
  table.ugrid td.del button:hover{color:var(--red);}
  .ustat-done{background:#E4F3D2 !important;}
  .unit-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .unit-count{font-size:12.5px;color:var(--muted);font-weight:600;}
  table.ugrid td.ucell.sel{background:#DDEFC6 !important;}
  table.ugrid td.ucell.anchor{outline:2px solid var(--forest);outline-offset:-2px;}
  table.ugrid td.ucell{cursor:cell;}
  /* ===== Mode nav ===== */
  .modebar{max-width:760px;margin:0 auto;padding:10px 12px 0;display:flex;gap:8px;}
  .mb{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:10px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;}
  .mb.on{background:var(--forest);border-color:var(--forest);color:#fff;}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;}
  .kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;}
  .kpi b{font-family:'Taviraj',serif;font-size:24px;color:var(--forest);display:block;line-height:1.25;margin-top:2px;}
  .kpi small{font-size:11.5px;color:var(--muted);}
  /* ===== BOQ module ===== */
  .role-chip{font-size:12px;border-radius:99px;padding:5px 12px;white-space:nowrap;font-weight:600;}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .tab{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;}
  .tab.on{background:var(--forest);border-color:var(--forest);color:#fff;}
  .login-wrap{max-width:380px;margin:24px auto;}
  .login-card{background:#fff;border-radius:18px;padding:26px 22px;border:1px solid var(--line);box-shadow:0 4px 20px rgba(15,61,36,.1);}
  .login-card h2{color:var(--forest);font-size:21px;margin-bottom:4px;}
  .login-card p{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .lock{width:44px;height:44px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
  .search{width:100%;font-family:'Sarabun',sans-serif;font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;margin-bottom:10px;}
  .sec-head{background:#EAF3DD;color:var(--forest);font-weight:700;font-size:12.5px;padding:7px 10px;border-radius:8px;margin:10px 0 4px;}
  .irow{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px dashed var(--line);}
  .irow .nm{flex:1;font-size:13px;line-height:1.35;}
  .irow .nm small{color:var(--muted);font-size:11px;}
  .irow input{width:88px;font-family:'Sarabun',sans-serif;font-size:14px;padding:9px 10px;border:1.5px solid var(--line);border-radius:8px;text-align:right;background:#FBFDF8;}
  .irow input.bq-in{font-size:14.5px;font-weight:600;padding:10px 10px;}
  .irow input.bq-in:focus{background:#fff;}
  .irow input:focus{outline:2px solid var(--green);border-color:transparent;}
  .irow .line-total{width:92px;text-align:right;font-weight:700;font-size:13px;color:var(--forest);white-space:nowrap;}
  .irow.hasqty{background:#F7FBF1;}
  .totalbar{position:sticky;bottom:12px;background:var(--forest);color:#fff;border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 -2px 14px rgba(15,61,36,.25);}
  .totalbar b{font-family:'Taviraj',serif;font-size:20px;color:var(--green);}
  .totalbar.over b{color:#FF9B9B;}
  .budget-bar{height:8px;background:#E9EFE3;border-radius:99px;overflow:hidden;margin-top:8px;}
  .budget-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#9BD84A);}
  .budget-bar i.over{background:linear-gradient(90deg,var(--amber),var(--red));}
  .money{font-family:'Taviraj',serif;font-weight:700;}
  .pos{color:var(--green-dark);} .neg{color:var(--red);}
  .notice{font-size:12px;color:var(--muted);background:#FDF6E4;border:1px solid #F0E3BE;border-radius:9px;padding:8px 11px;margin-bottom:10px;line-height:1.5;}
  table.sum{width:100%;border-collapse:collapse;font-size:13px;}
  table.sum th{background:#EAF3DD;color:var(--forest);text-align:left;padding:7px 8px;font-size:12px;}
  table.sum td{padding:9px 8px;border-bottom:1px solid #EDF2E8;font-size:13px;}
  table.sum tr:hover td{background:#F7FBF1;}
  table.sum td.num{font-variant-numeric:tabular-nums;white-space:nowrap;}
  table.sum td.vname{font-weight:600;color:var(--forest);line-height:1.35;}
  table.sum th{white-space:nowrap;font-weight:700;letter-spacing:.2px;}
  table.sum td.r,table.sum th.r{text-align:right;}
</style>
</head>
<body>

<div id="loginGate"></div>
<div id="appShell" style="display:none">
<header>
  <div class="brand">
    <div class="brand-mark">F</div>
    <h1>Village Progress<small>AIS FIBRE · งานก่อสร้างใต้ดิน FTTH</small></h1>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<nav class="modebar">
  <button id="mbDash" class="mb on" onclick="switchMode('dash')">📊 Dashboard</button>

/* ================= Default task template: แผนทีม 9 ขั้นตอน ================= */
const TEMPLATE = [
  {name:'Presale (sale AIS)', w:5},
  {name:'ติดตั้งตู้ ภายในโครงการ', w:15},
  {name:'เชื่อมต่อสาย ภายในตู้ ในโครงการ', w:10},
  {name:'เดินสายชุมสายภายนอกเข้าตู้โครงการ', w:15},
  {name:'เทสสัญญาณ เตรียมพร้อมให้บริการในโครงการ', w:5},
  {name:'เดินสาย Fiber Main จากตู้โครงการ เชื่อมต่อหัวต่อในโครงการ', w:20},
  {name:'เดินสาย Fiber 1 Core จากหัวต่อเข้าบ้านลูกบ้านตามรีเควส', w:15},
  {name:'เทสค่าสัญญาณภายในบ้านลูกบ้าน พร้อมติดตั้งอินเทอร์เน็ต', w:5},
  {name:'สมัครและติดตั้งอินเทอร์เน็ตบ้านที่เทสแล้วเสร็จ', w:10},
];

let state = { villages: [] };
let currentId = null;
let hasArtifactStorage = typeof window.storage !== 'undefined';

/* ================= Persistence ================= */

================================================================== */

/* ปิด cloud เมื่อไหร่ ให้ลบค่าใน 2 บรรทัดนี้ให้เหลือ '' */

let sb = null, cloudOn = false, cloudUser = null;
function initCloud(){
  if(SUPABASE_URL && SUPABASE_KEY && window.supabase){
    try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); cloudOn = true; }catch(e){ cloudOn=false; }

async function persist(){
  const json = JSON.stringify(state);
  if(hasArtifactStorage){
    try{ await window.storage.set(LS_KEY, json); }catch(e){}
  }
  try{ localStorage.setItem(LS_KEY, json); }catch(e){}
  cloudQueue();
}
async function restore(){
  if(hasArtifactStorage){
    try{
      const r = await window.storage.get(LS_KEY);
      if(r && r.value){ state = JSON.parse(r.value); return; }
    }catch(e){}
  }
  try{
    const s = localStorage.getItem(LS_KEY);
    if(s) state = JSON.parse(s);
  }catch(e){}
  state = state || {villages:[]};
  state.villages = (state.villages||[]).filter(Boolean);
  state.villages.forEach(v=>{ v.tasks = v.tasks||[]; v.houses = v.houses||[]; });
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'village-progress-' + todayISO() + '.json';
  a.click();
  toast('ดาวน์โหลดไฟล์ข้อมูลแล้ว');
}
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    try{
      const obj = JSON.parse(e.target.result);
      if(obj && obj.type === 'vendor-package'){
        state.villages = obj.villages || [];
        B.vendors = obj.boqVendors || [];
        B.jobs = obj.boqJobs || [];
        persist(); bqPersist();
        toast('นำเข้าข้อมูล Vendor สำเร็จ เข้าสู่ระบบได้เลย');
      } else if(obj && obj.villages){
        state = obj;
        persist();
        toast('โหลดข้อมูลสำเร็จ');
      } else { toast('ไฟล์ไม่ถูกต้อง'); return; }
      if(session.role){ render(); }
    }catch(err){ toast('ไฟล์ไม่ถูกต้อง'); }
  };
  rd.readAsText(f);
  ev.target.value = '';
}
function exportVendorPackage(vid){
  if(!requireAdmin('ส่งออกไฟล์ให้ Vendor')) return;
  const v = vendorById(vid); if(!v) return;
  const nm = v.name.trim();
  const wb = XLSX.utils.book_new();
  const wsA = XLSX.utils.aoa_to_sheet([
    ['Vendor', v.name],
    ['Username / อีเมล', v.user || '(ดูในแท็บ Vendor ของผู้ดูแล)'],
    ['Password', cloudOn ? '(ผู้ดูแลตั้งให้ในแอป — ไม่แสดงในไฟล์)' : (v.pass||'')],
    ['หมายเหตุ','ไฟล์ข้อมูลเฉพาะ '+nm+' · เข้าเว็บแล้ว login ด้วยอีเมล+รหัสที่ผู้ดูแลแจ้ง'],
    ['ราคา','ดูราคาต่อหน่วยของแต่ละโครงการได้ที่ sheet BOQ']
  ]);
  wsA['!cols'] = [{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsA, 'บัญชี');
  const vil = state.villages.filter(x=> x.vendorId===vid || (x.contractor||'').trim()===nm);
  // Progress sheet
  const maxSteps = Math.max.apply(null, vil.map(x=>(x.tasks||[]).length).concat([9]));
  const ph = ['โครงการ','Vendor','เลขที่ PO','พอร์ต','เดินสายสำเร็จ (หลัง)','วันเริ่มงาน','กำหนดส่งมอบ','ความคืบหน้ารวม (%)','ปัญหา / อุปสรรค'];
  for(let i=0;i<maxSteps;i++) ph.push('งาน'+(i+1)+' %');
  const pgAoa=[ph];
  vil.forEach(x=>{
    const jb0 = villageJobs(x)[0];
    const row=[x.name,x.contractor||'', jb0?jobPOName(jb0):'', x.ports||'',x.homesDone||'',x.start||'',x.end||'',overall(x),x.issue||''];
    for(let i=0;i<maxSteps;i++){const t=(x.tasks||[])[i]; row.push(t?(+t.p||0):'');}
    pgAoa.push(row);
  });
  const wsPg=XLSX.utils.aoa_to_sheet(pgAoa);
  wsPg['!cols'] = [{wch:30},{wch:14},{wch:16},{wch:8},{wch:14},{wch:12},{wch:13},{wch:14},{wch:26}].concat(Array(maxSteps).fill({wch:8}));
  wsPg['!freeze']={xSplit:1,ySplit:1};
  XLSX.utils.book_append_sheet(wb, wsPg, 'Progress');
  if(vil[0] && vil[0].tasks){
    const lr = pgAoa.length + 2;
    XLSX.utils.sheet_add_aoa(wsPg, [['ชื่อขั้นตอนงาน (อ้างอิงคอลัมน์ งานN %)']], {origin:'A'+lr});
    vil[0].tasks.forEach((t,i)=> XLSX.utils.sheet_add_aoa(wsPg, [['งาน'+(i+1), t.name]], {origin:'A'+(lr+1+i)}));
  }

  boqSheet(wb, vil);
  /* sheet PO เฉพาะ PO ที่มีงานของ Vendor รายนี้ — ตัวเลขนับเฉพาะงานของเขา
     และแสดงวงเงิน PO เฉพาะกรณีที่ทุกงานใน PO เป็นของเขา (กันเห็นงบเจ้าอื่น) */
  const myJobs = B.jobs.filter(j=> j.vendorId===vid);
  const myPos = (B.pos||[]).filter(p=> myJobs.some(j=> j.poId===p.id));
  if(myPos.length){
    const poA = [['เลขที่ PO','รายละเอียด','วงเงินตาม PO (บาท)','งบที่ตั้งไว้ของงานคุณ','ค่างานที่ใช้จริง','คงเหลือ','จำนวนโครงการของคุณ','โครงการในสังกัด','หมายเหตุ']];
    myPos.forEach(p=>{
      const all = poJobs(p.id);
      const mine = all.filter(j=> j.vendorId===vid);
      const sole = all.length && all.every(j=> j.vendorId===vid);
      const alloc = mine.reduce((a,j)=>a+jobBudget(j),0);
      const spent = mine.reduce((a,j)=>a+jobCost(j),0);
      poA.push([p.code||'', p.name||'', sole? (+p.amount||0) : '', alloc, spent, sole? (+p.amount||0)-spent : alloc-spent,
                mine.length, mine.map(j=>jobName(j)).join(' | '),
                sole? '' : 'PO นี้มีผู้รับเหมารายอื่นร่วมด้วย']);
    });
    const wsPO = XLSX.utils.aoa_to_sheet(poA);
    wsPO['!cols'] = [{wch:18},{wch:26},{wch:18},{wch:20},{wch:16},{wch:14},{wch:16},{wch:50},{wch:32}];
    XLSX.utils.book_append_sheet(wb, wsPO, 'PO');
  }


  const uHdr=['no','โครงการ','บ้านเลขที่','Lat','Lot','status','Solution','Estimate price','Detail','VLC','OLT','ชื่อ Name','บ้านเลขที่ Address','เบอร์โทร Phone number','สนใจ/ไม่สนใจ'];
  const uAoa=[uHdr]; let un=1;
  vil.forEach(x=>{ (x.houses||[]).forEach(h=>uAoa.push([un++,x.name,h.no||'',h.lat||'',h.lng||'',h.st||'',h.sol||'',h.est||'',h.detail||'',h.vlc||'',h.olt||'',h.name||'',h.addr||'',h.phone||'',h.interest||''])); });
  const wsU=XLSX.utils.aoa_to_sheet(uAoa); wsU['!freeze']={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb, wsU, 'Unit');
  XLSX.writeFile(wb, 'vendor-data-' + nm.replace(/\s+/g,'-') + '-' + todayISO() + '.xlsx');
  toast('Export ไฟล์ Excel ของ '+nm+' แล้ว (ส่งให้เขาทางไลน์ได้)');
}

/* ================= Helpers ================= */
const $ = id => document.getElementById(id);
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function thDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + (dt.getFullYear()+543);
}
function thDateShort(d){
  if(!d) return '-';
  const dt = new Date(d);
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return dt.getDate() + ' ' + m[dt.getMonth()];
}
function dayDiff(a,b){ return Math.round((new Date(b) - new Date(a))/86400000); }
function addDays(d,n){
  const dt = new Date(d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().slice(0,10);
}
function overall(v){
  const tw = v.tasks.reduce((s,t)=>s+(+t.w||0),0);
  if(!tw) return 0;
  return Math.round(v.tasks.reduce((s,t)=>s+(+t.w||0)*(+t.p||0),0)/tw);
}
function statusOf(pct){
  if(pct>=100) return ['done','ส่งมอบแล้ว'];
  if(pct>0) return ['doing','กำลังดำเนินการ'];
  return ['idle','ยังไม่เริ่ม'];
}
function emojiBar(pct){
  const n = Math.round(pct/10);
  return '▰'.repeat(n) + '▱'.repeat(10-n);
}
function taskIcon(p){ return p>=100 ? '✅' : (p>0 ? '🔶' : '⬜'); }
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= Village CRUD ================= */
function openAddModal(){ fillVendorList(); $('addModal').classList.add('open'); $('mName').focus(); }
function fillVendorList(){ const dl=$('vendorNameList'); if(dl) dl.innerHTML=B.vendors.map(v=>'<option value="'+esc(v.name)+'">').join(''); }
function closeAddModal(){ $('addModal').classList.remove('open'); }
function addVillage(){
  const name = $('mName').value.trim();
  if(!name){ toast('กรุณาใส่ชื่อหมู่บ้าน'); return; }
  const contractor = $('mContractor').value.trim();
  const mv = B.vendors.find(x=>x.name.trim()===contractor);
  const vilId = uid();
  state.villages.push({
    id: vilId, name,
    contractor, vendorId: mv? mv.id : null,
    ports: $('mPorts').value,
    start: $('mStart').value, end: $('mEnd').value,
    issue: '',
    tasks: TEMPLATE.map(t=>({id:uid(), name:t.name, w:t.w, p:0, note:''}))
  });
  B.jobs.push({id:uid(), name, villageId:vilId, vendorId: mv? mv.id:'', budget:'', qty:{}, prices:{}, date:todayISO()});
  bqPersist();
  ['mName','mContractor','mPorts','mStart','mEnd'].forEach(i=>$(i).value='');
  closeAddModal(); persist(); render();
  openDetail(state.villages[state.villages.length-1].id);
}
async function deleteVillage(id){
  if(!requireAdmin('ลบหมู่บ้าน')) return;
  const v = state.villages.find(x=>x.id===id);
  if(!confirm('ลบหมู่บ้านนี้และงาน BOQ ที่ผูกอยู่ทั้งหมด?')) return;
  const cid = v && v.cloudId;
  state.villages = state.villages.filter(v=>v.id!==id);
  B.jobs = B.jobs.filter(j=>j.villageId!==id);
  bqPersist();
  currentId = null; persist(); render();
  if(cloudOn && cloudUser && cid){
    const dot=document.getElementById('syncDot'); if(dot){dot.textContent='⏳';dot.title='กำลังลบบน cloud...';}
    try{
      await sb.from('houses').delete().eq('village_id', cid);
      await sb.from('boq_jobs').delete().eq('village_id', cid);
      await sb.from('villages').delete().eq('id', cid);
      if(dot){dot.textContent='✅';dot.title='ลบแล้ว';setTimeout(()=>{if(dot){dot.textContent='☁️';dot.title='เชื่อม cloud';}},1500);}
      toast('ลบหมู่บ้านออกจาก cloud แล้ว');
    }catch(e){
      if(dot){dot.textContent='⚠️';dot.title='ลบบน cloud ไม่สำเร็จ';}
      toast('ลบในเครื่องแล้ว แต่ลบบน cloud ไม่สำเร็จ — กด ☁️ แล้วลองใหม่');
    }
  }
}

/* ================= Task ops ================= */
function setP(vid,tid,val){
  const t = state.villages.find(v=>v.id===vid).tasks.find(t=>t.id===tid);
  t.p = Math.max(0,Math.min(100,+val||0));
  persist(); renderDetail();
}
function setField(vid,tid,key,val){
  const v = state.villages.find(v=>v.id===vid);
  if(tid){ v.tasks.find(t=>t.id===tid)[key] = val; }
  else { v[key] = val; }
  persist();
  refreshSummary(v);
}
function addTask(vid){
  const v = state.villages.find(v=>v.id===vid);
  v.tasks.push({id:uid(), name:'งานใหม่', w:0, p:0, note:''});
  persist(); renderDetail();
}
function delTask(vid,tid){
  const v = state.villages.find(v=>v.id===vid);
  v.tasks = v.tasks.filter(t=>t.id!==tid);
  persist(); renderDetail();
}

/* ================= Views ================= */
function render(){
  if(currentId){ renderDetail(); } else { renderList(); }
  renderHeader();
}
function renderHeader(){
  const vil = visibleVillages();
  const n = vil.length;
  const done = vil.filter(v=>overall(v)>=100).length;
  const doing = vil.filter(v=>{const p=overall(v);return p>0&&p<100;}).length;
  const avg = n ? Math.round(vil.reduce((s,v)=>s+overall(v),0)/n) : 0;

  ui.pickMode = mode;

function importExcelForVendor(ev){
  if(!requireAdmin('นำเข้าไฟล์ Master')){ ev.target.value=''; return; }
  const vid = ui.importVendorId;
  const vd = vendorById(vid);
  const f = ev.target.files[0]; if(!f || !vd){ ev.target.value=''; return; }
  const rd = new FileReader();
  rd.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const before = new Set(state.villages.map(v=>v.id));
      const ok = importMaster3(wb);
      if(!ok){ toast('ไม่พบรูปแบบที่รู้จักในไฟล์'); ev.target.value=''; return; }
      // บังคับให้ทุกโครงการที่เพิ่ง import/แตะ เป็นของ Vendor ที่เลือก
      let n=0;
      state.villages.forEach(v=>{
        if(!before.has(v.id) || !v.vendorId){
          v.vendorId = vd.id; v.contractor = vd.name;
          B.jobs.filter(j=>j.villageId===v.id).forEach(j=>{ j.vendorId = vd.id; });
          n++;
        }
      });
      autoFixShifted(); persist(); bqPersist();
      if(session.role){ currentId=null; render(); }
      toast('นำเข้าให้ '+vd.name+' แล้ว (ผูก Vendor '+n+' โครงการ)');
    }catch(err){ toast('อ่านไฟล์ Excel ไม่สำเร็จ'); }
    ev.target.value='';
  };
  rd.readAsArrayBuffer(f);
}

/* ================= Gantt / ตารางแผนงาน ================= */
/* วันเริ่มโครงการเป็นจุดอ้างอิง: ขยับวันเริ่มโครงการ = ทุกขั้นตอน + วันส่งมอบ เลื่อนตามเท่ากัน */
function setStartAnchor(vid, val){
  const v = state.villages.find(v=>v.id===vid);
  const old = v.start;
  v.start = val;
  if(old && val){
    const delta = dayDiff(old, val);
    if(delta !== 0){
      v.tasks.forEach(t=>{
        if(t.s) t.s = addDays(t.s, delta);
        if(t.e) t.e = addDays(t.e, delta);
      });
      if(v.end) v.end = addDays(v.end, delta);
      toast('เลื่อนทุกขั้นตอนตามวันเริ่มโครงการ (' + (delta>0?'+':'') + delta + ' วัน)');
    }
  } else if(!old && val && v.end && !v.tasks.some(t=>t.s)){
    toast('ตั้งวันเริ่มแล้ว กด ⚡ Gen เพื่อสร้างแผนทุกขั้นตอน');
  }
  persist(); renderDetail();
}

function chainAfterPrev(vid,tid){
  const v = state.villages.find(v=>v.id===vid);
  const i = v.tasks.findIndex(t=>t.id===tid);
  if(i <= 0){ toast('เป็นงานแรก ไม่มีงานก่อนหน้า'); return; }
  const prev = v.tasks[i-1];
  if(!prev.e){ toast('งานก่อนหน้ายังไม่มีวันที่'); return; }
  const t = v.tasks[i];
  const dur = (t.s && t.e) ? dayDiff(t.s,t.e)+1 : 7;
  t.s = addDays(prev.e,1); t.e = addDays(t.s,dur-1);
  persist(); renderDetail();
}

function genSchedule(vid){
  const v = state.villages.find(v=>v.id===vid);
  if(!v.start || !v.end){ toast('ใส่วันเริ่มงานและกำหนดส่งมอบก่อนครับ'); return; }
  if(dayDiff(v.start, v.end) < 1){ toast('กำหนดส่งมอบต้องอยู่หลังวันเริ่มงาน'); return; }
  const total = dayDiff(v.start, v.end) + 1;
  const tw = v.tasks.reduce((s,t)=>s+(+t.w||0),0);
  let cum = 0;
  v.tasks.forEach(t=>{
    const w = tw ? (+t.w||0) : 1;
    const TW = tw || v.tasks.length;
    const startOff = Math.min(Math.round(cum/TW*total), total-1);
    cum += w;
    let endOff = Math.round(cum/TW*total) - 1;
    if(endOff < startOff) endOff = startOff;
    endOff = Math.min(endOff, total-1);
    t.s = addDays(v.start, startOff);
    t.e = addDays(v.start, endOff);
  });
  persist(); renderDetail();
  toast('สร้างแผนงานตามน้ำหนักงานแล้ว ปรับวันที่รายงานได้เลย');
}

function ganttHTML(v){
  const dated = v.tasks.filter(t=>t.s && t.e);
  if(!dated.length){
    return `<div class="g-empty">ยังไม่มีวันที่ในแผนงาน<br>ใส่วันเริ่มงาน / กำหนดส่งมอบด้านบน แล้วกด ⚡ Gen แผนงานอัตโนมัติ<br>หรือใส่วันที่รายขั้นตอนเองในแต่ละงาน</div>`;
  }
  let min = dated.reduce((m,t)=> t.s<m? t.s:m, dated[0].s);
  let max = dated.reduce((m,t)=> t.e>m? t.e:m, dated[0].e);
  if(v.start && v.start<min) min = v.start;
  if(v.end && v.end>max) max = v.end;
  const total = Math.max(dayDiff(min,max)+1, 1);
  const step = total<=60 ? 7 : (total<=180 ? 14 : 30);
  const today = todayISO();

  let ticks='', grid='';
  for(let off=0; off<total; off+=step){
    const pct = (off/total*100).toFixed(2);
    ticks += `<div class="g-tick" style="left:${pct}%">${thDateShort(addDays(min,off))}</div>`;
    grid  += `<div class="g-gridline" style="left:${pct}%"></div>`;
  }

  const rows = v.tasks.map(t=>{
    if(!t.s || !t.e) return `<div class="g-row"><div class="g-label"><span>${esc(t.name)}</span><span class="g-dates">ยังไม่กำหนดวัน</span></div><div class="g-track"></div></div>`;
    const left = (dayDiff(min,t.s)/total*100).toFixed(2);
    const width = ((dayDiff(t.s,t.e)+1)/total*100).toFixed(2);
    const late = today > t.e && +t.p < 100;
    return `<div class="g-row">
      <div class="g-label"><span>${esc(t.name)}</span><span class="g-dates">${thDateShort(t.s)} – ${thDateShort(t.e)} · ${t.p}%</span></div>
      <div class="g-track"><div class="g-bar ${late?'late':''}" style="left:${left}%;width:${width}%"><i style="width:${t.p}%"></i></div></div>
    </div>`;
  }).join('');

  let todayLine = '';
  if(today >= min && today <= max){
    const tp = ((dayDiff(min,today)+0.5)/total*100).toFixed(2);
    todayLine = `<div class="g-today" style="left:${tp}%"></div>`;
  }

  return `<div class="gantt" id="ganttChart">
    <div class="g-head">
      <div>
        <div class="g-title">แผนงานก่อสร้าง · ${esc(v.name)}</div>
        <div class="g-sub">${esc(v.contractor)||'-'} · ${thDate(min)} – ${thDate(max)}${v.ports? ' · '+v.ports+' พอร์ต':''}</div>
      </div>
      <div class="g-brand">AIS FIBRE</div>
    </div>
    <div class="g-axis">${ticks}</div>
    <div class="g-body">${grid}${todayLine}${rows}</div>
    <div class="g-legend">
      <span><i style="background:#D8ECBC"></i>แผนงาน</span>
      <span><i style="background:linear-gradient(90deg,var(--green),var(--green-dark))"></i>ผลงานจริง</span>
      <span><i style="background:var(--amber)"></i>ล่าช้ากว่าแผน</span>
      <span><i style="background:var(--red);width:3px;border-radius:1px"></i> เส้นวันนี้ (${thDateShort(today)})</span>
    </div>
  </div>`;
}

function cellDate(val){
  if(val instanceof Date){
    const d = new Date(val.getTime() - val.getTimezoneOffset()*60000);
    return d.toISOString().slice(0,10);
  }
  if(typeof val === 'number' && val > 20000){
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().slice(0,10);
  }
  if(typeof val === 'string'){
    const s = val.trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  }
  return '';
}

/* รูปแบบที่ export จากแอปนี้ — อ่านกลับได้ครบทุกช่อง */
function parseAppFormat(aoa){
  const hi = aoa.findIndex(r => r && r[1] === 'ขั้นตอนงาน');
  if(hi < 0) return null;
  const meta = {};
  for(let i=0;i<hi;i++){ if(aoa[i] && aoa[i][0] !== '') meta[String(aoa[i][0])] = aoa[i][1]; }
  const tasks = [];
  for(let i=hi+1;i<aoa.length;i++){
    const r = aoa[i];
    if(!r || r[1] === '' || r[1] == null) continue;
    tasks.push({id:uid(), name:String(r[1]), w:+r[2]||0, p:+r[3]||0, s:cellDate(r[4]), e:cellDate(r[5]), note:String(r[6]||'')});
  }
  if(!tasks.length) return null;
  return {
    id: uid(),
    name: String(meta['โครงการ']||'โครงการนำเข้า'),
    contractor: String(meta['ผู้รับเหมา']||''),
    ports: String(meta['พอร์ต / หลังคาเรือน']||''),
    start: cellDate(meta['วันเริ่มงาน']),
    end: cellDate(meta['กำหนดส่งมอบ']),
    issue: String(meta['ปัญหา / อุปสรรค']||''),
    tasks
  };
}
/* รูปแบบแผนทีม (no / description / ผู้รับผิดชอบ) — อ่านชื่องานได้ แต่ช่องสีที่ระบายวันไม่สามารถอ่านได้ */
function parseTeamFormat(aoa, sn){
  const hi = aoa.findIndex(r => r && String(r[0]).trim().toLowerCase() === 'no' && String(r[1]).trim().toLowerCase() === 'description');
  if(hi < 0) return null;
  const name = (aoa[0] && aoa[0][0]) ? String(aoa[0][0]) : sn;
  const tasks = [];
  for(let i=hi+1;i<aoa.length;i++){
    const r = aoa[i];
    if(!r || r[1] === '' || r[1] == null) continue;
    tasks.push({id:uid(), name:String(r[1]), w:0, p:0, s:'', e:'', note:String(r[2]||'')});
  }
  if(!tasks.length) return null;
  const w = Math.floor(100/tasks.length);
  tasks.forEach((t,i)=> t.w = (i === tasks.length-1) ? 100 - w*(tasks.length-1) : w);
  return {id:uid(), name, contractor:'', ports:'', start:'', end:'', issue:'', tasks};
}

/* ตรวจคอลัมน์ส่วนสถานะรายหลังแบบยืดหยุ่น: รองรับทั้ง (ลำดับ,บ้านเลขที่,สถานะ,หมายเหตุ[,Lat,Long])
   และไฟล์ทีม (ลำดับ,โครงการ,บ้านเลขที่,Lat,Long,สถานะ,ผู้รับผิดชอบ) */
function detectHouseCols(block){
  const W = Math.max.apply(null, block.map(r=>r.length).concat([0]));
  const KEY = /ONU|ร้อยสาย|ท่อ|บ่อพัก|Terminate|Fiber|ลูกค้า|สำเร็จ|ติดตั้ง|ปล่อยสัญญาณ/i;
  let st=-1, stScore=0;
  for(let c=0;c<W;c++){
    const sc = block.filter(r=> KEY.test(String(r[c]==null?'':r[c]))).length;
    if(sc>stScore){ stScore=sc; st=c; }
  }
  let lat=-1;
  for(let c=0;c<W-1;c++){
    if(c===st) continue;
    const ok = block.filter(r=>{ const a=+r[c], b=+r[c+1]; return a>4&&a<21&&b>96&&b<106; }).length;
    if(ok > block.length*0.5){ lat=c; break; }
  }
  let addr=-1, aScore=-Infinity;
  for(let c=0;c<W;c++){
    if(c===st || c===lat || (lat>=0&&c===lat+1)) continue;
    const vals = block.map(r=>String(r[c]==null?'':r[c]).trim()).filter(Boolean);
    if(!vals.length) continue;
    const slash = vals.filter(v=>/\d+\s*\/\s*\d+/.test(v)).length / vals.length;
    const digit = vals.filter(v=>/\d/.test(v)).length / vals.length;
    const runNo = vals.length>2 && vals.every((v,i)=> String((+vals[0])+i)===v);
    const score = slash*3 + digit - (runNo?2:0);
    if(score > aScore){ aScore=score; addr=c; }
  }
  if(addr<0) addr = 1;
  let note=-1;
  if(st>=0){
    const cn = st+1;
    if(cn<W && cn!==lat && cn!==lat+1 && cn!==addr) note=cn;
  }
  return {addr, st, lat, note};
}

/* สร้าง sheet BOQ: fix 4 คอลัมน์ซ้าย + บล็อก 6 คอลัมน์ต่อโครงการ พร้อมสูตร + เส้นแบ่ง */
function boqSheet(wb, vil){
  const jobsFor = v => villageJobs(v).filter(j=> canViewAll() || j.vendorId===session.vendorId);
  const projs = vil.map(v=>({v, jb: jobsFor(v)[0]||null}));
  const nItem = ITEMS.length;
  const H1 = ['','','','FIX'];        // row 1: project name banner
  const H2 = ['ลำดับ','หมวด','รายการ','หน่วย'];  // row 2: column labels
  const blockCols = ['ราคา/หน่วย (โครงการนี้)','จำนวนตั้งงบ','งบประมาณ (บาท)','จำนวนที่ใช้แล้ว','ค่างานที่ใช้แล้ว (บาท)','งบคงเหลือ (บาท)'];
  projs.forEach(pr=>{
    H1.push(pr.v.name, '', '', '', '', '');
    blockCols.forEach(c=>H2.push(c));
  });
  const aoa = [H1, H2];
  ITEMS.forEach((it,idx)=>{
    const row = [idx+1, it.s, (it.on||it.n), it.u];
    projs.forEach(pr=>{
      const jb = pr.jb;
      const p  = (jb && jb.prices) ? jb.prices['i'+idx] : '';
      const bq = (jb && jb.bqty) ? jb.bqty['i'+idx] : '';
      const uq = (jb && jb.qty) ? jb.qty['i'+idx] : '';
      row.push(p===undefined?'':p, bq===undefined?'':bq, '', uq===undefined?'':uq, '', '');
    });
    aoa.push(row);
  });
  const totalRow = ['','','รวมทั้งโครงการ',''];
  projs.forEach(()=> totalRow.push('','','','','',''));
  aoa.push(totalRow);

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const colName = c => { let s=''; c++; while(c>0){ s=String.fromCharCode(65+(c-1)%26)+s; c=Math.floor((c-1)/26);} return s; };
  const first = 3, last = 2 + nItem, trow = last + 1;
  const cols = [{wch:6},{wch:22},{wch:48},{wch:7}];
  const merges = [];
  projs.forEach((pr,pi)=>{
    const base = 4 + pi*6;                    // 0-indexed first col of this block
    const cP=colName(base), cB=colName(base+1), cBud=colName(base+2), cU=colName(base+3), cUse=colName(base+4), cR=colName(base+5);
    merges.push({s:{r:0,c:base}, e:{r:0,c:base+5}});   // merge project-name banner
    for(let n=first;n<=last;n++){
      ws[cBud+n] = {t:'n', f:'IF(OR('+cP+n+'="",'+cB+n+'=""),"",'+cP+n+'*'+cB+n+')'};
      ws[cUse+n] = {t:'n', f:'IF(OR('+cP+n+'="",'+cU+n+'=""),"",'+cP+n+'*'+cU+n+')'};
      ws[cR+n]   = {t:'n', f:'IF('+cBud+n+'="","",'+cBud+n+'-IF('+cUse+n+'="",0,'+cUse+n+'))'};
    }
    ws[cBud+trow] = {t:'n', f:'SUM('+cBud+first+':'+cBud+last+')'};
    ws[cUse+trow] = {t:'n', f:'SUM('+cUse+first+':'+cUse+last+')'};
    ws[cR+trow]   = {t:'n', f:'SUM('+cR+first+':'+cR+last+')'};
    cols.push({wch:13},{wch:11},{wch:14},{wch:12},{wch:16},{wch:14});
    // thick left border to separate projects
    for(let n=1;n<=trow;n++){
      const cell = ws[cP+n]; if(cell){ cell.s = cell.s||{}; cell.s.border = {left:{style:'medium',color:{rgb:'0F3D24'}}}; }
    }
  });
  ws['!cols'] = cols;
  ws['!merges'] = merges;
  ws['!freeze'] = {xSplit:4, ySplit:2};
  XLSX.utils.book_append_sheet(wb, ws, 'BOQ');
}

/* ============ อ่านไฟล์ Master 3-sheet กลับเข้าโปรแกรม ============ */
function importMaster3(wb){
  const hasP = wb.SheetNames.includes('Progress');
  const hasB = wb.SheetNames.includes('BOQ');
  const hasU = wb.SheetNames.includes('Unit');
  if(!hasP && !hasB && !hasU) return false;
  const nameIdx = {}; ITEMS.forEach((it,i)=> nameIdx[it.n.trim()] = i);

  /* Progress sheet */
  const pa = hasP ? XLSX.utils.sheet_to_json(wb.Sheets['Progress'], {header:1, defval:''}) : [];
  const ph = (pa[0]||[]).map(String);
  const stepCols = [];
  ph.forEach((h,i)=>{ const m=/^งาน(\d+)/.exec(h); if(m) stepCols.push({i, n:+m[1]}); });
  if(wb.SheetNames.includes('PO')){
    const poa = XLSX.utils.sheet_to_json(wb.Sheets['PO'], {header:1, defval:''});
    B.pos = B.pos || [];
    for(let r=1;r<poa.length;r++){
      const code = String(poa[r][0]||'').trim(); if(!code) continue;
      let p = B.pos.find(x=>String(x.code).trim()===code);
      if(!p){ p={id:uid(), code, name:'', amount:0}; B.pos.push(p); }
      p.name = String(poa[r][1]||'');
      p.amount = +poa[r][2]||0;
    }
  }
  const poCol = ph.findIndex(h=>String(h).includes('PO'));
  /* หาคอลัมน์จากชื่อหัวตาราง (กันพังเมื่อมีการเพิ่ม/สลับคอลัมน์) */
  const H = (...keys)=>{ for(const k of keys){ const i=ph.findIndex(h=>String(h).includes(k)); if(i>=0) return i; } return -1; };
  const cName  = (()=>{ const i=H('โครงการ','หมู่บ้าน'); return i>=0?i:0; })();
  const cVend  = H('Vendor','ผู้รับเหมา');
  const cPorts = H('พอร์ต','หลังคาเรือน');
  const cDone  = H('เดินสายสำเร็จ','เดินสายแล้ว');
  const cStart = H('วันเริ่ม');
  const cEnd   = H('กำหนดส่ง','วันเสร็จ');
  const cIssue = H('ปัญหา');
  const byName = {};
  for(let r=1;r<pa.length;r++){
    const row = pa[r];
    const nm = String(row[cName]||'').trim();
    if(!nm || nm.startsWith('ชื่อขั้นตอน') || /^งาน\d+$/.test(nm)) continue;
    let v = state.villages.find(x=>x.name.trim()===nm);
    const contractor = cVend>=0 ? String(row[cVend]||'') : '';
    const mv = B.vendors.find(x=>x.name.trim()===contractor.trim());
    if(!v){ v = {id:uid(), name:nm, contractor, vendorId:mv?mv.id:null, ports:'', homesDone:'', start:'', end:'', issue:'', tasks:TEMPLATE.map(t=>({id:uid(),name:t.name,w:t.w,p:0,note:''})), houses:[]}; state.villages.push(v); }
    v.contractor = contractor; if(mv) v.vendorId = mv.id;
    if(cPorts>=0) v.ports = row[cPorts]||'';
    if(cDone>=0)  v.homesDone = row[cDone]||'';
    if(cStart>=0) v.start = cellDate(row[cStart]);
    if(cEnd>=0)   v.end = cellDate(row[cEnd]);
    if(cIssue>=0) v.issue = String(row[cIssue]||'');
    stepCols.forEach(sc=>{ if(v.tasks[sc.n-1] && row[sc.i]!=='' && row[sc.i]!=null) v.tasks[sc.n-1].p = Math.max(0,Math.min(100,+row[sc.i]||0)); });
    byName[nm] = v;
    if(!B.jobs.some(j=>j.villageId===v.id)) B.jobs.push({id:uid(), name:nm, villageId:v.id, vendorId:v.vendorId||'', budget:'', qty:{}, bqty:{}, prices:{}, date:todayISO()});
    if(poCol >= 0){
      const pcode = String(row[poCol]||'').trim();
      const jb = B.jobs.find(j=>j.villageId===v.id);
      if(jb && pcode){
        let p = (B.pos||[]).find(x=>String(x.code).trim()===pcode);
        if(!p){ B.pos = B.pos||[]; p={id:uid(), code:pcode, name:'', amount:0}; B.pos.push(p); }
        jb.poId = p.id;
      }
    }
  }

  /* BOQ sheet: read project blocks by banner row */
  const ba = hasB ? XLSX.utils.sheet_to_json(wb.Sheets['BOQ'], {header:1, defval:''}) : [];
  const banner = ba[0]||[]; const labels = ba[1]||[];
  const blocks = [];
  for(let c=4;c<banner.length;c++){
    if(String(banner[c]).trim()){ blocks.push({name:String(banner[c]).trim(), c}); }
  }
  blocks.forEach(bl=>{
    const v = byName[bl.name] || state.villages.find(x=>x.name.trim()===bl.name);
    if(!v) return;
    let jb = B.jobs.find(j=>j.villageId===v.id);
    if(!jb){ jb={id:uid(),name:v.name,villageId:v.id,vendorId:v.vendorId||'',budget:'',qty:{},bqty:{},prices:{},date:todayISO()}; B.jobs.push(jb); }
    jb.prices=jb.prices||{}; jb.bqty=jb.bqty||{}; jb.qty=jb.qty||{};
    for(let r=2;r<ba.length;r++){
      const row = ba[r];
      const nm = String(row[2]||'').trim();
      if(!nm || nameIdx[nm]==null) continue;
      const k='i'+nameIdx[nm];
      const p=+row[bl.c], bq=+row[bl.c+1], uq=+row[bl.c+3];
      if(!isNaN(p) && row[bl.c]!=='' && p>=0) jb.prices[k]=p; else delete jb.prices[k];
      if(bq>0) jb.bqty[k]=bq; else delete jb.bqty[k];
      if(uq>0) jb.qty[k]=uq; else delete jb.qty[k];
    }
  });

  /* Unit sheet → houses per village (แหล่งหลักของสถานะรายหลัง) */
  if(wb.SheetNames.includes('Unit')){
    const ua = XLSX.utils.sheet_to_json(wb.Sheets['Unit'], {header:1, defval:''});
    const uh = (ua[0]||[]).map(x=>String(x).toLowerCase());
    const col = (...keys)=>{ for(const key of keys){ const i=uh.findIndex(h=>h.includes(key)); if(i>=0) return i; } return -1; };
    const cVil=col('โครงการ'), cNo=col('บ้านเลขที่','address'), cLat=col('lat'), cLng=col('lot','lng','long'),
          cSt=col('status','สถานะ'), cSol=col('solution'), cEst=col('estimate'), cDet=col('detail'),
          cVlc=col('vlc'), cOlt=col('olt'), cName=col('name','ชื่อ'), cPhone=col('phone','เบอร์'), cInt=col('สนใจ','interest');
    const grouped = {};
    for(let r=1;r<ua.length;r++){
      const row = ua[r];
      const vil = String(row[cVil]||'').trim(); if(!vil) continue;
      (grouped[vil]=grouped[vil]||[]).push({
        no:String(row[cNo]||'').trim(), lat:cLat>=0?(+row[cLat]||''):'', lng:cLng>=0?(+row[cLng]||''):'',
        st:cSt>=0?String(row[cSt]||'').trim():'', sol:cSol>=0?String(row[cSol]||''):'', est:cEst>=0?String(row[cEst]||''):'',
        detail:cDet>=0?String(row[cDet]||''):'', vlc:cVlc>=0?String(row[cVlc]||''):'', olt:cOlt>=0?String(row[cOlt]||''):'',
        name:cName>=0?String(row[cName]||''):'', phone:cPhone>=0?String(row[cPhone]||''):'', interest:cInt>=0?String(row[cInt]||''):''
      });
    }
    Object.keys(grouped).forEach(vil=>{
      let v = state.villages.find(x=>x.name.trim()===vil.trim()) || byName[vil];
      if(!v){ v={id:uid(),name:vil,contractor:'',vendorId:null,ports:'',homesDone:'',start:'',end:'',issue:'',tasks:TEMPLATE.map(t=>({id:uid(),name:t.name,w:t.w,p:0,note:''})),houses:[]}; state.villages.push(v); if(!B.jobs.some(j=>j.villageId===v.id)) B.jobs.push({id:uid(),name:vil,villageId:v.id,vendorId:'',budget:'',qty:{},bqty:{},prices:{},date:todayISO()}); }
      v.houses = grouped[vil];
      v._hDirty = true;
      v.homesDone = grouped[vil].filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
    });
  }
  return true;
}

function parseAccountSheet(wb){
  const sn = wb.SheetNames.find(x=>x==='บัญชี');
  if(!sn) return null;
  const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
  const m = {}; aoa.forEach(r=>{ if(r && r[0]!=='') m[String(r[0])] = String(r[1]||''); });
  if(!m['Username'] || !m['Password']) return null;
  return {user:m['Username'], pass:m['Password'], name:m['Vendor']||m['Username']};
}

function bqRestore(){

  migrateItemInsert();

    B.trends = { _all: (B.trend && B.trend.length) ? B.trend : DEFAULT_TREND.map(x=>({m:x[0], total:x[1], done:x[2]})) };

  delete B.trend;
  if(!B.adminUser) B.adminUser = 'FTTH';
  if(!B.adminPass) B.adminPass = 'FTTHBBODN';
  (B.vendors||[]).forEach(v=>{
    if(!v.user) v.user = v.name;
    if(!v.pass) v.pass = v.pin || '';
  });
}

}

}

/* แทรกรายการ "Install duct in Sand" ที่ตำแหน่ง 89 -> เลื่อน key เดิมที่ >= 89 ไป +1 (ทำครั้งเดียว) */
const ITEM_INSERT_AT = 89, ITEMS_VERSION = 2;
function shiftKeys(obj){
  if(!obj) return obj;
  const out = {};
  Object.keys(obj).forEach(k=>{
    const idx = +k.slice(1);
    out['i' + (idx >= ITEM_INSERT_AT ? idx+1 : idx)] = obj[k];
  });
  return out;
}
function migrateItemInsert(){
  if((B.itemsV||1) >= ITEMS_VERSION) return;
  (B.jobs||[]).forEach(j=>{ j.prices = shiftKeys(j.prices); j.bqty = shiftKeys(j.bqty); j.qty = shiftKeys(j.qty); });
  (B.vendors||[]).forEach(v=>{ v.prices = shiftKeys(v.prices); });
  B.itemsV = ITEMS_VERSION;
  try{ localStorage.setItem(LS, JSON.stringify(B)); }catch(e){}
}

function poById(id){ return (B.pos||[]).find(p=>p.id===id); }
function poJobs(poId){ return B.jobs.filter(j=> j.poId===poId); }
function poAllocated(poId){ return poJobs(poId).reduce((s,j)=>s+jobBudget(j),0); }   // งบที่ตั้งไว้รวมทุกโครงการใน PO
function poSpent(poId){ return poJobs(poId).reduce((s,j)=>s+jobCost(j),0); }          // ค่างานที่ใช้จริงรวม
function poCeiling(po){ return +((po||{}).amount)||0; }                                // วงเงิน PO
function jobPOName(job){ const p = poById(job.poId); return p ? (p.code || p.name || '') : ''; }

function jobBudget(job){
  if(!job) return 0;
  let has=false, t=0;
  Object.keys(job.bqty||{}).forEach(k=>{
    const idx = +k.slice(1);
    if(!ITEMS[idx]) return;
    const q = +job.bqty[k]||0;
    if(q>0){ has=true; t += q * jobPrice(job, idx); }
  });
  return has ? t : (+job.budget||0);
}
function setBQty(jid, idx, val){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  job.bqty = job.bqty || {};
  if(val==='' || +val===0) delete job.bqty['i'+idx];
  else job.bqty['i'+idx] = +val;
  bqPersist();
  refreshJobTotals(job);
}
function refreshJobTotals(job){
  const bud = jobBudget(job), cost = jobCost(job);
  const g1=$('grandBudget'), g2=$('grandTotal'), g3=$('grandRemain');
  if(g1) g1.textContent = fmt(bud);
  if(g2) g2.textContent = fmt(cost);
  if(g3){ g3.textContent = fmt(bud-cost); g3.style.color = (bud && cost>bud)? '#FF9B9B' : ''; }
}
function jobCost(job){
  let t = 0;
  Object.keys(job.qty||{}).forEach(k=>{
    const idx = +k.slice(1);
    if(!ITEMS[idx]) return;
    t += (+job.qty[k]||0) * jobPrice(job, idx);
  });
  return t;
}
function setJobPrice(jid, idx, val){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  job.prices = job.prices || {};
  if(val === '') delete job.prices['i'+idx];
  else job.prices['i'+idx] = +val;
  bqPersist();
  refreshItemList();
  refreshJobTotals(job);
}

  realSession = null;
  const pb = document.getElementById('previewBar'); if(pb) pb.remove();
  if(cloudOn && sb){ try{ sb.auth.signOut(); }catch(e){} cloudUser=null; }
  session={role:null,vendorId:null};
  $('appShell').style.display='none';
  $('loginGate').style.display='';
  renderLogin();
}
function enterApp(role, vendorId){
  session={role, vendorId};
  migrateVendorIds();
  $('loginGate').style.display='';
  $('loginGate').innerHTML='';
  $('loginGate').style.display='none';
  $('appShell').style.display='';
  ui.tab='jobs';
  $('mbVendor').style.display = isAdmin() ? '' : 'none';
  switchMode('dash');
}
function migrateVendorIds(){
  autoFixShifted();
  let ch=false;
  B.jobs.forEach(j=>{
    if(!j.villageId){
      const m = state.villages.find(x=>x.name.trim()===String(j.name||'').trim());
      if(m){ j.villageId = m.id; ch=true; }
    }
  });
  state.villages.forEach(v=>{
    if(!B.jobs.some(j=>j.villageId===v.id)){
      B.jobs.push({id:uid(), name:v.name, villageId:v.id, vendorId:v.vendorId||'', budget:'', qty:{}, prices:{}, date:todayISO()});
      ch=true;
    }
  });
  state.villages.forEach(v=>{
    if(!v.vendorId && v.contractor){
      const m=B.vendors.find(x=>x.name.trim()===v.contractor.trim());
      if(m){ v.vendorId=m.id; ch=true; }
    }
  });
  if(ch){ persist(); bqPersist(); }
}
function isAdmin(){ return session.role==='admin'; }
function isPlanning(){ return session.role==='planning'; }
/* เห็นข้อมูลทุกเจ้าได้ไหม (admin หรือ AIS Planning) */
function canViewAll(){ return session.role==='admin' || session.role==='planning'; }
function roleLabel(){
  return session.role==='admin' ? 'ผู้ดูแล (AIS)'
       : session.role==='planning' ? 'AIS Planning'
       : ((vendorById(session.vendorId)||{}).name || 'ผู้รับเหมา');
}
/* กันไว้ในตัวฟังก์ชัน ไม่พึ่งการซ่อนปุ่มอย่างเดียว */
function requireAdmin(what){
  if(isAdmin()) return true;
  toast('เฉพาะผู้ดูแล (AIS) เท่านั้น' + (what? ' — '+what : ''));
  return false;
}

function setContractor(vid, val){
  const v = state.villages.find(v=>v.id===vid); if(!v) return;
  v.contractor = val;
  const m = B.vendors.find(x=>x.name.trim()===val.trim());
  v.vendorId = m ? m.id : null;
  B.jobs.filter(j=>j.villageId===vid).forEach(j=>{ j.vendorId = v.vendorId || ''; });
  bqPersist();
  persist(); refreshSummary(v);
}
function myVendorName(){ const v=vendorById(session.vendorId); return v? v.name:''; }
function visibleVillages(){
  if(canViewAll()) return state.villages;
  const nm = myVendorName().trim();
  return state.villages.filter(v=> v.vendorId===session.vendorId || (v.contractor||'').trim()===nm);

/* ================= ☁️ Cloud sync engine ================= */
let cloudSaveTimer = null, cloudDirty = false;
function cloudQueue(){
  if(!cloudOn || !cloudUser) return;
  cloudDirty = true;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(cloudPush, 1200);
  const dot = document.getElementById('syncDot'); if(dot){ dot.textContent='⏳'; dot.title='กำลังบันทึกขึ้น cloud...'; }
}
function jTasks(v){ return v.tasks||[]; }
async function cloudPush(){
  if(!cloudOn || !cloudUser || !cloudDirty) return;
  cloudDirty = false;
  const dot = document.getElementById('syncDot'); if(dot){ dot.textContent='☁️'; dot.title='กำลังซิงค์...'; }
  try{
    /* vendors (admin เท่านั้นที่มีสิทธิ์เขียนทุกราย) */
    if(isAdmin()){
      for(const v of B.vendors){
        await sb.from('vendors').upsert({ id:v.cloudId||undefined, name:v.name, prices:v.prices||{} }, {onConflict:'id'}).then(r=>{ if(r.data&&r.data[0]) v.cloudId=r.data[0].id; });
      }
    }
    /* PO (admin เท่านั้น) */
    let posTableOk = true;
    if(isAdmin() && (B.pos||[]).length){
      for(const p of B.pos){
        try{
          const { data, error } = await sb.from('pos').upsert({ id:p.cloudId||undefined, code:p.code, name:p.name||'', amount:+p.amount||0 }, {onConflict:'id'}).select('id').single();
          if(error) throw error;
          if(data) p.cloudId = data.id;
        }catch(e){ posTableOk = false; break; }   /* ยังไม่ได้รัน supabase-po.sql — ข้ามไปก่อน ไม่ให้ล้มทั้งชุด */
      }
      if(!posTableOk){
        const dot2=document.getElementById('syncDot');
        if(dot2) dot2.title = 'PO ยังไม่ซิงค์ขึ้น cloud — ต้องรัน supabase-po.sql ก่อน';
      }
    }
    /* villages + jobs + houses (เฉพาะที่เห็นได้ตาม RLS) */
    for(const v of visibleVillages()){
      const vrow = { id:v.cloudId||undefined, name:v.name, contractor:v.contractor||'', vendor_id: vendorCloudId(v.vendorId), ports:String(v.ports||''), homes_done:+v.homesDone||0, start_date:v.start||'', end_date:v.end||'', issue:v.issue||'', tasks:jTasks(v), updated_at:new Date().toISOString() };
      const { data } = await sb.from('villages').upsert(vrow, {onConflict:'id'}).select('id').single();
      if(data){ v.cloudId = data.id; }
      /* houses (Unit) — ส่งขึ้นเมื่อมีการเปลี่ยนแปลง */
      if(v.cloudId && v._hDirty){
        try{
          await sb.from('houses').delete().eq('village_id', v.cloudId);
          const hrows = (v.houses||[]).filter(h=>h.no||h.st||h.name).map(h=>({
            village_id:v.cloudId, no:h.no||'', status:h.st||'',
            lat:(+h.lat||null), lng:(+h.lng||null), solution:h.sol||'', estimate:h.est||'',
            detail:h.detail||'', vlc:h.vlc||'', olt:h.olt||'',
            cust_name:h.name||'', cust_addr:h.addr||'', cust_phone:h.phone||'', interest:h.interest||''
          }));
          for(let i=0;i<hrows.length;i+=500){ await sb.from('houses').insert(hrows.slice(i,i+500)); }
          delete v._hDirty;
        }catch(e){ /* คงธงไว้ ลองใหม่รอบหน้า */ }
      }
      const jb = B.jobs.find(j=>j.villageId===v.id);
      if(jb && v.cloudId){
        const poRow = (B.pos||[]).find(p=>p.id===jb.poId);
        const jrow = { id:jb.cloudId||undefined, village_id:v.cloudId, vendor_id:vendorCloudId(jb.vendorId), prices:jb.prices||{}, bqty:jb.bqty||{}, qty:jb.qty||{}, updated_at:new Date().toISOString() };
        if(posTableOk) jrow.po_id = poRow && poRow.cloudId ? poRow.cloudId : null;
        let jd = null;
        try{
          const r = await sb.from('boq_jobs').upsert(jrow, {onConflict:'id'}).select('id').single();
          jd = r.data;
        }catch(e){
          delete jrow.po_id;   /* คอลัมน์ po_id ยังไม่มี -> ส่งใหม่โดยไม่มี po_id */
          const r2 = await sb.from('boq_jobs').upsert(jrow, {onConflict:'id'}).select('id').single();
          jd = r2.data;
        }
        if(jd) jb.cloudId = jd.id;
      }
    }
    persistLocalOnly();
    if(dot){ dot.textContent='✅'; dot.title='ซิงค์แล้ว'; setTimeout(()=>{ if(dot&&!cloudDirty){dot.textContent='☁️';dot.title='เชื่อม cloud';} },1500); }
  }catch(e){
    if(dot){ dot.textContent='⚠️'; dot.title='ซิงค์ไม่สำเร็จ: '+e.message; }
    cloudDirty = true;
  }
}
function vendorCloudId(localVid){
  const v = B.vendors.find(x=>x.id===localVid); return v && v.cloudId ? v.cloudId : null;
}
function persistLocalOnly(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); localStorage.setItem(LS, JSON.stringify(B)); }catch(e){}
}
async function cloudPull(){
  if(!cloudOn || !cloudUser) return;
  const dot = document.getElementById('syncDot'); if(dot){ dot.textContent='⬇️'; dot.title='กำลังโหลดจาก cloud...'; }
  try{
    const { data:vends } = await sb.from('vendors').select('*');
    const { data:vils } = await sb.from('villages').select('*');
    const { data:jobs } = await sb.from('boq_jobs').select('*');
    let posRows = null, posOk = false;
    try{
      const r = await sb.from('pos').select('*');
      if(!r.error){ posRows = r.data || []; posOk = true; }
    }catch(e){ /* ตาราง pos ยังไม่มี -> เก็บ PO ในเครื่องไว้ */ }
    const { data:hs } = await sb.from('houses').select('*');
    if(vends){
      B.vendors = vends.filter(x=>{
        const r = x.role || (x.is_admin ? 'admin' : 'vendor');
        return r === 'vendor';
      }).map(x=>({ id:x.id, cloudId:x.id, name:x.name, user:'', pass:'', prices:x.prices||{} }));
    }
    const houseBy = {};
    (hs||[]).forEach(h=>{ (houseBy[h.village_id]=houseBy[h.village_id]||[]).push({ no:h.no, st:h.status, lat:h.lat||'', lng:h.lng||'', sol:h.solution, est:h.estimate, detail:h.detail, vlc:h.vlc, olt:h.olt, name:h.cust_name, addr:h.cust_addr, phone:h.cust_phone, interest:h.interest }); });
    /* กันข้อมูล Unit ในเครื่องหาย: ถ้า cloud ยังไม่มี ให้เก็บของเดิมไว้แล้วตั้งธงส่งขึ้นรอบถัดไป */
    const localByCloud = {}, localByName = {};
    (state.villages||[]).forEach(v=>{
      if(v.cloudId) localByCloud[v.cloudId] = v;
      if(v.name) localByName[String(v.name).trim()] = v;
    });
    let rescued = 0;
    state.villages = (vils||[]).map(v=>{
      const cloudHouses = houseBy[v.id] || [];
      const prev = localByCloud[v.id] || localByName[String(v.name||'').trim()];
      let houses = cloudHouses, dirty = false;
      if(!cloudHouses.length && prev && (prev.houses||[]).length){
        houses = prev.houses; dirty = true; rescued += houses.length;
      }
      const nv = { id:v.id, cloudId:v.id, name:v.name, contractor:v.contractor||'', vendorId:v.vendor_id,
                   ports:v.ports||'', homesDone:v.homes_done||0, start:v.start_date||'', end:v.end_date||'',
                   issue:v.issue||'', tasks:v.tasks||[], houses:houses };
      if(dirty){
        nv._hDirty = true;
        nv.homesDone = houses.filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
      }
      return nv;
    });
    if(rescued){ cloudDirty = true; setTimeout(cloudPush, 500); }
    autoFixShifted();
    /* PO: ใช้ของ cloud เมื่อดึงได้จริงและมีข้อมูล มิฉะนั้นคง PO ในเครื่องไว้ (กันหาย) */
    const localPos = (B.pos||[]).slice();
    let poRescued = false;
    if(posOk && posRows && posRows.length){
      B.pos = posRows.map(p=>({ id:p.id, cloudId:p.id, code:p.code, name:p.name||'', amount:+p.amount||0 }));
    } else if(localPos.length){
      B.pos = localPos; poRescued = true;      // cloud ยังไม่มี -> เก็บของเดิมไว้แล้วส่งขึ้นรอบหน้า
    } else {
      B.pos = [];
    }
    /* จับคู่ poId เดิมไว้ เผื่อ cloud ยังไม่มีคอลัมน์ po_id */
    const prevJobPO = {};
    (B.jobs||[]).forEach(j=>{ if(j.cloudId && j.poId) prevJobPO[j.cloudId] = j.poId; });
    const poCloudToLocal = {};
    (B.pos||[]).forEach(p=>{ if(p.cloudId) poCloudToLocal[p.cloudId] = p.id; });
    B.jobs = (jobs||[]).map(j=>{
      let poId = '';
      if(j.po_id) poId = poCloudToLocal[j.po_id] || j.po_id;
      else if(prevJobPO[j.id]) poId = prevJobPO[j.id];      // cloud ไม่มีข้อมูล -> คงของเดิม
      return { id:j.id, cloudId:j.id, villageId:j.village_id, vendorId:j.vendor_id, poId:poId, prices:j.prices||{}, bqty:j.bqty||{}, qty:j.qty||{} };
    });
    if(poRescued && isAdmin()){ cloudDirty = true; setTimeout(cloudPush, 800); }
    persistLocalOnly();
    if(session.role) render();
    if(dot){ dot.textContent='✅'; dot.title='โหลดจาก cloud แล้ว'; setTimeout(()=>{ if(dot){dot.textContent='☁️';dot.title='เชื่อม cloud';} },1500); }
    toast('โหลดข้อมูลจาก cloud แล้ว');
  }catch(e){ if(dot){ dot.textContent='⚠️'; dot.title='โหลดไม่สำเร็จ'; } }
}
/* อัปโหลดข้อมูลในเครื่องขึ้น cloud ครั้งแรก (รวม houses) */
async function cloudSeedFromLocal(){
  if(!requireAdmin('อัปโหลดข้อมูลขึ้น cloud')) return;
  if(!cloudOn || !cloudUser){ toast('ยังไม่ได้ตั้งค่า cloud'); return; }
  if(!confirm('อัปโหลดข้อมูลในเครื่องทั้งหมดขึ้น cloud? (ใช้ครั้งแรกครั้งเดียว)')) return;
  toast('กำลังอัปโหลดขึ้น cloud...');
  try{
    for(const p of (B.pos||[])){
      const { data } = await sb.from('pos').upsert({ id:p.cloudId||undefined, code:p.code, name:p.name||'', amount:+p.amount||0 }, {onConflict:'id'}).select('id').single();
      if(data) p.cloudId = data.id;
    }
    for(const vd of B.vendors){
      const { data } = await sb.from('vendors').upsert({ id:vd.cloudId||undefined, name:vd.name, prices:vd.prices||{} }, {onConflict:'id'}).select('id').single();
      if(data) vd.cloudId = data.id;
    }
    for(const v of state.villages){
      const { data } = await sb.from('villages').upsert({ id:v.cloudId||undefined, name:v.name, contractor:v.contractor||'', vendor_id:vendorCloudId(v.vendorId), ports:String(v.ports||''), homes_done:+v.homesDone||0, start_date:v.start||'', end_date:v.end||'', issue:v.issue||'', tasks:v.tasks||[] }, {onConflict:'id'}).select('id').single();
      if(data){
        v.cloudId = data.id;
        if((v.houses||[]).length){
          await sb.from('houses').delete().eq('village_id', v.cloudId);
          const rows = v.houses.map(h=>({ village_id:v.cloudId, no:h.no||'', status:h.st||'', lat:h.lat||null, lng:h.lng||null, solution:h.sol||'', estimate:h.est||'', detail:h.detail||'', vlc:h.vlc||'', olt:h.olt||'', cust_name:h.name||'', cust_addr:h.addr||'', cust_phone:h.phone||'', interest:h.interest||'' }));
          for(let i=0;i<rows.length;i+=500){ await sb.from('houses').insert(rows.slice(i,i+500)); }
        }
        const jb = B.jobs.find(j=>j.villageId===v.id);
        if(jb){
          const pRow = (B.pos||[]).find(p=>p.id===jb.poId);
          const { data:jd } = await sb.from('boq_jobs').upsert({ id:jb.cloudId||undefined, village_id:v.cloudId, vendor_id:vendorCloudId(jb.vendorId), po_id: pRow&&pRow.cloudId ? pRow.cloudId : null, prices:jb.prices||{}, bqty:jb.bqty||{}, qty:jb.qty||{} }, {onConflict:'id'}).select('id').single();
          if(jd) jb.cloudId=jd.id;
        }
      }
    }
    persistLocalOnly();
    toast('อัปโหลดขึ้น cloud สำเร็จ');
  }catch(e){ toast('อัปโหลดไม่สำเร็จ: '+e.message); }
}

  $('loginGate').innerHTML = `
  <div class="login-wrap">
    <div class="login-card">
      <div class="lock">🔒</div>
      <h2>FTTH Village Progress</h2>
      <p>Progress หมู่บ้าน + BOQ งบประมาณ · สิทธิ์การเห็นข้อมูลแยกตามผู้ใช้ กรุณาเข้าสู่ระบบ</p>
      ${cloudOn?'<div class="notice" style="text-align:left">☁️ โหมด Cloud — ข้อมูลซิงค์ทุกเครื่อง · ใช้ <b>อีเมล</b> + รหัสผ่านที่ผู้ดูแลสร้างให้</div>':''}
      <div class="field"><label>${cloudOn?'อีเมล':'Username'}</label><input id="loginUser" placeholder="${cloudOn?'อีเมล':'ชื่อผู้ใช้'}" autocomplete="off"></div>
      <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-green" style="width:100%" onclick="doLogin()">เข้าสู่ระบบ</button>
      <p style="margin-top:12px;margin-bottom:0;font-size:11.5px;color:var(--muted);text-align:center">การนำเข้าข้อมูลทำได้หลังเข้าสู่ระบบ</p>
    </div>
  </div>`;
}
async function doLogin(){
  const u = $('loginUser').value.trim();
  const p = $('loginPass').value;
  if(cloudOn){
    try{
      const { data, error } = await sb.auth.signInWithPassword({ email:u, password:p });
      if(error) throw error;
      cloudUser = data.user;
      const { data:me } = await sb.from('vendors').select('*').eq('auth_uid', cloudUser.id).single();
      await cloudPull();
      const r = me ? (me.role || (me.is_admin ? 'admin' : 'vendor')) : null;
      if(r === 'admin'){ enterApp('admin', null); }
      else if(r === 'planning'){ enterApp('planning', null); }
      else if(me){
        let lv = B.vendors.find(x=>x.cloudId===me.id);
        if(!lv){ lv={id:me.id, cloudId:me.id, name:me.name, prices:me.prices||{}}; B.vendors.push(lv); }
        enterApp('vendor', lv.id);
      } else { toast('บัญชีนี้ยังไม่ได้ผูกกับ Vendor — ติดต่อผู้ดูแล'); }
      return;
    }catch(e){ toast('เข้าสู่ระบบไม่สำเร็จ: '+(e.message||'')); return; }
  }
  if(u === B.adminUser && p === B.adminPass){ enterApp('admin', null); return; }
  const v = B.vendors.find(v=> v.user === u && v.pass === p);
  if(v){ enterApp('vendor', v.id); }
  else toast('Username หรือ Password ไม่ถูกต้อง');
}

  const cloudPanel = cloudOn ? `
  <div class="panel" style="border:1.5px solid var(--green)">
    <div class="section-label">☁️ Cloud — ข้อมูลซิงค์ทุกเครื่อง</div>

async function addVendor(){
  if(!requireAdmin('สร้างบัญชี')) return;
  const name = $('nvName').value.trim(), user = $('nvUser').value.trim(), pass = $('nvPass').value.trim();
  const role = $('nvRole') ? $('nvRole').value : 'vendor';
  if(!name || !user || !pass){ toast('กรอกชื่อ, '+(cloudOn?'อีเมล':'Username')+' และ Password ให้ครบ'); return; }
  if(cloudOn){
    if(pass.length < 6){ toast('รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'); return; }
    const email = user.includes('@') ? user : user+'@ais.local';
    try{
      const { data, error } = await sb.rpc('admin_create_account', {
        new_email: email, new_password: pass, disp_name: name, make_admin: (role==='admin')
      });
      if(error) throw error;
      if(role !== 'admin'){
        B.vendors.push({id:data, cloudId:data, name, user:email, pass:'', prices:{}});
        bqPersist();
      }
      $('nvName').value=''; $('nvUser').value=''; $('nvPass').value='';
      toast('สร้างบัญชี '+name+' แล้ว — login ด้วย '+email);
      renderAccounts();
    }catch(e){
      toast('สร้างไม่สำเร็จ: '+(e.message||'')+' (ถ้าเป็นครั้งแรก ต้องรัน supabase-admin-users.sql ก่อน)');
    }
    return;
  }
  if(user === B.adminUser || B.vendors.some(v=>v.user===user)){ toast('Username นี้ถูกใช้แล้ว'); return; }
  B.vendors.push({id:uid(), name, user, pass, prices:{}});
  bqPersist(); renderVendorMode(); toast('เพิ่ม '+name+' แล้ว');
}
function setVendorCred(id, key, val){
  const v = vendorById(id); if(!v) return;
  val = val.trim();
  if(!val){ toast('ค่าว่างไม่ได้'); bqRender(); return; }
  if(key==='user' && (val===B.adminUser || B.vendors.some(x=>x.id!==id && x.user===val))){ toast('Username นี้ถูกใช้แล้ว'); bqRender(); return; }
  v[key] = val; bqPersist(); toast('บันทึกแล้ว');
}
async function delVendor(id){
  const vd = B.vendors.find(v=>v.id===id);
  if(!confirm('ลบ Vendor นี้? งานที่ผูกอยู่จะไม่ถูกลบแต่จะไม่มีราคา')) return;
  const cid = vd && vd.cloudId;
  B.vendors = B.vendors.filter(v=>v.id!==id);
  bqPersist(); refreshAdminUI();
  if(cloudOn && cloudUser && cid){
    try{ await sb.from('vendors').delete().eq('id', cid); toast('ลบ Vendor ออกจาก cloud แล้ว'); }
    catch(e){ toast('ลบในเครื่องแล้ว แต่ลบบน cloud ไม่สำเร็จ'); }
  }
}
function saveAdminCred(){
  const u = $('adminUserIn').value.trim(), p = $('adminPassIn').value.trim();
  if(!u || !p){ toast('Username / Password ว่างไม่ได้'); return; }
  if(B.vendors.some(v=>v.user===u)){ toast('Username นี้ซ้ำกับ Vendor'); return; }
  B.adminUser = u; B.adminPass = p; bqPersist(); toast('บันทึกบัญชีผู้ดูแลแล้ว');
}

function itemsInUse(job){
  const set = new Set();
  ['prices','bqty','qty'].forEach(k=>Object.keys(job[k]||{}).forEach(x=>{ if(job[k][x]!=='' && job[k][x]!=null) set.add(x); }));
  return set.size;
}
function openAddItem(jid){

function renderAddItemList(){
  const job = B.jobs.find(j=>j.id===ui.addItemJob); if(!job) return;
  const q = (ui.addItemQ||'').trim().toLowerCase();
  const inUse = new Set(Object.keys(job.bqty||{}).concat(Object.keys(job.qty||{})).concat(Object.keys(job.prices||{})));

function jobRowCells(job, v, idx){
  const bq = (job.bqty||{})['i'+idx] || '';

  const pv = (job.prices||{})['i'+idx];

    ? `<input type="number" class="bq-in" style="width:88px" title="ราคา/หน่วย โครงการนี้" value="${pv!=null?pv:''}" placeholder="ราคา" onchange="setJobPrice('${job.id}',${idx},this.value)">`
    : `<div class="line-total" style="width:88px;font-weight:500;color:var(--muted)">${fmt(p)}</div>`;

    <input type="number" class="bq-in" style="width:74px" title="จำนวนตั้งงบ" placeholder="ตั้งงบ" value="${bq}" onchange="setBQty('${job.id}',${idx},this.value)">

function toggleSec(si){
  ui.openSecs = ui.openSecs || {};

function itemRows(rightCellFn, job){
  ui.openSecs = ui.openSecs || {};
  const q = (ui.q||'').toLowerCase();
  // group by section
  const secs = [];
  ITEMS.forEach((it, idx)=>{
    if(q && !(it.n.toLowerCase().includes(q) || it.s.toLowerCase().includes(q))) return;
    if(job && ui.qtyOnly && !((job.qty||{})['i'+idx] > 0) && !((job.bqty||{})['i'+idx] > 0)) return;
    if(!secs.length || secs[secs.length-1].name !== it.s) secs.push({name:it.s, idxs:[]});
    secs[secs.length-1].idxs.push(idx);
  });
  if(!secs.length) return '<div style="color:var(--muted);font-size:13px;padding:10px">ไม่พบรายการ</div>';
  let html = '';
  secs.forEach((sec, si)=>{
    const qtyN = job ? sec.idxs.filter(i=>(job.qty||{})['i'+i] > 0 || (job.bqty||{})['i'+i] > 0).length : 0;
    const key = sec.name.replace(/'/g,''); const open = !!ui.openSecs[key] || !!q || (job && ui.qtyOnly);
    html += `<div class="sec-head" style="cursor:pointer;user-select:none" onclick="toggleSec('${sec.name.replace(/'/g,'')}')">
      ${open?'▾':'▸'} ${esc(sec.name)} <span style="font-weight:500;opacity:.75">· ${sec.idxs.length} รายการ${qtyN?' · กรอกแล้ว '+qtyN:''}</span></div>`;
    if(!open) return;
    sec.idxs.forEach(idx=>{
      const it = ITEMS[idx];
      const has = job && (job.qty||{})['i'+idx] > 0;
      html += `<div class="irow ${has?'hasqty':''}">
        <div class="nm">${esc(it.n)}<br><small>${esc(it.u)}</small></div>
        ${rightCellFn(idx)}
      </div>`;
    });
  });
  return html;
}

function poHintHTML(job){
  const p = poById(job.poId); if(!p) return '';
  const ceil = poCeiling(p); if(!ceil) return '';
  const alloc = poAllocated(p.id);

  const others = poJobs(p.id).filter(j=>j.id!==job.id);
  return `<div class="notice" style="text-align:left;margin-top:10px;${free<0?'background:#FBEAEA;border-color:#F0C7C7;color:var(--red)':''}">
    📄 <b>${esc(p.code||p.name)}</b> · วงเงิน ${fmt(ceil)} ฿ · ตั้งงบไปแล้วรวม ${fmt(alloc)} ฿
    <br><b>${free>=0?'โยกเพิ่มเข้างานนี้ได้อีก '+fmt(free)+' ฿':'ตั้งงบเกินวงเงิน PO อยู่ '+fmt(-free)+' ฿ ต้องลดงานใดงานหนึ่ง'}</b>
    ${others.length?`<br><small>งานอื่นใน PO นี้: ${others.map(j=>esc(jobName(j))+' ('+fmt(jobBudget(j))+')').join(' · ')}</small>`:''}

function poCardHTML(p, isAdmin){
  const viewAll = canViewAll();
  const allJobs = poJobs(p.id);
  const jobs = allJobs.filter(j=> viewAll || j.vendorId===session.vendorId);
  const soleVendor = !viewAll && allJobs.length && allJobs.every(j=> j.vendorId===session.vendorId);
  const ceil = (viewAll || soleVendor) ? poCeiling(p) : 0;
  const alloc = viewAll ? poAllocated(p.id) : jobs.reduce((s,j)=>s+jobBudget(j),0);
  const spent = viewAll ? poSpent(p.id)     : jobs.reduce((s,j)=>s+jobCost(j),0);
  const free = ceil - alloc;
  const overAlloc = ceil && alloc > ceil;
  const overSpent = ceil && spent > ceil;
  const shared = !viewAll && !soleVendor && allJobs.length > jobs.length;
  return `
  <div class="panel" style="border:1.5px solid ${overAlloc?'var(--red)':'var(--line)'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div>
        <h3 style="font-size:16px;color:var(--forest)">📄 ${esc(p.code||'(ไม่มีเลข PO)')}</h3>
        ${p.name?`<div class="sub" style="font-size:12px;color:var(--muted)">${esc(p.name)}</div>`:''}
        <div class="sub" style="font-size:12px;color:var(--muted)">${jobs.length} โครงการ${shared?' ของคุณ (PO นี้มีผู้รับเหมารายอื่นร่วมด้วย)':''}</div>
      </div>
      ${isAdmin?`<div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="editPO('${p.id}')">แก้ไข</button>
        <button class="btn btn-red btn-sm" onclick="delPO('${p.id}')">ลบ</button>
      </div>`:''}
    </div>

    <table class="sum" style="margin-top:10px">
      ${(viewAll||soleVendor)?`<tr><td>วงเงินตาม PO</td><td class="r money">${ceil?fmt(ceil):'— ยังไม่ระบุ —'}</td></tr>`:''}
      <tr><td>${viewAll?'จัดสรรให้โครงการแล้ว (ตั้งงบ)':'งบที่ตั้งไว้ของงานคุณ'}</td><td class="r money ${overAlloc?'neg':''}">${fmt(alloc)}</td></tr>
      <tr><td>ค่างานที่ใช้จริง</td><td class="r money">${fmt(spent)}</td></tr>
      ${ceil?`<tr><td><b>${free>=0?'วงเงินคงเหลือให้จัดสรร':'จัดสรรเกินวงเงิน'}</b></td><td class="r money ${free<0?'neg':'pos'}"><b>${fmt(Math.abs(free))}</b></td></tr>`:''}
      ${ceil?`<tr><td>คงเหลือจริง (วงเงิน − ใช้จริง)</td><td class="r money ${overSpent?'neg':'pos'}">${fmt(ceil-spent)}</td></tr>`:''}
    </table>
    ${ceil?`<div class="budget-bar" style="margin-top:8px"><i class="${overSpent?'over':''}" style="width:${Math.min(100,spent/ceil*100)}%"></i></div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:4px">ใช้ไป ${Math.round(spent/ceil*100)}% ของวงเงิน PO</div>`:''}
    ${overAlloc?`<div class="notice" style="background:#FBEAEA;border-color:#F0C7C7;color:var(--red);margin-top:8px">⚠️ ตั้งงบรวมเกินวงเงิน PO อยู่ ${fmt(alloc-ceil)} ฿ — ต้องโยกงบออกจากบางโครงการ</div>`:''}

    ${jobs.length?`
    <div class="section-label" style="margin-top:12px">โครงการใน PO นี้ · แตะเพื่อเข้าไปโยกงบ</div>
    <table class="sum">
      <tr><th>โครงการ</th><th class="r">ตั้งงบ</th><th class="r">ใช้แล้ว</th><th class="r">คงเหลือ</th>${isAdmin?'<th></th>':''}</tr>
      ${jobs.map(j=>{
        const b=jobBudget(j), c=jobCost(j), d=b-c;
        return `<tr>
          <td style="cursor:pointer" onclick="ui.jobSel='${j.id}';ui.tab='jobs';bqRender()">${esc(jobName(j))}<br><small style="color:var(--muted)">${esc((vendorById(j.vendorId)||{}).name||'-')}</small></td>
          <td class="r money">${fmt(b)}</td>
          <td class="r">${fmt(c)}</td>
          <td class="r money ${d<0?'neg':'pos'}">${fmt(d)}</td>
          ${isAdmin?`<td class="r"><button class="btn btn-ghost btn-sm" onclick="setJobPO('${j.id}','')" title="เอาออกจาก PO นี้">✕</button></td>`:''}
        </tr>`;

      <tr style="border-top:2px solid var(--forest)"><td><b>รวม</b></td><td class="r money"><b>${fmt(alloc)}</b></td><td class="r"><b>${fmt(spent)}</b></td><td class="r money"><b>${fmt(alloc-spent)}</b></td>${isAdmin?'<td></td>':''}</tr>
    </table>`:'<div style="font-size:13px;color:var(--muted);margin-top:8px">ยังไม่มีโครงการใน PO นี้</div>'}
