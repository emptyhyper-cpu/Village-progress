<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Fibre · Village Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --green:#78BE20; --green-dark:#5A9417; --forest:#0F3D24; --forest2:#14532D;
    --tint:#F0F7E8; --paper:#FFFFFF; --ink:#1B2A20; --muted:#5C6B60;
    --amber:#F5A623; --line:#DCE8D2; --red:#D64545;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Sarabun',system-ui,sans-serif; background:var(--tint); color:var(--ink);
    min-height:100vh; font-size:15px;
  }
  h1,h2,h3,.display{font-family:'Taviraj',serif;}

  /* ===== Header ===== */
  header{
    background:linear-gradient(135deg,var(--forest) 0%,var(--forest2) 70%);
    color:#fff; padding:18px 16px 20px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:10px;background:var(--green);
    display:flex;align-items:center;justify-content:center;
    font-family:'Taviraj',serif;font-weight:700;font-size:20px;color:var(--forest);
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .brand h1{font-size:20px;font-weight:600;line-height:1.15;}
  .brand small{display:block;font-family:'Sarabun',sans-serif;font-weight:400;font-size:12px;opacity:.75;letter-spacing:.4px;}
  .header-stats{display:flex;gap:8px;margin-top:14px;}
  .hstat{
    flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-radius:10px;padding:8px 10px;
  }
  .hstat b{font-size:20px;font-family:'Taviraj',serif;color:var(--green);display:block;line-height:1.1;}
  .hstat span{font-size:11px;opacity:.8;}

  main{max-width:760px;margin:0 auto;padding:14px 12px 90px;}

  /* ===== Village cards ===== */
  .vcard{
    background:var(--paper);border-radius:var(--radius);padding:14px;margin-bottom:12px;
    border:1px solid var(--line);box-shadow:0 1px 3px rgba(15,61,36,.06);cursor:pointer;
    transition:box-shadow .15s;
  }
  .vcard:active{box-shadow:0 0 0 2px var(--green);}
  .vcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .vcard h3{font-size:17px;font-weight:600;}
  .vcard .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .chip{
    font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;
  }
  .chip.done{background:#E4F3D2;color:var(--green-dark);}
  .chip.doing{background:#FDF0D8;color:#A86E08;}
  .chip.idle{background:#EDEFEA;color:var(--muted);}
  .bar{height:9px;background:#E9EFE3;border-radius:99px;margin-top:12px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#9BD84A);transition:width .3s;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-top:12px;}
  .bar-row .bar{flex:1;margin-top:0;}
  .pct{font-family:'Taviraj',serif;font-weight:700;font-size:19px;color:var(--forest);min-width:52px;text-align:right;}

  /* ===== Buttons ===== */
  .btn{
    font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:10px;
    padding:10px 16px;cursor:pointer;transition:filter .12s;
  }
  .btn:active{filter:brightness(.92);}
  .btn-green{background:var(--green);color:var(--forest);}
  .btn-dark{background:var(--forest);color:#fff;}
  .btn-ghost{background:transparent;color:var(--forest);border:1.5px solid var(--line);}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:8px;}
  .btn-red{background:#FBEAEA;color:var(--red);}

  .fab{
    position:fixed;bottom:18px;right:16px;z-index:30;
    box-shadow:0 4px 14px rgba(15,61,36,.35);font-size:15px;padding:13px 20px;border-radius:99px;
  }

  /* ===== Detail view ===== */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--forest);padding:4px 8px;}
  .section-label{
    font-size:11.5px;font-weight:700;letter-spacing:1.2px;color:var(--green-dark);
    text-transform:uppercase;margin:18px 0 8px;
  }
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}

  .field{margin-bottom:10px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .field input,.field textarea,.field select{
    width:100%;font-family:'Sarabun',sans-serif;font-size:15px;padding:9px 11px;
    border:1.5px solid var(--line);border-radius:9px;background:#FBFDF8;color:var(--ink);
  }
  .field input:focus,.field textarea:focus{outline:2px solid var(--green);border-color:transparent;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* ===== Task rows ===== */
  .task{
    border-bottom:1px dashed var(--line);padding:12px 0;
  }
  .task:last-child{border-bottom:none;}
  .task-head{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .task-name{font-weight:600;font-size:14.5px;flex:1;}
  .task-name input{
    width:100%;border:none;background:transparent;font:inherit;color:inherit;padding:2px 0;
  }
  .task-name input:focus{outline:none;border-bottom:1.5px solid var(--green);}
  .task-pct{font-family:'Taviraj',serif;font-weight:700;font-size:16px;min-width:44px;text-align:right;}
  .task-pct.p100{color:var(--green-dark);}
  .task-pct.p0{color:#B7C2BA;}
  .task-pct.pmid{color:var(--amber);}
  .qchips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
  .q{
    border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:5px 0;width:46px;
    font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;
  }
  .q.on{background:var(--green);border-color:var(--green);color:var(--forest);}
  .task input[type=range]{width:100%;margin-top:8px;accent-color:var(--green);}
  .task-meta{display:flex;gap:8px;margin-top:8px;}
  .task-meta input{
    flex:1;font-family:'Sarabun',sans-serif;font-size:13px;padding:6px 9px;
    border:1.5px solid var(--line);border-radius:8px;background:#FBFDF8;
  }
  .task-meta .w{flex:0 0 84px;}
  .task-del{background:none;border:none;color:#C4CFC7;font-size:16px;cursor:pointer;padding:2px 6px;}
  .weight-warn{font-size:12.5px;color:var(--red);margin-top:8px;font-weight:600;}

  /* ===== LINE report card (signature) ===== */
  .report-wrap{margin-top:10px;}
  .report{
    background:linear-gradient(160deg,var(--forest) 0%,var(--forest2) 100%);
    color:#fff;border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;
  }
  .report::after{
    content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,rgba(120,190,32,.28),transparent 70%);
  }
  .report .r-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .report .r-dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
  .report .r-brand span{font-size:12px;letter-spacing:1.6px;font-weight:700;opacity:.85;}
  .report h3{font-size:21px;font-weight:600;margin-bottom:2px;}
  .report .r-sub{font-size:12.5px;opacity:.7;margin-bottom:12px;}
  .report .r-big{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .report .r-big b{font-family:'Taviraj',serif;font-size:44px;font-weight:700;color:var(--green);line-height:1;}
  .report .r-big span{font-size:13px;opacity:.75;}
  .report .bar{background:rgba(255,255,255,.15);margin:8px 0 14px;}
  .r-task{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0;}
  .r-task .ic{width:18px;text-align:center;}
  .r-task .nm{flex:1;opacity:.92;}
  .r-task .pv{font-weight:700;font-family:'Taviraj',serif;}
  .r-issue{
    margin-top:12px;background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.4);
    border-radius:10px;padding:8px 11px;font-size:13px;
  }
  .r-foot{margin-top:12px;font-size:11.5px;opacity:.6;display:flex;justify-content:space-between;}
  .report-actions{display:flex;gap:8px;margin-top:10px;}
  .report-actions .btn{flex:1;}

  /* ===== Gantt / ตารางแผนงาน ===== */
  .gantt{background:#fff;border-radius:12px;padding:14px 12px 12px;}
  .g-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;border-bottom:2px solid var(--forest);padding-bottom:8px;margin-bottom:12px;}
  .g-title{font-family:'Taviraj',serif;font-weight:600;font-size:16px;color:var(--forest);}
  .g-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .g-brand{font-size:10.5px;font-weight:700;letter-spacing:1.4px;color:var(--green-dark);border:1.5px solid var(--green);border-radius:99px;padding:3px 9px;white-space:nowrap;}
  .g-axis{position:relative;height:18px;margin-bottom:4px;}
  .g-tick{position:absolute;top:0;font-size:10.5px;color:var(--muted);transform:translateX(-50%);white-space:nowrap;}
  .g-body{position:relative;}
  .g-gridline{position:absolute;top:0;bottom:0;width:0;border-left:1px dashed #DCE8D2;}
  .g-row{position:relative;padding:4px 0 9px;}
  .g-label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px;display:flex;justify-content:space-between;gap:6px;}
  .g-label .g-dates{font-weight:500;color:var(--muted);font-size:11px;white-space:nowrap;}
  .g-track{height:20px;background:#F2F6EE;border-radius:6px;position:relative;}
  .g-bar{position:absolute;top:0;height:100%;background:#D8ECBC;border-radius:6px;overflow:hidden;min-width:8px;}
  .g-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-dark));}
  .g-bar.late i{background:linear-gradient(90deg,var(--amber),#D98C0A);}
  .g-today{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--red);z-index:2;}
  .g-legend{display:flex;gap:14px;margin-top:12px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
  .g-legend i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:4px;}
  .g-empty{text-align:center;color:var(--muted);font-size:13.5px;padding:20px 10px;}

  /* ===== Date steppers (ปรับวันแบบเร็ว) ===== */
  .dctl{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
  .dgroup{display:flex;align-items:center;gap:3px;background:#F6FAF1;border:1.5px solid var(--line);border-radius:9px;padding:3px 4px;}
  .dgroup label{font-size:11px;color:var(--muted);font-weight:700;padding:0 3px;}
  .dbtn{border:1px solid var(--line);background:#fff;border-radius:6px;min-width:27px;height:27px;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;color:var(--forest);cursor:pointer;padding:0 3px;}
  .dbtn:active{background:var(--green);}
  .dval{font-size:12.5px;font-weight:700;color:var(--forest);min-width:54px;text-align:center;}
  .dend{font-size:11.5px;color:var(--muted);font-weight:600;}
  .chain-btn{border:1.5px dashed var(--line);background:#fff;border-radius:8px;padding:5px 9px;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;}
  .chain-btn:active{border-color:var(--green);color:var(--green-dark);}
  .shift-all{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);font-weight:600;}

  .vgroup{display:flex;justify-content:space-between;align-items:baseline;margin:18px 2px 8px;gap:8px;}
  .vgroup h2{font-size:15px;color:var(--forest);font-weight:600;}
  .vgroup span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
  .vgroup:first-child{margin-top:4px;}

  .toast{
    position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
    background:var(--forest);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;
    box-shadow:0 4px 14px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  }
  .toast.show{opacity:1;}

  .empty{
    text-align:center;padding:50px 20px;color:var(--muted);
  }
  .empty .display{font-size:19px;color:var(--forest);margin-bottom:6px;}

  /* modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(15,61,36,.45);display:none;
    align-items:flex-end;justify-content:center;z-index:50;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:#fff;border-radius:18px 18px 0 0;padding:18px 16px 24px;width:100%;max-width:760px;
    max-height:88vh;overflow:auto;
  }
  .modal h2{font-size:19px;margin-bottom:14px;color:var(--forest);}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .modal-actions .btn{flex:1;}

  .data-row{display:flex;gap:8px;margin-top:10px;}
  .data-row .btn{flex:1;}
  @media(min-width:600px){
    .modal-bg{align-items:center;}
    .modal{border-radius:18px;}
  }
  @media(prefers-reduced-motion:reduce){ *{transition:none!important;} }

  /* ===== Mode nav ===== */
  .modebar{max-width:760px;margin:0 auto;padding:10px 12px 0;display:flex;gap:8px;}
  .mb{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:10px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;}
  .mb.on{background:var(--forest);border-color:var(--forest);color:#fff;}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;}
  .kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;}
  .kpi b{font-family:'Taviraj',serif;font-size:24px;color:var(--forest);display:block;line-height:1.25;margin-top:2px;}
  .kpi small{font-size:11.5px;color:var(--muted);}
  /* ===== BOQ module ===== */
  .role-chip{font-size:12px;border-radius:99px;padding:5px 12px;white-space:nowrap;font-weight:600;}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .tab{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;}
  .tab.on{background:var(--forest);border-color:var(--forest);color:#fff;}
  .login-wrap{max-width:380px;margin:24px auto;}
  .login-card{background:#fff;border-radius:18px;padding:26px 22px;border:1px solid var(--line);box-shadow:0 4px 20px rgba(15,61,36,.1);}
  .login-card h2{color:var(--forest);font-size:21px;margin-bottom:4px;}
  .login-card p{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .lock{width:44px;height:44px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
  .search{width:100%;font-family:'Sarabun',sans-serif;font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;margin-bottom:10px;}
  .sec-head{background:#EAF3DD;color:var(--forest);font-weight:700;font-size:12.5px;padding:7px 10px;border-radius:8px;margin:10px 0 4px;}
  .irow{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px dashed var(--line);}
  .irow .nm{flex:1;font-size:13px;line-height:1.35;}
  .irow .nm small{color:var(--muted);font-size:11px;}
  .irow input{width:88px;font-family:'Sarabun',sans-serif;font-size:13.5px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;text-align:right;background:#FBFDF8;}
  .irow input:focus{outline:2px solid var(--green);border-color:transparent;}
  .irow .line-total{width:92px;text-align:right;font-weight:700;font-size:13px;color:var(--forest);white-space:nowrap;}
  .irow.hasqty{background:#F7FBF1;}
  .totalbar{position:sticky;bottom:12px;background:var(--forest);color:#fff;border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 -2px 14px rgba(15,61,36,.25);}
  .totalbar b{font-family:'Taviraj',serif;font-size:20px;color:var(--green);}
  .totalbar.over b{color:#FF9B9B;}
  .budget-bar{height:8px;background:#E9EFE3;border-radius:99px;overflow:hidden;margin-top:8px;}
  .budget-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#9BD84A);}
  .budget-bar i.over{background:linear-gradient(90deg,var(--amber),var(--red));}
  .money{font-family:'Taviraj',serif;font-weight:700;}
  .pos{color:var(--green-dark);} .neg{color:var(--red);}
  .notice{font-size:12px;color:var(--muted);background:#FDF6E4;border:1px solid #F0E3BE;border-radius:9px;padding:8px 11px;margin-bottom:10px;line-height:1.5;}
  table.sum{width:100%;border-collapse:collapse;font-size:13px;}
  table.sum th{background:#EAF3DD;color:var(--forest);text-align:left;padding:7px 8px;font-size:12px;}
  table.sum td{padding:7px 8px;border-bottom:1px dashed var(--line);}
  table.sum td.r,table.sum th.r{text-align:right;}
</style>
</head>
<body>

<div id="loginGate"></div>
<div id="appShell" style="display:none">
<header>
  <div class="brand">
    <div class="brand-mark">F</div>
    <h1>Village Progress<small>AIS FIBRE · งานก่อสร้างใต้ดิน FTTH</small></h1>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<nav class="modebar">
  <button id="mbDash" class="mb on" onclick="switchMode('dash')">📊 Dashboard</button>
  <button id="mbProgress" class="mb" onclick="switchMode('progress')">🏘️ Progress</button>
  <button id="mbBoq" class="mb" onclick="switchMode('boq')">💰 BOQ</button>
  <button id="mbVendor" class="mb" style="display:none" onclick="switchMode('vendor')">👷 Vendor</button>
  <button id="mbPlan" class="mb" onclick="switchMode('plan')">📐 Plan</button>
  <button class="mb" style="flex:0 0 auto" onclick="logout()">ออก</button>
</nav>
<div id="modeDash" style="display:none;max-width:760px;margin:0 auto;padding:12px 12px 40px"></div>
<main id="modeProgress" style="display:none">
  <div id="listView"></div>
  <div id="detailView" style="display:none"></div>
</main>
<div id="modeBoq" style="display:none;max-width:760px;margin:0 auto;padding:12px 12px 90px"></div>
<div id="modeVendor" style="display:none;max-width:760px;margin:0 auto;padding:12px 12px 90px"></div>
<div id="modePlan" style="display:none;padding:0">
  <iframe id="planFrame" style="width:100%;height:calc(100vh - 130px);min-height:640px;border:none;display:block;background:#fff" title="FTTH Plan Status"></iframe>
</div>

<button class="btn btn-green fab" id="fabAdd" onclick="openAddModal()">＋ เพิ่มหมู่บ้าน</button>
</div>

<!-- Add village modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2>เพิ่มหมู่บ้านใหม่</h2>
    <div class="field"><label>ชื่อหมู่บ้าน / โครงการ</label><input id="mName" placeholder="เช่น โครงการวีเว่ บางนา กม.7"></div>
    <div class="grid2">
      <div class="field"><label>Vendor / ผู้รับเหมา</label><input id="mContractor" list="vendorNameList" placeholder="เลือกหรือพิมพ์ชื่อ Vendor"><datalist id="vendorNameList"></datalist></div>
      <div class="field"><label>จำนวนพอร์ต / หลังคาเรือน</label><input id="mPorts" type="number" placeholder="เช่น 120"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>วันเริ่มงาน</label><input id="mStart" type="date"></div>
      <div class="field"><label>กำหนดส่งมอบ</label><input id="mEnd" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">ยกเลิก</button>
      <button class="btn btn-green" onclick="addVillage()">สร้างแผนงาน</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="importJSON(event)">
<input type="file" id="xlsxInput" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
<input type="file" id="boqXlsxIn" accept=".xlsx,.xls" style="display:none">

<script>
/* ================= Default underground task template ================= */
/* ================= Default task template: แผนทีม 9 ขั้นตอน ================= */
const TEMPLATE = [
  {name:'Presale (sale AIS)', w:5},
  {name:'ติดตั้งตู้ ภายในโครงการ', w:15},
  {name:'เชื่อมต่อสาย ภายในตู้ ในโครงการ', w:10},
  {name:'เดินสายชุมสายภายนอกเข้าตู้โครงการ', w:15},
  {name:'เทสสัญญาณ เตรียมพร้อมให้บริการในโครงการ', w:5},
  {name:'เดินสาย Fiber Main จากตู้โครงการ เชื่อมต่อหัวต่อในโครงการ', w:20},
  {name:'เดินสาย Fiber 1 Core จากหัวต่อเข้าบ้านลูกบ้านตามรีเควส', w:15},
  {name:'เทสค่าสัญญาณภายในบ้านลูกบ้าน พร้อมติดตั้งอินเทอร์เน็ต', w:5},
  {name:'สมัครและติดตั้งอินเทอร์เน็ตบ้านที่เทสแล้วเสร็จ', w:10},
];

let state = { villages: [] };
let currentId = null;
let hasArtifactStorage = typeof window.storage !== 'undefined';

/* ================= Persistence ================= */
const LS_KEY = 'ftth-village-progress';
async function persist(){
  const json = JSON.stringify(state);
  if(hasArtifactStorage){
    try{ await window.storage.set(LS_KEY, json); }catch(e){}
  }
  try{ localStorage.setItem(LS_KEY, json); }catch(e){} /* ตอน deploy บน Vercel จะเก็บในเครื่องผู้ใช้ */
}
async function restore(){
  if(hasArtifactStorage){
    try{
      const r = await window.storage.get(LS_KEY);
      if(r && r.value){ state = JSON.parse(r.value); return; }
    }catch(e){}
  }
  try{
    const s = localStorage.getItem(LS_KEY);
    if(s) state = JSON.parse(s);
  }catch(e){}
  state = state || {villages:[]};
  state.villages = (state.villages||[]).filter(Boolean);
  state.villages.forEach(v=>{ v.tasks = v.tasks||[]; v.houses = v.houses||[]; });
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'village-progress-' + todayISO() + '.json';
  a.click();
  toast('ดาวน์โหลดไฟล์ข้อมูลแล้ว');
}
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    try{
      const obj = JSON.parse(e.target.result);
      if(obj && obj.type === 'vendor-package'){
        state.villages = obj.villages || [];
        B.vendors = obj.boqVendors || [];
        B.jobs = obj.boqJobs || [];
        persist(); bqPersist();
        toast('นำเข้าข้อมูล Vendor สำเร็จ เข้าสู่ระบบได้เลย');
      } else if(obj && obj.villages){
        state = obj;
        persist();
        toast('โหลดข้อมูลสำเร็จ');
      } else { toast('ไฟล์ไม่ถูกต้อง'); return; }
      if(session.role){ render(); }
    }catch(err){ toast('ไฟล์ไม่ถูกต้อง'); }
  };
  rd.readAsText(f);
  ev.target.value = '';
}
function exportVendorPackage(vid){
  const v = vendorById(vid); if(!v) return;
  const nm = v.name.trim();
  const wb = XLSX.utils.book_new();
  const wsA = XLSX.utils.aoa_to_sheet([['Vendor', v.name],['Username', v.user],['Password', v.pass],['หมายเหตุ','ไฟล์ข้อมูลเฉพาะ '+nm+' · นำเข้าที่หน้า login ของแอป']]);
  wsA['!cols'] = [{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsA, 'บัญชี');
  const pAoa = [['Vendor', v.name],['ลำดับ','หมวด','รายการ','หน่วย','ราคา/หน่วย (บาท)']];
  ITEMS.forEach((it,idx)=> pAoa.push([idx+1, it.s, (it.on||it.n), it.u, priceOf(v,idx)]));
  const wsP = XLSX.utils.aoa_to_sheet(pAoa);
  wsP['!cols'] = [{wch:6},{wch:24},{wch:56},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsP, excelSheetName('ราคา '+nm, new Set(['บัญชี'])));
  const vil = state.villages.filter(x=> x.vendorId===vid || (x.contractor||'').trim()===nm);
  const used = new Set(wb.SheetNames);
  vil.forEach(x=>{
    const ws = XLSX.utils.aoa_to_sheet(masterVillageAOA(x));
    ws['!cols'] = [{wch:8},{wch:24},{wch:50},{wch:8},{wch:13},{wch:11},{wch:14},{wch:12},{wch:16},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, excelSheetName(x.name, used));
  });
  XLSX.writeFile(wb, 'vendor-data-' + nm.replace(/\s+/g,'-') + '-' + todayISO() + '.xlsx');
  toast('Export ไฟล์ Excel ของ '+nm+' แล้ว (ส่งให้เขาทางไลน์ได้)');
}

/* ================= Helpers ================= */
const $ = id => document.getElementById(id);
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function thDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + (dt.getFullYear()+543);
}
function thDateShort(d){
  if(!d) return '-';
  const dt = new Date(d);
  const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return dt.getDate() + ' ' + m[dt.getMonth()];
}
function dayDiff(a,b){ return Math.round((new Date(b) - new Date(a))/86400000); }
function addDays(d,n){
  const dt = new Date(d); dt.setDate(dt.getDate()+n);
  return dt.toISOString().slice(0,10);
}
function overall(v){
  const tw = v.tasks.reduce((s,t)=>s+(+t.w||0),0);
  if(!tw) return 0;
  return Math.round(v.tasks.reduce((s,t)=>s+(+t.w||0)*(+t.p||0),0)/tw);
}
function statusOf(pct){
  if(pct>=100) return ['done','ส่งมอบแล้ว'];
  if(pct>0) return ['doing','กำลังดำเนินการ'];
  return ['idle','ยังไม่เริ่ม'];
}
function emojiBar(pct){
  const n = Math.round(pct/10);
  return '▰'.repeat(n) + '▱'.repeat(10-n);
}
function taskIcon(p){ return p>=100 ? '✅' : (p>0 ? '🔶' : '⬜'); }
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= Village CRUD ================= */
function openAddModal(){ fillVendorList(); $('addModal').classList.add('open'); $('mName').focus(); }
function fillVendorList(){ const dl=$('vendorNameList'); if(dl) dl.innerHTML=B.vendors.map(v=>'<option value="'+esc(v.name)+'">').join(''); }
function closeAddModal(){ $('addModal').classList.remove('open'); }
function addVillage(){
  const name = $('mName').value.trim();
  if(!name){ toast('กรุณาใส่ชื่อหมู่บ้าน'); return; }
  const contractor = $('mContractor').value.trim();
  const mv = B.vendors.find(x=>x.name.trim()===contractor);
  const vilId = uid();
  state.villages.push({
    id: vilId, name,
    contractor, vendorId: mv? mv.id : null,
    ports: $('mPorts').value,
    start: $('mStart').value, end: $('mEnd').value,
    issue: '',
    tasks: TEMPLATE.map(t=>({id:uid(), name:t.name, w:t.w, p:0, note:''}))
  });
  B.jobs.push({id:uid(), name, villageId:vilId, vendorId: mv? mv.id:'', budget:'', qty:{}, prices:{}, date:todayISO()});
  bqPersist();
  ['mName','mContractor','mPorts','mStart','mEnd'].forEach(i=>$(i).value='');
  closeAddModal(); persist(); render();
  openDetail(state.villages[state.villages.length-1].id);
}
function deleteVillage(id){
  if(!confirm('ลบหมู่บ้านนี้และงาน BOQ ที่ผูกอยู่ทั้งหมด?')) return;
  state.villages = state.villages.filter(v=>v.id!==id);
  B.jobs = B.jobs.filter(j=>j.villageId!==id);
  bqPersist();
  currentId = null; persist(); render();
}

/* ================= Task ops ================= */
function setP(vid,tid,val){
  const t = state.villages.find(v=>v.id===vid).tasks.find(t=>t.id===tid);
  t.p = Math.max(0,Math.min(100,+val||0));
  persist(); renderDetail();
}
function setField(vid,tid,key,val){
  const v = state.villages.find(v=>v.id===vid);
  if(tid){ v.tasks.find(t=>t.id===tid)[key] = val; }
  else { v[key] = val; }
  persist();
  refreshSummary(v);
}
function addTask(vid){
  const v = state.villages.find(v=>v.id===vid);
  v.tasks.push({id:uid(), name:'งานใหม่', w:0, p:0, note:''});
  persist(); renderDetail();
}
function delTask(vid,tid){
  const v = state.villages.find(v=>v.id===vid);
  v.tasks = v.tasks.filter(t=>t.id!==tid);
  persist(); renderDetail();
}

/* ================= Views ================= */
function render(){
  if(currentId){ renderDetail(); } else { renderList(); }
  renderHeader();
}
function renderHeader(){
  const vil = visibleVillages();
  const n = vil.length;
  const done = vil.filter(v=>overall(v)>=100).length;
  const doing = vil.filter(v=>{const p=overall(v);return p>0&&p<100;}).length;
  const avg = n ? Math.round(vil.reduce((s,v)=>s+overall(v),0)/n) : 0;
  $('headerStats').innerHTML = `
    <div class="hstat"><b>${n}</b><span>หมู่บ้านทั้งหมด</span></div>
    <div class="hstat"><b>${doing}</b><span>กำลังดำเนินการ</span></div>
    <div class="hstat"><b>${done}</b><span>ส่งมอบแล้ว</span></div>
    <div class="hstat"><b>${avg}%</b><span>ความคืบหน้าเฉลี่ย</span></div>`;
}
function renderList(){
  $('detailView').style.display = 'none';
  $('listView').style.display = '';
  $('fabAdd').style.display = isAdmin()? '' : 'none';
  const el = $('listView');
  const vil = visibleVillages();
  if(!vil.length){
    el.innerHTML = `<div class="empty">
      <div class="display">ยังไม่มีแผนงานหมู่บ้าน</div>
      กด "＋ เพิ่มหมู่บ้าน" เพื่อสร้างแผนงานแรก<br>ระบบจะใส่ขั้นตอนงานใต้ดินมาตรฐานให้อัตโนมัติ
    </div>
    ${isAdmin()?`<div class="data-row">
      <button class="btn btn-ghost btn-sm" onclick="$('xlsxInput').click()">📥 Import Excel</button>
    </div>`:''}`;
    return;
  }
  const vcardHTML = v => {
    const p = overall(v);
    const [cls,txt] = statusOf(p);
    return `<div class="vcard" onclick="openDetail('${v.id}')">
      <div class="vcard-top">
        <div>
          <h3>${esc(v.name)}</h3>
          <div class="sub">${v.ports? v.ports+' พอร์ต · ':''}ส่งมอบ ${thDate(v.end)}</div>
        </div>
        <span class="chip ${cls}">${txt}</span>
      </div>
      <div class="bar-row"><div class="bar"><i style="width:${p}%"></i></div><div class="pct">${p}%</div></div>
    </div>`;
  };
  const groups = {};
  vil.forEach(v=>{
    const k = (v.contractor||'').trim() || 'ยังไม่ระบุ Vendor';
    (groups[k] = groups[k] || []).push(v);
  });
  el.innerHTML = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'th')).map(k=>{
    const vs = groups[k];
    const avg = Math.round(vs.reduce((s,v)=>s+overall(v),0)/vs.length);
    return `<div class="vgroup"><h2>👷 ${esc(k)}</h2><span>${vs.length} โครงการ · เฉลี่ย ${avg}%</span></div>`
      + vs.map(vcardHTML).join('');
  }).join('') + `
  ${isAdmin()?`<div class="data-row">
    <button class="btn btn-dark btn-sm" onclick="exportMasterExcel()">💾 Master Excel (แผน+BOQ+งบ)</button>
    <button class="btn btn-dark btn-sm" onclick="exportExecSummary()">🏢 สรุปผู้บริหาร</button>
  </div>
  <div class="data-row">
    <button class="btn btn-ghost btn-sm" onclick="exportExcelAll()">📊 Excel ไม่มีงบ (ส่งกลุ่มได้)</button>
    <button class="btn btn-ghost btn-sm" onclick="$('xlsxInput').click()">📥 Import Excel</button>
  </div>`:''}`;
}

function openDetail(id){ currentId = id; render(); fillVendorList(); window.scrollTo(0,0); }
function backToList(){ currentId = null; render(); }

function renderDetail(){
  const v = state.villages.find(v=>v.id===currentId);
  if(!v){ backToList(); return; }
  $('listView').style.display = 'none';
  $('fabAdd').style.display = 'none';
  const el = $('detailView');
  el.style.display = '';
  const p = overall(v);
  const totalW = v.tasks.reduce((s,t)=>s+(+t.w||0),0);

  el.innerHTML = `
  <div class="topbar">
    <button class="back" onclick="backToList()">←</button>
    <h2 style="font-size:19px;flex:1">${esc(v.name)}</h2>
    ${isAdmin()?`<button class="btn btn-red btn-sm" onclick="deleteVillage('${v.id}')">ลบ</button>`:''}
  </div>

  <div class="section-label">ข้อมูลโครงการ</div>
  <div class="panel">
    <div class="field"><label>Vendor / ผู้รับเหมา</label><input list="vendorNameList" value="${esc(v.contractor)}" onchange="setContractor('${v.id}',this.value)"></div>
    <div class="grid2">
      <div class="field"><label>พอร์ต / หลังคาเรือน</label><input type="number" value="${esc(v.ports)}" onchange="setField('${v.id}',null,'ports',this.value)"></div>
      <div class="field"><label>เดินสายเข้าบ้านสำเร็จ (หลัง)</label><input type="number" value="${esc(v.homesDone||'')}" onchange="setField('${v.id}',null,'homesDone',this.value)"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>วันเริ่มงาน (ทุกขั้นตอนอ้างอิงวันนี้)</label><input type="date" value="${v.start||''}" onchange="setStartAnchor('${v.id}',this.value)"></div>
      <div class="field"><label>กำหนดส่งมอบ</label><input type="date" value="${v.end||''}" onchange="setField('${v.id}',null,'end',this.value)"></div>
    </div>
    <div class="field" style="margin-bottom:0"><label>⚠️ ปัญหา / อุปสรรค (แสดงในรายงาน)</label>
      <textarea rows="2" onchange="setField('${v.id}',null,'issue',this.value)" placeholder="เช่น ท่อตัน ซอย 5 รอนิติอนุมัติเปิดบ่อเพิ่ม">${esc(v.issue)}</textarea>
    </div>
  </div>

  ${housesPanelHTML(v)}
  ${budgetPanelHTML(v)}
  <div class="section-label">ขั้นตอนงาน · แตะตัวเลขเพื่ออัปเดต</div>
  <div class="panel" id="taskPanel">
    ${v.tasks.map(t=>taskRow(v,t)).join('')}
    ${totalW!==100?`<div class="weight-warn">⚠ น้ำหนักงานรวม ${totalW}% (ควรเป็น 100%)</div>`:''}
    <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="addTask('${v.id}')">＋ เพิ่มขั้นตอนงาน</button></div>
  </div>

  <div class="section-label">ตารางแผนงาน · Timeline</div>
  <div class="panel">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn btn-green btn-sm" onclick="genSchedule('${v.id}')">⚡ Gen แผนงานอัตโนมัติ</button>
      <button class="btn btn-dark btn-sm" onclick="saveGanttPNG('${v.id}')">🖼️ บันทึกรูปแผนงาน</button>
    </div>
    <div class="shift-all">เลื่อนทั้งแผน:
      <button class="dbtn" onclick="shiftAll('${v.id}',-7)">-7</button>
      <button class="dbtn" onclick="shiftAll('${v.id}',-1)">-1</button>
      <button class="dbtn" onclick="shiftAll('${v.id}',1)">+1</button>
      <button class="dbtn" onclick="shiftAll('${v.id}',7)">+7</button> วัน
    </div>
    <div id="ganttBox">${ganttHTML(v)}</div>
  </div>

  <div class="section-label">รายงานสำหรับกลุ่ม LINE</div>
  <div class="report-wrap">
    <div class="report" id="reportCard">${reportHTML(v)}</div>
    <div class="report-actions">
      <button class="btn btn-dark" onclick="copyLine('${v.id}')">📋 คัดลอกข้อความ LINE</button>
      <button class="btn btn-green" onclick="savePNG('${v.id}')">🖼️ บันทึกรูปรายงาน</button>
    </div>
    <div class="data-row">
      <button class="btn btn-ghost btn-sm" onclick="exportExcelVillage('${v.id}')">📊 Export Excel โครงการนี้</button>
    </div>
  </div>`;
}

function villageJobs(v){
  return B.jobs.filter(j=> j.villageId===v.id || (!j.villageId && String(j.name||'').trim()===v.name.trim()));
}
function housesPanelHTML(v){
  const hs = v.houses||[];
  if(!hs.length) return '';
  const doneN = hs.filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
  const counts = {};
  hs.forEach(h=>{ const k=h.st||'ยังไม่ระบุสถานะ'; counts[k]=(counts[k]||0)+1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return `
  <div class="section-label">สถานะรายหลัง · จาก sheet หมู่บ้าน</div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
      <span style="font-size:13px;color:var(--muted)">พร้อมติดตั้ง ONU / สำเร็จ</span>
      <b class="money" style="font-size:18px;color:var(--forest)">${doneN}/${hs.length} หลัง</b>
    </div>
    <div class="bar" style="margin-top:8px"><i style="width:${Math.round(doneN/hs.length*100)}%"></i></div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6">${top.map(([k,n])=>esc(k)+' <b>'+n+'</b>').join(' · ')}</div>
    <div class="data-row"><button class="btn btn-dark btn-sm" onclick="openPlanWith('${v.id}')">📐 อัปเดตลงแบบ PDF (Plan Status)</button></div>
  </div>`;
}
function openPlanWith(vid){
  const v = state.villages.find(x=>x.id===vid); if(!v) return;
  try{
    localStorage.setItem('plan-status-handoff', JSON.stringify({
      village: v.name,
      houses: (v.houses||[]).map(h=>({addr:h.no, status:h.st||'', lat:h.lat||'', lng:h.lng||''}))
    }));
  }catch(e){}
  const fr = $('planFrame');
  fr.src = 'plan-status.html?v=' + Date.now();
  switchMode('plan');
}
function budgetPanelHTML(v){
  const jobs = villageJobs(v);
  if(!jobs.length) return '';
  const cost = jobs.reduce((s,j)=>s+jobCost(j),0);
  const budget = jobs.reduce((s,j)=>s+jobBudget(j),0);
  const over = budget && cost > budget;
  return `
  <div class="section-label">งบประมาณ BOQ · ข้อมูลภายใน ไม่ปรากฏในรายงาน/รูปที่ส่งหมู่บ้าน</div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
      <span style="font-size:13px;color:var(--muted)">ค่างานตาม BOQ</span>
      <span class="money" style="font-size:18px;color:${over?'var(--red)':'var(--forest)'}">${fmt(cost)} ฿</span>
    </div>

/* ================= Gantt / ตารางแผนงาน ================= */
/* วันเริ่มโครงการเป็นจุดอ้างอิง: ขยับวันเริ่มโครงการ = ทุกขั้นตอน + วันส่งมอบ เลื่อนตามเท่ากัน */
function setStartAnchor(vid, val){
  const v = state.villages.find(v=>v.id===vid);
  const old = v.start;
  v.start = val;
  if(old && val){
    const delta = dayDiff(old, val);
    if(delta !== 0){
      v.tasks.forEach(t=>{
        if(t.s) t.s = addDays(t.s, delta);
        if(t.e) t.e = addDays(t.e, delta);
      });
      if(v.end) v.end = addDays(v.end, delta);
      toast('เลื่อนทุกขั้นตอนตามวันเริ่มโครงการ (' + (delta>0?'+':'') + delta + ' วัน)');
    }
  } else if(!old && val && v.end && !v.tasks.some(t=>t.s)){
    toast('ตั้งวันเริ่มแล้ว กด ⚡ Gen เพื่อสร้างแผนทุกขั้นตอน');
  }
  persist(); renderDetail();
}

function shiftTask(vid,tid,days){
  const t = state.villages.find(v=>v.id===vid).tasks.find(t=>t.id===tid);
  if(!t.s || !t.e) return;
  t.s = addDays(t.s,days); t.e = addDays(t.e,days);
  persist(); renderDetail();
}
function changeDur(vid,tid,days){
  const t = state.villages.find(v=>v.id===vid).tasks.find(t=>t.id===tid);
  if(!t.s || !t.e) return;
  let d = dayDiff(t.s,t.e)+1+days;
  if(d < 1) d = 1;
  t.e = addDays(t.s, d-1);
  persist(); renderDetail();
}
function chainAfterPrev(vid,tid){
  const v = state.villages.find(v=>v.id===vid);
  const i = v.tasks.findIndex(t=>t.id===tid);
  if(i <= 0){ toast('เป็นงานแรก ไม่มีงานก่อนหน้า'); return; }
  const prev = v.tasks[i-1];
  if(!prev.e){ toast('งานก่อนหน้ายังไม่มีวันที่'); return; }
  const t = v.tasks[i];
  const dur = (t.s && t.e) ? dayDiff(t.s,t.e)+1 : 7;
  t.s = addDays(prev.e,1); t.e = addDays(t.s,dur-1);
  persist(); renderDetail();
}
function quickStart(vid,tid){
  const t = state.villages.find(v=>v.id===vid).tasks.find(t=>t.id===tid);
  t.s = todayISO(); t.e = addDays(t.s,6);
  persist(); renderDetail();
}
function toggleDateEdit(tid){
  const el = $('dedit-'+tid);
  if(el) el.style.display = (el.style.display==='none') ? 'flex' : 'none';
}
function shiftAll(vid,days){
  const v = state.villages.find(v=>v.id===vid);
  v.tasks.forEach(t=>{ if(t.s && t.e){ t.s = addDays(t.s,days); t.e = addDays(t.e,days); } });
  if(v.start) v.start = addDays(v.start,days);
  if(v.end) v.end = addDays(v.end,days);
  persist(); renderDetail();
  toast(days>0 ? 'เลื่อนทั้งแผนออกไป '+days+' วัน' : 'เลื่อนทั้งแผนเข้ามา '+(-days)+' วัน');
}
function genSchedule(vid){
  const v = state.villages.find(v=>v.id===vid);
  if(!v.start || !v.end){ toast('ใส่วันเริ่มงานและกำหนดส่งมอบก่อนครับ'); return; }
  if(dayDiff(v.start, v.end) < 1){ toast('กำหนดส่งมอบต้องอยู่หลังวันเริ่มงาน'); return; }
  const total = dayDiff(v.start, v.end) + 1;
  const tw = v.tasks.reduce((s,t)=>s+(+t.w||0),0);
  let cum = 0;
  v.tasks.forEach(t=>{
    const w = tw ? (+t.w||0) : 1;
    const TW = tw || v.tasks.length;
    const startOff = Math.min(Math.round(cum/TW*total), total-1);
    cum += w;
    let endOff = Math.round(cum/TW*total) - 1;
    if(endOff < startOff) endOff = startOff;
    endOff = Math.min(endOff, total-1);
    t.s = addDays(v.start, startOff);
    t.e = addDays(v.start, endOff);
  });
  persist(); renderDetail();
  toast('สร้างแผนงานตามน้ำหนักงานแล้ว ปรับวันที่รายงานได้เลย');
}

function ganttHTML(v){
  const dated = v.tasks.filter(t=>t.s && t.e);
  if(!dated.length){
    return `<div class="g-empty">ยังไม่มีวันที่ในแผนงาน<br>ใส่วันเริ่มงาน / กำหนดส่งมอบด้านบน แล้วกด ⚡ Gen แผนงานอัตโนมัติ<br>หรือใส่วันที่รายขั้นตอนเองในแต่ละงาน</div>`;
  }
  let min = dated.reduce((m,t)=> t.s<m? t.s:m, dated[0].s);
  let max = dated.reduce((m,t)=> t.e>m? t.e:m, dated[0].e);
  if(v.start && v.start<min) min = v.start;
  if(v.end && v.end>max) max = v.end;
  const total = Math.max(dayDiff(min,max)+1, 1);
  const step = total<=60 ? 7 : (total<=180 ? 14 : 30);
  const today = todayISO();

  let ticks='', grid='';
  for(let off=0; off<total; off+=step){
    const pct = (off/total*100).toFixed(2);
    ticks += `<div class="g-tick" style="left:${pct}%">${thDateShort(addDays(min,off))}</div>`;
    grid  += `<div class="g-gridline" style="left:${pct}%"></div>`;
  }

  const rows = v.tasks.map(t=>{
    if(!t.s || !t.e) return `<div class="g-row"><div class="g-label"><span>${esc(t.name)}</span><span class="g-dates">ยังไม่กำหนดวัน</span></div><div class="g-track"></div></div>`;
    const left = (dayDiff(min,t.s)/total*100).toFixed(2);
    const width = ((dayDiff(t.s,t.e)+1)/total*100).toFixed(2);
    const late = today > t.e && +t.p < 100;
    return `<div class="g-row">
      <div class="g-label"><span>${esc(t.name)}</span><span class="g-dates">${thDateShort(t.s)} – ${thDateShort(t.e)} · ${t.p}%</span></div>
      <div class="g-track"><div class="g-bar ${late?'late':''}" style="left:${left}%;width:${width}%"><i style="width:${t.p}%"></i></div></div>
    </div>`;
  }).join('');

  let todayLine = '';
  if(today >= min && today <= max){
    const tp = ((dayDiff(min,today)+0.5)/total*100).toFixed(2);
    todayLine = `<div class="g-today" style="left:${tp}%"></div>`;
  }

  return `<div class="gantt" id="ganttChart">
    <div class="g-head">
      <div>
        <div class="g-title">แผนงานก่อสร้าง · ${esc(v.name)}</div>
        <div class="g-sub">${esc(v.contractor)||'-'} · ${thDate(min)} – ${thDate(max)}${v.ports? ' · '+v.ports+' พอร์ต':''}</div>
      </div>
      <div class="g-brand">AIS FIBRE</div>
    </div>
    <div class="g-axis">${ticks}</div>
    <div class="g-body">${grid}${todayLine}${rows}</div>
    <div class="g-legend">
      <span><i style="background:#D8ECBC"></i>แผนงาน</span>
      <span><i style="background:linear-gradient(90deg,var(--green),var(--green-dark))"></i>ผลงานจริง</span>
      <span><i style="background:var(--amber)"></i>ล่าช้ากว่าแผน</span>
      <span><i style="background:var(--red);width:3px;border-radius:1px"></i> เส้นวันนี้ (${thDateShort(today)})</span>
    </div>
  </div>`;
}

function villageAOA(v){

  const rows = [

    ['พอร์ต / หลังคาเรือน', v.ports||''],

    ['กำหนดส่งมอบ', v.end||''],

    ['ปัญหา / อุปสรรค', v.issue||''],
    [],
    ['ลำดับ','ขั้นตอนงาน','น้ำหนัก (%)','ความคืบหน้า (%)','วันเริ่ม','วันเสร็จ','หมายเหตุ']
  ];
  v.tasks.forEach((t,i)=>rows.push([i+1, t.name, +t.w||0, +t.p||0, t.s||'', t.e||'', t.note||'']));

function excelSheetName(base, used){
  let n = (base||'โครงการ').replace(/[\\\/\?\*\[\]:]/g,' ').slice(0,25).trim() || 'โครงการ';
  let name = n, i = 2;
  while(used.has(name)){ name = n.slice(0,22) + ' ' + i++; }
  used.add(name);
  return name;
}

function cellDate(val){
  if(val instanceof Date){
    const d = new Date(val.getTime() - val.getTimezoneOffset()*60000);
    return d.toISOString().slice(0,10);
  }
  if(typeof val === 'number' && val > 20000){
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().slice(0,10);
  }
  if(typeof val === 'string'){
    const s = val.trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  }
  return '';
}
function importExcel(ev){
  const f = ev.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      // บัญชี Vendor: จากไฟล์ package ('บัญชี') หรือ Master ('บัญชีทั้งหมด')
      let accVendor = null, touchedB = false;
      const acc = parseAccountSheet(wb);
      if(acc){
        let vd = B.vendors.find(x=>x.user===acc.user);
        if(!vd){ vd = {id:uid(), name:acc.name, user:acc.user, pass:acc.pass, prices:{}}; B.vendors.push(vd); }
        else { vd.pass = acc.pass; vd.name = acc.name; }
        accVendor = vd; touchedB = true;
      }
      const snAll = wb.SheetNames.find(x=>x==='บัญชีทั้งหมด');
      if(snAll){
        const aa = XLSX.utils.sheet_to_json(wb.Sheets[snAll], {header:1, defval:''});
        aa.slice(1).forEach(r=>{
          if(!r || !r[1]) return;
          const name=String(r[0]||r[1]), user=String(r[1]), pass=String(r[2]||'');
          let vd = B.vendors.find(x=>x.user===user);
          if(!vd){ B.vendors.push({id:uid(), name, user, pass, prices:{}}); }
          else { vd.name = name; if(pass) vd.pass = pass; }
          touchedB = true;
        });
      }
      // ราคา: ทุก sheet ที่ขึ้นต้นด้วย 'ราคา' — จับคู่ Vendor จากแถว meta หรือจากบัญชีใน package
      wb.SheetNames.filter(x=>x.startsWith('ราคา')).forEach(psn=>{
        const pa = XLSX.utils.sheet_to_json(wb.Sheets[psn], {header:1, defval:''});
        let vd = accVendor;
        const metaRow = pa.find(r=> r && String(r[0]).trim()==='Vendor');
        if(metaRow){
          const nm = String(metaRow[1]||'').trim();
          vd = B.vendors.find(x=>x.name.trim()===nm) || vd;
        }
        if(!vd) return;
        const hi = pa.findIndex(r=> r && String(r[2]).trim()==='รายการ');
        if(hi<0) return;
        const nameIdx = {}; ITEMS.forEach((it,i)=> nameIdx[it.n.trim()] = i);
        for(let i=hi+1;i<pa.length;i++){
          const r = pa[i]; if(!r) continue;
          const nm = String(r[2]||'').trim(); const pr = +r[4];
          if(nm && nameIdx[nm]!=null && !isNaN(pr)) vd.prices['i'+nameIdx[nm]] = pr;
        }
        touchedB = true;
      });
      if(touchedB) bqPersist();
      let added = 0, updated = 0, teamFmt = 0;
      wb.SheetNames.forEach(sn=>{
        if(sn === 'สรุปรวม' || sn === 'สรุปราย Vendor' || sn.startsWith('บัญชี') || sn.startsWith('ราคา') || sn === 'วิธีกรอก' || /ลูกบ้าน/.test(sn)) return;
        const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
        const md = parseMasterFormat(aoa);
        if(md){
          const existed = state.villages.some(x=>x.name.trim()===md.name);
          if(applyMasterVillage(md)){ existed ? updated++ : added++; }
          return;
        }
        let v = parseAppFormat(aoa);
        if(!v){ v = parseTeamFormat(aoa, sn); if(v) teamFmt++; }
        if(v){ state.villages.push(v); added++; }
      });
      if(added || updated || acc){
        persist(); bqPersist();
        if(session.role){ currentId = null; render(); }
        toast('นำเข้าสำเร็จ: ใหม่ ' + added + ' · อัปเดต ' + updated + (acc?' · บัญชี Vendor 1':'') + (teamFmt ? ' (กด ⚡ Gen เพื่อใส่วันที่)' : ''));
      } else toast('ไม่พบรูปแบบที่รู้จักในไฟล์');
    }catch(err){ toast('อ่านไฟล์ Excel ไม่สำเร็จ'); }
  };
  rd.readAsArrayBuffer(f);
  ev.target.value = '';
}

/* รูปแบบที่ export จากแอปนี้ — อ่านกลับได้ครบทุกช่อง */
function parseAppFormat(aoa){
  const hi = aoa.findIndex(r => r && r[1] === 'ขั้นตอนงาน');
  if(hi < 0) return null;
  const meta = {};
  for(let i=0;i<hi;i++){ if(aoa[i] && aoa[i][0] !== '') meta[String(aoa[i][0])] = aoa[i][1]; }
  const tasks = [];
  for(let i=hi+1;i<aoa.length;i++){
    const r = aoa[i];
    if(!r || r[1] === '' || r[1] == null) continue;
    tasks.push({id:uid(), name:String(r[1]), w:+r[2]||0, p:+r[3]||0, s:cellDate(r[4]), e:cellDate(r[5]), note:String(r[6]||'')});
  }
  if(!tasks.length) return null;
  return {
    id: uid(),
    name: String(meta['โครงการ']||'โครงการนำเข้า'),
    contractor: String(meta['ผู้รับเหมา']||''),
    ports: String(meta['พอร์ต / หลังคาเรือน']||''),
    start: cellDate(meta['วันเริ่มงาน']),
    end: cellDate(meta['กำหนดส่งมอบ']),
    issue: String(meta['ปัญหา / อุปสรรค']||''),
    tasks
  };
}
/* รูปแบบแผนทีม (no / description / ผู้รับผิดชอบ) — อ่านชื่องานได้ แต่ช่องสีที่ระบายวันไม่สามารถอ่านได้ */
function parseTeamFormat(aoa, sn){
  const hi = aoa.findIndex(r => r && String(r[0]).trim().toLowerCase() === 'no' && String(r[1]).trim().toLowerCase() === 'description');
  if(hi < 0) return null;
  const name = (aoa[0] && aoa[0][0]) ? String(aoa[0][0]) : sn;
  const tasks = [];
  for(let i=hi+1;i<aoa.length;i++){
    const r = aoa[i];
    if(!r || r[1] === '' || r[1] == null) continue;
    tasks.push({id:uid(), name:String(r[1]), w:0, p:0, s:'', e:'', note:String(r[2]||'')});
  }
  if(!tasks.length) return null;
  const w = Math.floor(100/tasks.length);
  tasks.forEach((t,i)=> t.w = (i === tasks.length-1) ? 100 - w*(tasks.length-1) : w);
  return {id:uid(), name, contractor:'', ports:'', start:'', end:'', issue:'', tasks};
}

/* ตรวจคอลัมน์ส่วนสถานะรายหลังแบบยืดหยุ่น: รองรับทั้ง (ลำดับ,บ้านเลขที่,สถานะ,หมายเหตุ[,Lat,Long])
   และไฟล์ทีม (ลำดับ,โครงการ,บ้านเลขที่,Lat,Long,สถานะ,ผู้รับผิดชอบ) */
function detectHouseCols(block){
  const W = Math.max.apply(null, block.map(r=>r.length).concat([0]));
  const KEY = /ONU|ร้อยสาย|ท่อ|บ่อพัก|Terminate|Fiber|ลูกค้า|สำเร็จ|ติดตั้ง|ปล่อยสัญญาณ/i;
  let st=-1, stScore=0;
  for(let c=0;c<W;c++){
    const sc = block.filter(r=> KEY.test(String(r[c]==null?'':r[c]))).length;
    if(sc>stScore){ stScore=sc; st=c; }
  }
  let lat=-1;
  for(let c=0;c<W-1;c++){
    if(c===st) continue;
    const ok = block.filter(r=>{ const a=+r[c], b=+r[c+1]; return a>4&&a<21&&b>96&&b<106; }).length;
    if(ok > block.length*0.5){ lat=c; break; }
  }
  let addr=-1, aScore=-Infinity;
  for(let c=0;c<W;c++){
    if(c===st || c===lat || (lat>=0&&c===lat+1)) continue;
    const vals = block.map(r=>String(r[c]==null?'':r[c]).trim()).filter(Boolean);
    if(!vals.length) continue;
    const slash = vals.filter(v=>/\d+\s*\/\s*\d+/.test(v)).length / vals.length;
    const digit = vals.filter(v=>/\d/.test(v)).length / vals.length;
    const runNo = vals.length>2 && vals.every((v,i)=> String((+vals[0])+i)===v);
    const score = slash*3 + digit - (runNo?2:0);
    if(score > aScore){ aScore=score; addr=c; }
  }
  if(addr<0) addr = 1;
  let note=-1;
  if(st>=0){
    const cn = st+1;
    if(cn<W && cn!==lat && cn!==lat+1 && cn!==addr) note=cn;
  }
  return {addr, st, lat, note};
}

/* ============ Master Excel: 1 sheet ต่อหมู่บ้าน (ข้อมูล+แผนงาน+BOQ+งบ) ============ */
function masterVillageAOA(v){
  const jobs = villageJobs(v);
  const jb = jobs[0] || null;
  const vd = jb ? vendorById(jb.vendorId) : (v.vendorId ? vendorById(v.vendorId) : null);
  const rows = [
    ['โครงการ', v.name],
    ['Vendor', v.contractor||''],
    ['พอร์ต / หลังคาเรือน', v.ports||''],
    ['เดินสายเข้าบ้านสำเร็จ (หลัง)', v.homesDone||''],
    ['วันเริ่มงาน', v.start||''],
    ['กำหนดส่งมอบ', v.end||''],
    ['งบประมาณ PO (บาท)', jb ? (jobBudget(jb)||'') : ''],
    ['ค่างานที่ใช้ไปแล้ว (บาท)', jb ? jobCost(jb) : ''],
    ['ปัญหา / อุปสรรค', v.issue||''],
    [],
    ['แผนงาน PROGRESS'],
    ['ลำดับ','ขั้นตอนงาน','น้ำหนัก (%)','ความคืบหน้า (%)','วันเริ่ม','วันเสร็จ','หมายเหตุ']
  ];
  v.tasks.forEach((t,i)=>rows.push([i+1, t.name, +t.w||0, +t.p||0, t.s||'', t.e||'', t.note||'']));
  rows.push([]);
  rows.push(['สถานะรายหลัง (PLAN STATUS)']);
  rows.push(['ลำดับ','บ้านเลขที่','สถานะ','หมายเหตุ','Lat','Long']);
  (v.houses||[]).forEach((h,i)=>rows.push([i+1, h.no, h.st||'', h.note||'', h.lat||'', h.lng||'']));
  rows.push([]);
  rows.push(['BOQ']);
  rows.push(['ลำดับ','หมวด','รายการ','หน่วย','ราคา/หน่วย (โครงการนี้)','จำนวนตั้งงบ','งบประมาณ (บาท)','จำนวนที่ใช้แล้ว','ค่างานที่ใช้แล้ว (บาท)','งบคงเหลือ (บาท)']);
  ITEMS.forEach((it,idx)=>{
    const bq = jb ? (+(jb.bqty||{})['i'+idx]||0) : 0;
    const uq = jb ? (+(jb.qty||{})['i'+idx]||0) : 0;
    const pv = (jb && jb.prices) ? jb.prices['i'+idx] : null; /* เฉพาะราคาที่กรอกของโครงการนี้ ไม่เติมราคาตั้งต้น */
    const hasP = pv != null && pv !== '';
    const p = hasP ? +pv : 0;
    rows.push([idx+1, it.s, (it.on||it.n), it.u, hasP? p:'', bq||'', (bq&&hasP)? bq*p:'', uq||'', (uq&&hasP)? uq*p:'', (hasP&&(bq||uq))? (bq-uq)*p:'']);
  });
  rows.push(['','','','','รวมค่างาน BOQ','', jb? jobBudget(jb):0, '', jb? jobCost(jb):0, jb? jobBudget(jb)-jobCost(jb):0]);
  return rows;
}

function parseMasterFormat(aoa){
  const progIdx = aoa.findIndex(r=> r && String(r[0]).trim()==='แผนงาน PROGRESS');
  if(progIdx < 0) return null;
  const meta = {};
  for(let i=0;i<progIdx;i++){ if(aoa[i] && aoa[i][0] !== '') meta[String(aoa[i][0])] = aoa[i][1]; }
  const boqIdx = aoa.findIndex(r=> r && String(r[0]).trim()==='BOQ');
  const hsIdx = aoa.findIndex(r=> r && String(r[0]).trim().startsWith('สถานะรายหลัง'));
  const tasksEnd = hsIdx>=0 ? hsIdx : (boqIdx<0?aoa.length:boqIdx);
  const tasks = [];
  for(let i=progIdx+2; i<tasksEnd; i++){
    const r = aoa[i];
    if(!r || r[1] === '' || r[1] == null) continue;
    tasks.push({id:uid(), name:String(r[1]), w:+r[2]||0, p:+r[3]||0, s:cellDate(r[4]), e:cellDate(r[5]), note:String(r[6]||'')});
  }
  const houses = [];
  if(hsIdx >= 0){
    const hEnd = boqIdx>hsIdx ? boqIdx : aoa.length;
    const block = [];
    for(let i=hsIdx+2; i<hEnd; i++){
      const r = aoa[i];
      if(r && r.some(c=>String(c==null?'':c).trim()!=='')) block.push(r);
    }
    if(block.length){
      const det = detectHouseCols(block);
      block.forEach(r=>{
        const no = String(r[det.addr]==null?'':r[det.addr]).trim();
        if(!no || no.startsWith('(')) return;
        const h = {no, st: det.st>=0? String(r[det.st]||'').trim():'', note: det.note>=0? String(r[det.note]||'').trim():''};
        if(det.lat>=0){ h.lat = +r[det.lat]||''; h.lng = +r[det.lat+1]||''; }
        houses.push(h);
      });
    }
  }
  const qty = {}, bqty = {}, jobPrices = {};
  if(boqIdx >= 0){
    const nameIdx = {}; ITEMS.forEach((it,i)=> nameIdx[it.n.trim()] = i);
    const hdr = (aoa[boqIdx+1]||[]).map(x=>String(x));
    const isNew = hdr.some(h=>h.includes('จำนวนตั้งงบ'));
    for(let i=boqIdx+2; i<aoa.length; i++){
      const r = aoa[i]; if(!r) continue;
      if(String(r[4]).trim()==='รวมค่างาน BOQ' || String(r[5]).trim()==='รวมค่างาน BOQ') break;
      const nm = String(r[2]||'').trim();
      if(!nm || nameIdx[nm]==null) continue;
      const k = 'i'+nameIdx[nm];
      if(isNew){
        const pr = +r[4], bq = +r[5], uq = +r[7];
        if(!isNaN(pr) && r[4]!=='' && pr>=0) jobPrices[k] = pr;
        if(bq>0) bqty[k] = bq;
        if(uq>0) qty[k] = uq;
      } else {
        const q = +r[4], pr = +r[5];
        if(q>0) qty[k] = q;
        if(!isNaN(pr) && r[5]!=='' && pr>=0) jobPrices[k] = pr;
      }
    }
  }
  return {
    name: String(meta['โครงการ']||'').trim(),
    contractor: String(meta['Vendor']||''),
    ports: String(meta['พอร์ต / หลังคาเรือน']||''),
    homesDone: String(meta['เดินสายเข้าบ้านสำเร็จ (หลัง)']||''),
    start: cellDate(meta['วันเริ่มงาน']),
    end: cellDate(meta['กำหนดส่งมอบ']),
    budget: +meta['งบประมาณ PO (บาท)']||0,
    issue: String(meta['ปัญหา / อุปสรรค']||''),
    tasks, houses, qty, bqty, jobPrices
  };
}
function applyMasterVillage(d){
  if(!d.name || d.name.startsWith('(')) return false;
  let v = state.villages.find(x=>x.name.trim()===d.name);
  const mv = B.vendors.find(x=>x.name.trim()===d.contractor.trim());
  if(!v){
    v = {id:uid(), name:d.name, contractor:d.contractor, vendorId: mv?mv.id:null, ports:d.ports, homesDone:d.homesDone, start:d.start, end:d.end, issue:d.issue, tasks:d.tasks, houses:d.houses||[]};
    state.villages.push(v);
  } else {
    v.contractor = d.contractor; v.vendorId = mv?mv.id:v.vendorId;
    v.ports = d.ports; v.homesDone = d.homesDone;
    v.start = d.start; v.end = d.end; v.issue = d.issue;
    if(d.tasks.length) v.tasks = d.tasks;
  }
  if(d.houses && d.houses.length){
    v.houses = d.houses;
    v.homesDone = d.houses.filter(h=> h.st==='พร้อมติดตั้ง ONU' || /สำเร็จ/.test(h.st||'')).length;
  }
  if(d.budget || Object.keys(d.qty).length || Object.keys(d.bqty||{}).length || (d.jobPrices && Object.keys(d.jobPrices).length)){
    let jb = B.jobs.find(j=>j.villageId===v.id);
    if(!jb){
      jb = {id:uid(), name:v.name, villageId:v.id, vendorId: mv?mv.id:(v.vendorId||''), budget:d.budget||'', qty:{}, date:todayISO()};
      B.jobs.push(jb);
    }
    if(d.budget) jb.budget = d.budget;
    if(mv) jb.vendorId = mv.id;
    if(Object.keys(d.qty).length) jb.qty = d.qty;
    if(Object.keys(d.bqty||{}).length) jb.bqty = d.bqty;
    if(d.jobPrices && Object.keys(d.jobPrices).length){
      jb.prices = jb.prices || {};
      Object.keys(d.jobPrices).forEach(k=>{
        const idx = +k.slice(1);
        if(d.jobPrices[k] !== jobPrice(jb, idx)) jb.prices[k] = d.jobPrices[k];
      });
    }
  }
  return true;
}
function parseAccountSheet(wb){
  const sn = wb.SheetNames.find(x=>x==='บัญชี');
  if(!sn) return null;
  const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:''});
  const m = {}; aoa.forEach(r=>{ if(r && r[0]!=='') m[String(r[0])] = String(r[1]||''); });
  if(!m['Username'] || !m['Password']) return null;
  return {user:m['Username'], pass:m['Password'], name:m['Vendor']||m['Username']};
}

function lineText(v){
  const p = overall(v);
  const L = [];
  L.push('📡 รายงานความคืบหน้า AIS Fibre');
  L.push('🏘️ ' + v.name);
  if(v.contractor) L.push('👷 ผู้รับเหมา: ' + v.contractor + (v.ports? ' ('+v.ports+' พอร์ต)':''));
  L.push('📅 อัปเดต: ' + thDate(todayISO()));
  L.push('');
  L.push('ภาพรวม ' + p + '%');
  L.push(emojiBar(p));
  if(+v.homesDone || +v.ports) L.push('🏠 เดินสายเข้าบ้านสำเร็จ ' + (+v.homesDone||0) + (+v.ports?'/'+v.ports:'') + ' หลัง');
  L.push('');
  v.tasks.forEach(t=>{
    L.push(taskIcon(+t.p) + ' ' + t.name + ' — ' + t.p + '%' + (t.note? ' ('+t.note+')':''));
  });
  if(v.issue){ L.push(''); L.push('⚠️ ปัญหา: ' + v.issue); }

  return L.join('\n');
}
function copyLine(vid){

const LS = 'ftth-boq-budget';
let B = { adminUser:'FTTH', adminPass:'FTTHBBODN', vendors:[], jobs:[] };
let session = { role:null, vendorId:null }; // role: 'admin' | 'vendor'
let ui = { tab:'jobs', vendorSel:null, jobSel:null, q:'' , qtyOnly:false };

/* ===== persistence ===== */
function bqPersist(){ try{ localStorage.setItem(LS, JSON.stringify(B)); }catch(e){} }
function bqRestore(){
  try{ const s=localStorage.getItem(LS); if(s) B=JSON.parse(s); }catch(e){}
  B = B || {};
  B.vendors = (B.vendors||[]).filter(Boolean);
  B.jobs = (B.jobs||[]).filter(Boolean);
  B.jobs.forEach(j=>{ j.qty = j.qty||{}; j.prices = j.prices||{}; j.bqty = j.bqty||{}; });
  if(!B.adminUser) B.adminUser = 'FTTH';
  if(!B.adminPass) B.adminPass = 'FTTHBBODN';
  (B.vendors||[]).forEach(v=>{
    if(!v.user) v.user = v.name;
    if(!v.pass) v.pass = v.pin || '';
  });
}

function fmt(n){ return (Math.round((+n||0)*100)/100).toLocaleString('th-TH'); }

function vendorById(id){ return B.vendors.find(v=>v.id===id); }
function priceOf(vendor, idx){
  if(!ITEMS[idx]) return 0;
  if(vendor && vendor.prices && vendor.prices['i'+idx] != null && vendor.prices['i'+idx] !== '') return +vendor.prices['i'+idx];
  return +ITEMS[idx].p || 0;
}
function jobPrice(job, idx){
  if(job && job.prices && job.prices['i'+idx] != null && job.prices['i'+idx] !== '') return +job.prices['i'+idx];
  return priceOf(vendorById(job.vendorId), idx);
}
function jobBudget(job){
  if(!job) return 0;
  let has=false, t=0;
  Object.keys(job.bqty||{}).forEach(k=>{
    const idx = +k.slice(1);
    if(!ITEMS[idx]) return;
    const q = +job.bqty[k]||0;
    if(q>0){ has=true; t += q * jobPrice(job, idx); }
  });
  return has ? t : (+job.budget||0);
}
function setBQty(jid, idx, val){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  job.bqty = job.bqty || {};
  if(val==='' || +val===0) delete job.bqty['i'+idx];
  else job.bqty['i'+idx] = +val;
  bqPersist();
  refreshJobTotals(job);
}
function refreshJobTotals(job){
  const bud = jobBudget(job), cost = jobCost(job);
  const g1=$('grandBudget'), g2=$('grandTotal'), g3=$('grandRemain');
  if(g1) g1.textContent = fmt(bud);
  if(g2) g2.textContent = fmt(cost);
  if(g3){ g3.textContent = fmt(bud-cost); g3.style.color = (bud && cost>bud)? '#FF9B9B' : ''; }
}
function jobCost(job){
  let t = 0;
  Object.keys(job.qty||{}).forEach(k=>{
    const idx = +k.slice(1);
    if(!ITEMS[idx]) return;
    t += (+job.qty[k]||0) * jobPrice(job, idx);
  });
  return t;
}
function setJobPrice(jid, idx, val){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  job.prices = job.prices || {};
  if(val === '') delete job.prices['i'+idx];
  else job.prices['i'+idx] = +val;
  bqPersist();
  refreshItemList();
  refreshJobTotals(job);
}

function bqRender(){

  const isAdmin = session.role==='admin';

  if(isAdmin){
    tabs = [['jobs','งาน / BOQ'],['summary','สรุปงบ']];

function logout(){
  session={role:null,vendorId:null};
  $('appShell').style.display='none';
  $('loginGate').style.display='';
  renderLogin();
}
function enterApp(role, vendorId){
  session={role, vendorId};
  migrateVendorIds();
  $('loginGate').style.display='';
  $('loginGate').innerHTML='';
  $('loginGate').style.display='none';
  $('appShell').style.display='';
  ui.tab='jobs';
  $('mbVendor').style.display = isAdmin() ? '' : 'none';
  switchMode('dash');
}
function migrateVendorIds(){
  let ch=false;
  B.jobs.forEach(j=>{
    if(!j.villageId){
      const m = state.villages.find(x=>x.name.trim()===String(j.name||'').trim());
      if(m){ j.villageId = m.id; ch=true; }
    }
  });
  state.villages.forEach(v=>{
    if(!B.jobs.some(j=>j.villageId===v.id)){
      B.jobs.push({id:uid(), name:v.name, villageId:v.id, vendorId:v.vendorId||'', budget:'', qty:{}, prices:{}, date:todayISO()});
      ch=true;
    }
  });
  state.villages.forEach(v=>{
    if(!v.vendorId && v.contractor){
      const m=B.vendors.find(x=>x.name.trim()===v.contractor.trim());
      if(m){ v.vendorId=m.id; ch=true; }
    }
  });
  if(ch){ persist(); bqPersist(); }
}
function isAdmin(){ return session.role==='admin'; }
function setContractor(vid, val){
  const v = state.villages.find(v=>v.id===vid); if(!v) return;
  v.contractor = val;
  const m = B.vendors.find(x=>x.name.trim()===val.trim());
  v.vendorId = m ? m.id : null;
  B.jobs.filter(j=>j.villageId===vid).forEach(j=>{ j.vendorId = v.vendorId || ''; });
  bqPersist();
  persist(); refreshSummary(v);
}
function myVendorName(){ const v=vendorById(session.vendorId); return v? v.name:''; }
function visibleVillages(){
  if(isAdmin()) return state.villages;
  const nm = myVendorName().trim();
  return state.villages.filter(v=> v.vendorId===session.vendorId || (v.contractor||'').trim()===nm);
}

function addVendor(){
  const name = $('nvName').value.trim(), user = $('nvUser').value.trim(), pass = $('nvPass').value.trim();
  if(!name || !user || !pass){ toast('ใส่ชื่อ, Username และ Password ให้ครบครับ'); return; }
  if(user === B.adminUser || B.vendors.some(v=>v.user===user)){ toast('Username นี้ถูกใช้แล้ว'); return; }
  B.vendors.push({id:uid(), name, user, pass, prices:{}});
  bqPersist(); refreshAdminUI(); toast('เพิ่ม '+name+' แล้ว');
}
function setVendorCred(id, key, val){
  const v = vendorById(id); if(!v) return;
  val = val.trim();
  if(!val){ toast('ค่าว่างไม่ได้'); bqRender(); return; }
  if(key==='user' && (val===B.adminUser || B.vendors.some(x=>x.id!==id && x.user===val))){ toast('Username นี้ถูกใช้แล้ว'); bqRender(); return; }
  v[key] = val; bqPersist(); toast('บันทึกแล้ว');
}
function delVendor(id){
  if(!confirm('ลบ Vendor นี้? งานที่ผูกอยู่จะไม่ถูกลบแต่จะไม่มีราคา')) return;
  B.vendors = B.vendors.filter(v=>v.id!==id);
  bqPersist(); refreshAdminUI();
}
function saveAdminCred(){
  const u = $('adminUserIn').value.trim(), p = $('adminPassIn').value.trim();
  if(!u || !p){ toast('Username / Password ว่างไม่ได้'); return; }
  if(B.vendors.some(v=>v.user===u)){ toast('Username นี้ซ้ำกับ Vendor'); return; }
  B.adminUser = u; B.adminPass = p; bqPersist(); toast('บันทึกบัญชีผู้ดูแลแล้ว');
}

/* เซลล์รายบรรทัดของหน้างาน: ราคา · ตั้งงบ · ใช้แล้ว · คงเหลือ */
function jobRowCells(job, v, idx){
  const bq = (job.bqty||{})['i'+idx] || '';
  const uq = (job.qty||{})['i'+idx] || '';
  const p = jobPrice(job, idx);
  const pv = (job.prices||{})['i'+idx];
  const remain = ((+bq||0) - (+uq||0)) * p;
  const priceCell = isAdmin()
    ? `<input type="number" style="width:60px" title="ราคา/หน่วย โครงการนี้" value="${pv!=null?pv:''}" placeholder="${priceOf(v,idx)}" onchange="setJobPrice('${job.id}',${idx},this.value)">`
    : `<div class="line-total" style="width:60px;font-weight:500;color:var(--muted)">${fmt(p)}</div>`;
  return `${priceCell}
    <input type="number" style="width:52px" title="จำนวนตั้งงบ" placeholder="งบ" value="${bq}" onchange="setBQty('${job.id}',${idx},this.value)">
    <input type="number" style="width:52px" title="จำนวนที่ใช้แล้ว" placeholder="ใช้" value="${uq}" onchange="setQty('${job.id}',${idx},this.value)">
    <div class="line-total" style="width:78px;color:${bq&&remain<0?'var(--red)':''}">${bq? fmt(remain)+' ฿':''}</div>`;
}

/* item list rows shared by prices & job views */
function toggleSec(si){
  ui.openSecs = ui.openSecs || {};
  ui.openSecs[si] = !ui.openSecs[si];
  refreshItemList();
}
function itemRows(rightCellFn, job){
  ui.openSecs = ui.openSecs || {};
  const q = (ui.q||'').toLowerCase();
  // group by section
  const secs = [];
  ITEMS.forEach((it, idx)=>{
    if(q && !(it.n.toLowerCase().includes(q) || it.s.toLowerCase().includes(q))) return;
    if(job && ui.qtyOnly && !((job.qty||{})['i'+idx] > 0) && !((job.bqty||{})['i'+idx] > 0)) return;
    if(!secs.length || secs[secs.length-1].name !== it.s) secs.push({name:it.s, idxs:[]});
    secs[secs.length-1].idxs.push(idx);
  });
  if(!secs.length) return '<div style="color:var(--muted);font-size:13px;padding:10px">ไม่พบรายการ</div>';
  let html = '';
  secs.forEach((sec, si)=>{
    const qtyN = job ? sec.idxs.filter(i=>(job.qty||{})['i'+i] > 0 || (job.bqty||{})['i'+i] > 0).length : 0;
    const key = sec.name.replace(/'/g,''); const open = !!ui.openSecs[key] || !!q || (job && ui.qtyOnly);
    html += `<div class="sec-head" style="cursor:pointer;user-select:none" onclick="toggleSec('${sec.name.replace(/'/g,'')}')">
      ${open?'▾':'▸'} ${esc(sec.name)} <span style="font-weight:500;opacity:.75">· ${sec.idxs.length} รายการ${qtyN?' · กรอกแล้ว '+qtyN:''}</span></div>`;
    if(!open) return;
    sec.idxs.forEach(idx=>{
      const it = ITEMS[idx];
      const has = job && (job.qty||{})['i'+idx] > 0;
      html += `<div class="irow ${has?'hasqty':''}">
        <div class="nm">${esc(it.n)}<br><small>${esc(it.u)}${session.role==='admin'?' · อ้างอิง '+fmt(it.p):''}</small></div>
        ${rightCellFn(idx)}
      </div>`;
    });
  });
  return html;
}
function refreshItemList(){
  const el = $('itemList'); if(!el) return;
  if(ui.tab==='prices'){
    const v = vendorById(session.role==='admin'? ui.vendorSel : session.vendorId);
    el.innerHTML = itemRows((idx)=>{
      const custom = v.prices && v.prices['i'+idx] != null && v.prices['i'+idx] !== '';
      return session.role==='admin'
        ? `<input type="number" placeholder="${ITEMS[idx].p}" value="${custom? v.prices['i'+idx]:''}" onchange="setPrice('${v.id}',${idx},this.value)">`
        : `<div class="line-total">${fmt(priceOf(v,idx))}</div>`;
    }, null);
  } else if(ui.jobSel){
    const job = B.jobs.find(j=>j.id===ui.jobSel);
    const v = vendorById(job.vendorId);
    el.innerHTML = itemRows((idx)=> jobRowCells(job, v, idx), job);
  }
}

/* ===== Excel export ===== */
function exportVendorPrices(vid){
  const v = vendorById(vid); if(!v) return;
  const aoa = [
    ['ราคางาน BOQ Underground — เฉพาะ '+v.name, '', '', ''],
    ['เอกสารความลับระหว่าง AIS และ '+v.name, '', '', ''],
    [],
    ['ลำดับ','หมวด','รายการ','หน่วย','ราคา/หน่วย (บาท)']
  ];
  ITEMS.forEach((it,idx)=> aoa.push([idx+1, it.s, it.n, it.u, priceOf(v,idx)]));
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:6},{wch:24},{wch:56},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, 'ราคา '+v.name.slice(0,20));
  XLSX.writeFile(wb, 'BOQ-price-'+v.name.replace(/\s+/g,'-')+'-'+todayISO()+'.xlsx');
  toast('Export ราคา '+v.name+' แล้ว');
}
function exportJobBOQ(jid){
  const job = B.jobs.find(j=>j.id===jid); if(!job) return;
  const v = vendorById(job.vendorId);
  const aoa = [
    ['BOQ งาน', jobName(job)],
    ['Vendor', (v||{}).name||'-'],
    ['กรอบงบประมาณ (บาท)', jobBudget(job)||''],
    ['วันที่', todayISO()],
    [],
    ['ลำดับ','หมวด','รายการ','หน่วย','จำนวน','ราคา/หน่วย','รวม (บาท)']
  ];
  let n=0, total=0;
  ITEMS.forEach((it,idx)=>{
    const q = +(job.qty||{})['i'+idx]||0;
    if(!q) return;
    const p = jobPrice(job,idx), line = q*p; total+=line; n++;
    aoa.push([n, it.s, (it.on||it.n), it.u, q, p, line]);
  });
  aoa.push([]);
  aoa.push(['','','','','','รวมทั้งงาน', total]);
  const jbud = jobBudget(job);
  if(jbud) aoa.push(['','','','','', jbud-total>=0?'คงเหลือจากงบ':'เกินงบ', Math.abs(jbud-total)]);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:6},{wch:22},{wch:52},{wch:8},{wch:9},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'BOQ');
  XLSX.writeFile(wb, 'BOQ-'+jobName(job).replace(/\s+/g,'-')+'-'+todayISO()+'.xlsx');
  toast('Export BOQ แล้ว');
}
function exportSummary(){
  const wb = XLSX.utils.book_new();
  const sum = [['งาน','Vendor','งบประมาณ','ค่างาน','คงเหลือ','สถานะ']];
  B.jobs.forEach(j=>{
    const cost = jobCost(j), b = jobBudget(j), diff = b-cost;
    sum.push([j.name, (vendorById(j.vendorId)||{}).name||'-', b, cost, diff, b? (diff>=0?'ในงบ':'เกินงบ'):'-']);
  });
  const ws = XLSX.utils.aoa_to_sheet(sum);
  ws['!cols'] = [{wch:34},{wch:16},{wch:13},{wch:13},{wch:13},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'สรุปงบ');
  XLSX.writeFile(wb, 'BOQ-summary-'+todayISO()+'.xlsx');
  toast('Export สรุปแล้ว (ไฟล์ภายใน AIS)');
}

/* ===== Excel import ===== */
let importFor = null; // 'prices:<vid>' | 'job:<jid>'
$('boqXlsxIn').addEventListener('change', function(ev){
  const f = ev.target.files[0]; if(!f || !importFor) return;
  const rd = new FileReader();
  rd.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
      const nameIdx = {}; ITEMS.forEach((it,i)=> nameIdx[it.n.trim()] = i);
      let hit = 0;
      if(importFor.startsWith('prices:')){
        const v = vendorById(importFor.slice(7));
        // รับทั้งไฟล์ราคาจากแอปนี้ (คอลัมน์ รายการ/ราคา) และไฟล์มาตรฐาน (Description/Unit Price)
        const hi = aoa.findIndex(r=> r && (String(r[2]).trim()==='รายการ' || String(r[1]).trim().toLowerCase()==='description'));
        if(hi>=0){
          const isApp = String(aoa[hi][2]).trim()==='รายการ';
          for(let i=hi+1;i<aoa.length;i++){
            const r = aoa[i]; if(!r) continue;
            const nm = String(isApp? r[2] : r[1]).trim();
            const pr = +(isApp? r[4] : r[5]);
            if(nm && nameIdx[nm]!=null && !isNaN(pr)){ v.prices['i'+nameIdx[nm]] = pr; hit++; }
          }
        }
        bqPersist(); refreshAdminUI(); toast('อัปเดตราคา '+hit+' รายการ');
      } else if(importFor.startsWith('job:')){
        const job = B.jobs.find(j=>j.id===importFor.slice(4));
        const hi = aoa.findIndex(r=> r && String(r[2]).trim()==='รายการ' && String(r[4]).trim()==='จำนวน');
        if(hi>=0){
          for(let i=hi+1;i<aoa.length;i++){
            const r = aoa[i]; if(!r) continue;
            const nm = String(r[2]).trim(); const q = +r[4];
            if(nm && nameIdx[nm]!=null && q>0){ job.qty['i'+nameIdx[nm]] = q; hit++; }
          }
        }
        bqPersist(); bqRender(); toast('อัปเดตจำนวน '+hit+' รายการ');
      }
    }catch(err){ toast('อ่านไฟล์ไม่สำเร็จ'); }
    importFor = null; ev.target.value='';
  };
  rd.readAsArrayBuffer(f);
});

bqRestore();
window.onerror = function(msg, src, line, col){
  try{
    let d = document.getElementById('errBanner');
    if(!d){ d = document.createElement('div'); d.id='errBanner';
      d.style.cssText='position:fixed;top:0;left:0;right:0;background:#D64545;color:#fff;padding:8px 12px;font-size:12px;z-index:9999;font-family:monospace;white-space:pre-wrap';
      document.body.appendChild(d); }
    d.textContent = '⚠ ' + msg + '  (บรรทัด ' + line + ') — แคปหน้านี้ส่งมาได้เลย';
  }catch(e){}
};
renderLogin();

/* ================= Mode switch (Progress <-> BOQ) ================= */
function switchMode(m){
  const map = {dash:'modeDash', progress:'modeProgress', boq:'modeBoq', vendor:'modeVendor', plan:'modePlan'};
  const btn = {dash:'mbDash', progress:'mbProgress', boq:'mbBoq', vendor:'mbVendor', plan:'mbPlan'};
  Object.keys(map).forEach(k=>{
    $(map[k]).style.display = (k===m) ? '' : 'none';
    $(btn[k]).classList.toggle('on', k===m);
  });
  if(m==='progress'){ render(); }
  else {
    $('fabAdd').style.display='none';
    if(m==='boq') bqRender();
    else if(m==='vendor') renderVendorMode();
    else if(m==='plan'){
      try{
        const cat = visibleVillages().filter(v=>(v.houses||[]).length)
          .map(v=>({name:v.name, houses:(v.houses||[]).map(h=>({addr:h.no, status:h.st||''}))}));
        localStorage.setItem('plan-status-catalog', JSON.stringify(cat));
      }catch(e){}
      const fr = $('planFrame');
      if(!fr.src) fr.src = 'plan-status.html';
    }
    else renderDash();
  }
  window.scrollTo(0,0);
}

function renderVendorMode(){
  if(!isAdmin()){ switchMode('dash'); return; }
  ui.tab='prices';
  $('modeVendor').innerHTML =
    '<div class="section-label">บัญชี Vendor · จัดการ User / Password · Admin เท่านั้น</div>'
    + viewVendors()
    + '<div class="section-label">ราคา Vendor · Upload / แก้ไขราคา</div>'
    + viewPrices();
}
function refreshAdminUI(){
  if($('modeVendor').style.display !== 'none') renderVendorMode();
  else bqRender();
}
function gotoVillage(id){ currentId = id; switchMode('progress'); }
function renderDash(){
  const vil = visibleVillages();
  const jobs = isAdmin() ? B.jobs : B.jobs.filter(j=>j.vendorId===session.vendorId);
  const n = vil.length;
  const done = vil.filter(v=>overall(v)>=100).length;
  const doing = vil.filter(v=>{const p=overall(v);return p>0&&p<100;}).length;
  const avg = n ? Math.round(vil.reduce((s,v)=>s+overall(v),0)/n) : 0;
  const ports = vil.reduce((s,v)=>s+(+v.ports||0),0);
  const homes = vil.reduce((s,v)=>s+(+v.homesDone||0),0);
  const po = jobs.reduce((s,j)=>s+jobBudget(j),0);
  const built = jobs.reduce((s,j)=>s+jobCost(j),0);
  const overPo = po && built > po;

  let vendorTable = '';
  if(isAdmin() && B.vendors.length){
    vendorTable = `
    <div class="section-label">แยกราย Vendor</div>
    <div class="panel" style="overflow-x:auto">
      <table class="sum">
        <tr><th>Vendor</th><th class="r">งาน %</th><th class="r">เดินสาย (หลัง)</th><th class="r">ค่างานสร้าง</th><th class="r">งบ PO</th><th class="r">คงเหลือ</th></tr>
        ${B.vendors.map(vd=>{
          const vv = state.villages.filter(x=>x.vendorId===vd.id || (x.contractor||'').trim()===vd.name.trim());
          const jj = B.jobs.filter(j=>j.vendorId===vd.id);
          const a = vv.length ? Math.round(vv.reduce((s,x)=>s+overall(x),0)/vv.length) : 0;
          const h = vv.reduce((s,x)=>s+(+x.homesDone||0),0);
          const pt = vv.reduce((s,x)=>s+(+x.ports||0),0);
          const c = jj.reduce((s,j)=>s+jobCost(j),0);
          const b = jj.reduce((s,j)=>s+jobBudget(j),0);
          const d = b - c;
          return `<tr><td>${esc(vd.name)}</td><td class="r">${a}%</td><td class="r">${h}${pt?'/'+pt:''}</td><td class="r">${fmt(c)}</td><td class="r">${fmt(b)}</td><td class="r money ${d<0?'neg':'pos'}">${fmt(d)}</td></tr>`;
        }).join('')}
      </table>
    </div>`;
  }

  $('modeDash').innerHTML = `
  <div class="section-label">1 · ภาพรวมงานสรุป</div>
  <div class="panel">
    <div style="display:flex;align-items:baseline;gap:10px">
      <b style="font-family:'Taviraj',serif;font-size:42px;color:var(--forest);line-height:1">${avg}%</b>
      <span style="font-size:13px;color:var(--muted)">ความคืบหน้าเฉลี่ย ${n} หมู่บ้าน</span>
    </div>
    <div class="bar" style="margin-top:10px"><i style="width:${avg}%"></i></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <span class="chip idle">ยังไม่เริ่ม ${n-doing-done}</span>
      <span class="chip doing">กำลังดำเนินการ ${doing}</span>
      <span class="chip done">ส่งมอบแล้ว ${done}</span>
    </div>
  </div>

  <div class="section-label">2 · เดินสายเข้าบ้านสำเร็จ</div>
  <div class="panel">
    <div style="display:flex;align-items:baseline;gap:10px">
      <b style="font-family:'Taviraj',serif;font-size:42px;color:var(--forest);line-height:1">${homes}</b>
      <span style="font-size:13px;color:var(--muted)">หลัง ${ports?'จากทั้งหมด '+ports+' หลัง ('+Math.round(homes/ports*100)+'%)':''}</span>
    </div>
    ${ports?`<div class="bar" style="margin-top:10px"><i style="width:${Math.min(100,Math.round(homes/ports*100))}%"></i></div>`:''}
    <div style="font-size:11.5px;color:var(--muted);margin-top:8px">กรอกจำนวนหลังที่สำเร็จได้ในหน้าหมู่บ้านแต่ละแห่ง (ช่อง "เดินสายเข้าบ้านสำเร็จ")</div>
  </div>

  <div class="section-label">3-4 · งบประมาณ · ข้อมูลภายใน</div>
  <div class="kpis">
    <div class="kpi"><span class="lbl">งบใน PO</span><b>${fmt(po)} ฿</b><small>${jobs.length} งาน BOQ</small></div>
    <div class="kpi"><span class="lbl">งบที่สร้างงานไปแล้ว</span><b style="color:${overPo?'var(--red)':'var(--forest)'}">${fmt(built)} ฿</b><small class="${overPo?'neg':'pos'}" style="font-weight:700">${po? (overPo?'เกิน PO '+fmt(built-po):'คงเหลือ '+fmt(po-built))+' ฿':''}</small></div>
  </div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted)"><span>เบิกใช้จาก PO</span><span>${po?Math.round(built/po*100)+'%':'-'}</span></div>
    <div class="budget-bar"><i class="${overPo?'over':''}" style="width:${po?Math.min(100,built/po*100):0}%"></i></div>
  </div>
  ${vendorTable}
  <div class="section-label">รายหมู่บ้านทั้งหมด · แตะเพื่อเปิด</div>
  <div class="panel" style="overflow-x:auto">
    <table class="sum">
      <tr><th>หมู่บ้าน</th><th class="r">%</th><th class="r">เดินสาย (หลัง)</th><th class="r">งบโครงการ</th><th class="r">ใช้ไปแล้ว</th></tr>
      ${vil.map(v=>{
        const p = overall(v);
        const jj = villageJobs(v).filter(j=> isAdmin() || j.vendorId===session.vendorId);
        const b = jj.reduce((s,j)=>s+jobBudget(j),0);
        const c = jj.reduce((s,j)=>s+jobCost(j),0);
        return `<tr style="cursor:pointer" onclick="gotoVillage('${v.id}')">
          <td>${esc(v.name)}<br><small style="color:var(--muted)">${esc(v.contractor||'-')}</small></td>
          <td class="r money">${p}%</td>
          <td class="r">${+v.homesDone||0}${+v.ports?'/'+v.ports:''}</td>
          <td class="r">${b?fmt(b):'-'}</td>
          <td class="r money ${b&&c>b?'neg':''}">${c?fmt(c):'-'}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="5" style="color:var(--muted)">ยังไม่มีหมู่บ้าน</td></tr>'}
    </table>
  </div>`;
}
